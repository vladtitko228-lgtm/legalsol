<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V38 · Iridescent ring + center dot — Cursor/Apple Intelligence vibe -->
  <defs>
    <linearGradient id="v38r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.25" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#fde047"/>
      <stop offset="0.75" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Big iridescent ring -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="url(#v38r)" stroke-width="6" style="transform-origin:40px 40px;animation:v38spin 8s linear infinite;"/>

  <!-- Inner thinner ring (counter-rotating) -->
  <circle cx="40" cy="40" r="20" fill="none" stroke="url(#v38r)" stroke-width="2.5" opacity="0.55" style="transform-origin:40px 40px;animation:v38spinRev 6s linear infinite;"/>

  <!-- Center dot with pulse -->
  <circle cx="40" cy="40" r="6" fill="url(#v38r)" style="transform-origin:40px 40px;animation:v38pulse 2.4s ease-in-out infinite;"/>

  <style>
    @keyframes v38spin { to { transform: rotate(360deg); } }
    @keyframes v38spinRev { to { transform: rotate(-360deg); } }
    @keyframes v38pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  </style>
</svg>
