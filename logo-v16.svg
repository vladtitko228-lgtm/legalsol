<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V16 · Document folder opens to reveal stamped Karta Pobytu — "we deliver" -->
  <defs>
    <linearGradient id="v16f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B52CC"/>
      <stop offset="1" stop-color="#3D3585"/>
    </linearGradient>
    <linearGradient id="v16card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Folder back -->
  <rect x="10" y="22" width="60" height="48" rx="3" fill="url(#v16f)" stroke="#1E1B4B" stroke-width="0.7"/>
  <!-- Folder tab -->
  <rect x="14" y="18" width="22" height="6" rx="2" fill="#5B52CC"/>

  <!-- Card emerging (animated up-down) -->
  <g style="transform-origin:40px 50px;animation:v16emerge 3.5s ease-in-out infinite;">
    <g transform="rotate(-3 40 50)">
      <rect x="14" y="28" width="52" height="34" rx="2" fill="url(#v16card)" stroke="#0e7490" stroke-width="0.5"/>
      <!-- Photo -->
      <rect x="18" y="32" width="13" height="17" rx="0.8" fill="#B8B2F5"/>
      <circle cx="24.5" cy="38" r="2.2" fill="#5B52CC"/>
      <path d="M 20 48 Q 20 43 24.5 43 Q 29 43 29 48 Z" fill="#5B52CC"/>
      <!-- Fields -->
      <rect x="34" y="32" width="28" height="2" rx="0.4" fill="#fff" opacity="0.95"/>
      <rect x="34" y="36" width="22" height="1.4" rx="0.3" fill="#fff" opacity="0.75"/>
      <rect x="34" y="39" width="25" height="1.4" rx="0.3" fill="#fff" opacity="0.75"/>
      <rect x="34" y="42" width="20" height="1.4" rx="0.3" fill="#fff" opacity="0.75"/>
      <!-- Status: APPROVED with check -->
      <g transform="translate(0 -2)">
        <rect x="34" y="50" width="20" height="6" rx="3" fill="#10b981"/>
        <path d="M 37 53 L 39 55 L 43 51" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="46" y="55" font-family="Arial,sans-serif" font-size="3.4" font-weight="700" fill="#fff">APPROVED</text>
      </g>
      <!-- EU stars dots -->
      <circle cx="60" cy="58" r="0.6" fill="#fde047"/>
      <circle cx="58.5" cy="59" r="0.6" fill="#fde047"/>
      <circle cx="60" cy="60" r="0.6" fill="#fde047"/>
    </g>
  </g>

  <!-- Folder front (lower half, covers part of card) -->
  <path d="M 10 50 L 70 50 L 70 70 Q 70 73 67 73 L 13 73 Q 10 73 10 70 Z" fill="url(#v16f)" stroke="#1E1B4B" stroke-width="0.7" opacity="0.96"/>

  <!-- Small scales on the folder tab -->
  <g style="transform-origin:25px 21px;animation:v16scale 3.2s ease-in-out infinite;">
    <rect x="19" y="20.5" width="12" height="0.9" rx="0.45" fill="#fde047"/>
    <circle cx="25" cy="19.5" r="0.9" fill="#fde047"/>
    <ellipse cx="20" cy="22.3" rx="1.6" ry="0.5" fill="#fde047"/>
    <ellipse cx="30" cy="22.3" rx="1.6" ry="0.5" fill="#fde047"/>
  </g>

  <style>
    @keyframes v16emerge { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes v16scale { 0%,100% { transform: rotate(0); } 30% { transform: rotate(3deg); } 70% { transform: rotate(-3deg); } }
  </style>
</svg>
