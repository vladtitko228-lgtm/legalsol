<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V29 · Pure Libra zodiac symbol ♎ — minimalist line art -->
  <defs>
    <linearGradient id="v29g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke="url(#v29g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top horizontal line -->
    <path d="M 14 30 L 66 30"/>
    <!-- Middle arc (the "weighing" motion) -->
    <path d="M 22 50 Q 22 30 40 30 Q 58 30 58 50"/>
    <!-- Bottom horizontal line -->
    <path d="M 14 56 L 66 56"/>
  </g>

  <!-- Soft accent dot at the apex -->
  <circle cx="40" cy="30" r="3" fill="#fde047"/>

  <!-- Subtle breath -->
  <g style="transform-origin:40px 43px;animation:v29breath 4s ease-in-out infinite;">
    <circle cx="40" cy="40" r="0" fill="transparent"/>
  </g>

  <style>
    @keyframes v29breath { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  </style>
</svg>
