<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V6 · "LS" monogram — L is a column, S is the scale beam — letterform mark -->
  <defs>
    <linearGradient id="v6L" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8B2F5"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </linearGradient>
    <linearGradient id="v6S" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.5" stop-color="#facc15"/>
      <stop offset="1" stop-color="#fde047"/>
    </linearGradient>
  </defs>

  <!-- L = vertical column + base — the column glyph -->
  <g style="transform-origin:24px 60px; animation:v6L .6s cubic-bezier(.34,1.56,.64,1) .15s both;">
    <rect x="14" y="14" width="8" height="50" fill="url(#v6L)"/>
    <!-- Subtle flute -->
    <line x1="16" y1="16" x2="16" y2="62" stroke="#3D3585" stroke-width="0.6" opacity="0.5"/>
    <line x1="20" y1="16" x2="20" y2="62" stroke="#3D3585" stroke-width="0.6" opacity="0.5"/>
    <!-- Capital -->
    <rect x="11" y="11" width="14" height="4" rx="0.5" fill="#5B52CC"/>
    <!-- Base bottom -->
    <rect x="11" y="64" width="32" height="5" rx="0.5" fill="#5B52CC"/>
  </g>

  <!-- S = scale beam stylized — a horizontal arm with two pans like Themis -->
  <g style="transform-origin:50px 30px; animation:v6S .65s cubic-bezier(.34,1.56,.64,1) .45s both, v6sway 4s ease-in-out 1.2s infinite;">
    <!-- Beam -->
    <rect x="28" y="28" width="44" height="3" rx="1.5" fill="url(#v6S)"/>
    <!-- Pivot/jewel -->
    <circle cx="50" cy="29.5" r="3" fill="#fde047" stroke="#facc15" stroke-width="0.5"/>
    <!-- Left chain + pan -->
    <line x1="34" y1="31" x2="34" y2="38" stroke="#facc15" stroke-width="1"/>
    <ellipse cx="34" cy="40" rx="5" ry="1.5" fill="#fde047"/>
    <path d="M 29 40 Q 34 44 39 40" fill="none" stroke="#facc15" stroke-width="1"/>
    <!-- Right chain + pan -->
    <line x1="66" y1="31" x2="66" y2="38" stroke="#facc15" stroke-width="1"/>
    <ellipse cx="66" cy="40" rx="5" ry="1.5" fill="#fde047"/>
    <path d="M 61 40 Q 66 44 71 40" fill="none" stroke="#facc15" stroke-width="1"/>
  </g>

  <!-- Tiny accent dot above L (capital decoration) -->
  <circle cx="18" cy="6" r="2" fill="#22d3ee" opacity="0" style="animation:v6dot .4s ease 1s forwards, v6pulse 2.5s ease-in-out 1.4s infinite;"/>

  <style>
    @keyframes v6L { from { transform: translateY(-30px) scaleY(.5); opacity:0; } to { transform: translateY(0) scaleY(1); opacity:1; } }
    @keyframes v6S { from { transform: scaleX(0) rotate(-25deg); opacity:0; } to { transform: scaleX(1) rotate(0deg); opacity:1; } }
    @keyframes v6sway { 0%,100% { transform: rotate(0deg);} 30% {transform: rotate(1.8deg);} 70% {transform: rotate(-1.8deg);} }
    @keyframes v6dot { to { opacity: 1; } }
    @keyframes v6pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
  </style>
</svg>
