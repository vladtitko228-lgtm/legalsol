<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V28 · Soft 3D-ish "balance bowl" — premium modern -->
  <defs>
    <linearGradient id="v28bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#5B52CC"/>
      <stop offset="1" stop-color="#3D3585"/>
    </linearGradient>
    <radialGradient id="v28sphere" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.7" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="v28sphere2" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.7" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0e7490"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="72" height="72" rx="24" fill="url(#v28bg)"/>

  <!-- Two 3D spheres -->
  <circle cx="24" cy="42" r="13" fill="url(#v28sphere)"/>
  <circle cx="56" cy="42" r="11" fill="url(#v28sphere2)"/>

  <!-- Soft curved horizon line linking them (the balance) -->
  <path d="M 14 30 Q 40 18 66 30" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Tiny anchor on the line -->
  <circle cx="40" cy="20" r="3" fill="#fff"/>

  <!-- Floor shadows -->
  <ellipse cx="24" cy="58" rx="11" ry="2" fill="#1E1B4B" opacity="0.4"/>
  <ellipse cx="56" cy="55" rx="9" ry="1.7" fill="#1E1B4B" opacity="0.4"/>

  <!-- Subtle breath -->
  <g style="transform-origin:40px 40px;animation:v28breath 5s ease-in-out infinite;">
    <circle cx="40" cy="40" r="0" fill="transparent"/>
  </g>

  <style>
    @keyframes v28breath { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  </style>
</svg>
