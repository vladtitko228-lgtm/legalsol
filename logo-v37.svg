<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- V37 · Bold wordmark — "ls" with custom kerning + dot (Vercel/Loops style) -->
  <defs>
    <linearGradient id="v37" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Lowercase modern wordmark -->
  <g font-family="-apple-system,SF Pro Display,Inter,sans-serif" font-weight="800" font-size="64" letter-spacing="-3">
    <text x="14" y="60" fill="#fff">ls</text>
    <!-- Gradient accent dot after letters -->
    <circle cx="78" cy="56" r="6" fill="url(#v37)" style="transform-origin:78px 56px;animation:v37pulse 2.4s ease-in-out infinite;"/>
  </g>

  <!-- Tiny tagline-style mark on top: 3 dots ascending (zodiac-libra-hint) -->
  <g fill="url(#v37)">
    <circle cx="18" cy="14" r="1.5"/>
    <circle cx="26" cy="14" r="2"/>
    <circle cx="34" cy="14" r="2.5"/>
  </g>

  <style>
    @keyframes v37pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
  </style>
</svg>
