<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V27 · Infinity-loop scale — modern "balance in motion" -->
  <defs>
    <linearGradient id="v27loop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#fde047"/>
    </linearGradient>
    <linearGradient id="v27bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D3585"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="72" height="72" rx="24" fill="url(#v27bg)"/>

  <!-- Infinity symbol (∞) as thick rounded stroke -->
  <path d="M 22 40 Q 22 28 30 28 Q 40 28 40 40 Q 40 52 50 52 Q 58 52 58 40 Q 58 28 50 28 Q 40 28 40 40 Q 40 52 30 52 Q 22 52 22 40 Z" fill="none" stroke="url(#v27loop)" stroke-width="6" stroke-linecap="round"/>

  <!-- Two small dots in centers (where the "pans" would be) -->
  <circle cx="30" cy="40" r="3" fill="#fde047"/>
  <circle cx="50" cy="40" r="3" fill="#fde047"/>

  <!-- Slow rotation/breath -->
  <style>
    g, path { transform-origin: 40px 40px; }
  </style>
</svg>
