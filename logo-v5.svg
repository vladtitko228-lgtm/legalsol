<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V5 · Dynamic tipping scales (no columns) — beam visibly weighs and balances -->
  <defs>
    <linearGradient id="v5beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="v5pan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Decorative base (stays still) -->
  <rect x="28" y="68" width="24" height="4" rx="1" fill="#5B52CC"/>
  <rect x="32" y="64" width="16" height="4" rx="1" fill="#8B82E8"/>
  <!-- Stem -->
  <rect x="38" y="20" width="4" height="44" fill="#B8B2F5"/>
  <!-- Pivot finial -->
  <circle cx="40" cy="18" r="3.5" fill="#fde047" stroke="#facc15" stroke-width="0.5"/>

  <!-- Scale group — tips visibly back and forth -->
  <g style="transform-origin:40px 22px; animation:v5tip 3.5s cubic-bezier(.45,0,.55,1) infinite;">
    <!-- Beam -->
    <rect x="8" y="20.5" width="64" height="3" rx="1.5" fill="url(#v5beam)"/>

    <!-- Left chain + pan -->
    <line x1="14" y1="23.5" x2="14" y2="32" stroke="#facc15" stroke-width="1.2"/>
    <g style="transform-origin:14px 32px;">
      <ellipse cx="14" cy="36" rx="8" ry="2" fill="url(#v5pan)"/>
      <path d="M 6 36 Q 14 42 22 36" fill="none" stroke="#0891b2" stroke-width="1"/>
    </g>

    <!-- Right chain + pan -->
    <line x1="66" y1="23.5" x2="66" y2="32" stroke="#facc15" stroke-width="1.2"/>
    <g style="transform-origin:66px 32px;">
      <ellipse cx="66" cy="36" rx="8" ry="2" fill="url(#v5pan)"/>
      <path d="M 58 36 Q 66 42 74 36" fill="none" stroke="#0891b2" stroke-width="1"/>
    </g>
  </g>

  <style>
    @keyframes v5tip {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(8deg); }
      50%  { transform: rotate(0deg); }
      75%  { transform: rotate(-8deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</svg>
