<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V39 · Brutalist mono mark — single bold shape, mono color, no gradient -->
  <!-- Inspired by Vercel ▲, Linear □, Notion N -->

  <!-- Background — flat dark -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="#0a081c"/>

  <!-- The mark: stylized "L" as bold rounded shape merged with horizontal weight-line -->
  <!-- L vertical -->
  <rect x="22" y="20" width="10" height="40" rx="3" fill="#fff"/>
  <!-- L horizontal -->
  <rect x="22" y="50" width="36" height="10" rx="3" fill="#fff"/>
  <!-- Small accent: the L's "weight" — a single small gold square hanging from the horizontal -->
  <rect x="45" y="64" width="8" height="8" rx="2" fill="#fde047" style="transform-origin:49px 64px;animation:v39swing 3s ease-in-out infinite;"/>

  <!-- Top minimal mark — 2 tiny squares (the balance hint) -->
  <rect x="48" y="20" width="4" height="4" rx="1" fill="#fde047"/>
  <rect x="56" y="20" width="4" height="4" rx="1" fill="#22d3ee"/>

  <style>
    @keyframes v39swing { 0%,100%{transform:rotate(0)} 30%{transform:rotate(8deg)} 70%{transform:rotate(-8deg)} }
  </style>
</svg>
