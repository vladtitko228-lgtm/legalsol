<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V4 · Minimalist geometric scales (stroke-based, lineart) -->
  <defs>
    <linearGradient id="v4grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B82E8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Draw-on animation: paths use stroke-dasharray + animate stroke-dashoffset -->
  <g fill="none" stroke="url(#v4grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stand -->
    <path d="M 40 14 L 40 64" stroke-dasharray="50" stroke-dashoffset="50" style="animation:v4draw 0.7s ease 0.1s forwards;"/>
    <!-- Base -->
    <path d="M 28 68 L 52 68" stroke-dasharray="24" stroke-dashoffset="24" style="animation:v4draw 0.4s ease 0.8s forwards;"/>
    <path d="M 34 64 L 46 64" stroke-dasharray="12" stroke-dashoffset="12" style="animation:v4draw 0.3s ease 0.7s forwards;"/>
    <!-- Beam -->
    <path d="M 12 22 L 68 22" stroke-dasharray="56" stroke-dashoffset="56" style="animation:v4draw 0.6s ease 1.0s forwards;"/>
    <!-- Left pan (geometric V) -->
    <path d="M 8 28 L 16 38 L 24 28" stroke-dasharray="30" stroke-dashoffset="30" style="animation:v4draw 0.5s ease 1.4s forwards;"/>
    <!-- Right pan -->
    <path d="M 56 28 L 64 38 L 72 28" stroke-dasharray="30" stroke-dashoffset="30" style="animation:v4draw 0.5s ease 1.4s forwards;"/>
    <!-- Hanging lines -->
    <path d="M 16 22 L 16 30" stroke-dasharray="8" stroke-dashoffset="8" style="animation:v4draw 0.3s ease 1.2s forwards;"/>
    <path d="M 64 22 L 64 30" stroke-dasharray="8" stroke-dashoffset="8" style="animation:v4draw 0.3s ease 1.2s forwards;"/>
  </g>

  <!-- Pivot circle (fades in last) -->
  <circle cx="40" cy="14" r="3" fill="url(#v4grad)" opacity="0" style="animation:v4fade .35s ease 1.7s forwards;"/>

  <style>
    @keyframes v4draw { to { stroke-dashoffset: 0; } }
    @keyframes v4fade { to { opacity: 1; } }
  </style>
</svg>
