<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V19 · Modern "L+S" minimal mark — rounded letterform -->
  <defs>
    <linearGradient id="v19g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </linearGradient>
  </defs>

  <!-- Soft squircle background -->
  <rect x="6" y="6" width="68" height="68" rx="22" fill="url(#v19g)"/>

  <!-- "L" as a thick rounded path: vertical + horizontal -->
  <rect x="22" y="20" width="9" height="32" rx="4.5" fill="#fff"/>
  <rect x="22" y="47" width="22" height="9" rx="4.5" fill="#fff"/>

  <!-- "S" as a stylized scale arm — fat horizontal pill + 2 round pans hanging -->
  <g style="transform-origin:54px 30px;animation:v19sway 4s ease-in-out infinite;">
    <rect x="40" y="22" width="24" height="6" rx="3" fill="#fde047"/>
    <circle cx="44" cy="34" r="3.5" fill="#fde047"/>
    <circle cx="60" cy="34" r="3.5" fill="#fde047"/>
  </g>

  <style>
    @keyframes v19sway { 0%,100%{transform:rotate(0)} 50%{transform:rotate(2deg)} }
  </style>
</svg>
