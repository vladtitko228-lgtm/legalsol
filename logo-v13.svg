<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V13 · Scales crowned with EU stars circle — European integration motif -->
  <defs>
    <linearGradient id="v13beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- EU stars ring above -->
  <g style="transform-origin:40px 14px;animation:v13spin 12s linear infinite;">
    <!-- 12 EU stars in circle -->
    <g fill="#fde047">
      <circle cx="40" cy="6" r="0.9"/>
      <circle cx="44.5" cy="7.2" r="0.9"/>
      <circle cx="47.5" cy="10.2" r="0.9"/>
      <circle cx="48.6" cy="14.5" r="0.9"/>
      <circle cx="47.5" cy="18.8" r="0.9"/>
      <circle cx="44.5" cy="21.8" r="0.9"/>
      <circle cx="40" cy="23" r="0.9"/>
      <circle cx="35.5" cy="21.8" r="0.9"/>
      <circle cx="32.5" cy="18.8" r="0.9"/>
      <circle cx="31.4" cy="14.5" r="0.9"/>
      <circle cx="32.5" cy="10.2" r="0.9"/>
      <circle cx="35.5" cy="7.2" r="0.9"/>
    </g>
  </g>

  <!-- Stand -->
  <rect x="28" y="68" width="24" height="4" rx="1" fill="#3D3585"/>
  <rect x="32" y="64" width="16" height="4" rx="1" fill="#5B52CC"/>
  <rect x="38" y="28" width="4" height="36" fill="#B8B2F5"/>

  <!-- Beam group -->
  <g style="transform-origin:40px 30px;animation:v13tilt 4.5s ease-in-out infinite;">
    <rect x="8" y="28" width="64" height="3" rx="1.5" fill="url(#v13beam)"/>
    <line x1="16" y1="31" x2="16" y2="38" stroke="#facc15" stroke-width="1.1"/>
    <line x1="64" y1="31" x2="64" y2="38" stroke="#facc15" stroke-width="1.1"/>

    <!-- Pans -->
    <ellipse cx="16" cy="40" rx="9" ry="2" fill="url(#v13beam)"/>
    <path d="M 7 40 Q 16 48 25 40" fill="none" stroke="#facc15" stroke-width="1.2"/>
    <ellipse cx="64" cy="40" rx="9" ry="2" fill="url(#v13beam)"/>
    <path d="M 55 40 Q 64 48 73 40" fill="none" stroke="#facc15" stroke-width="1.2"/>
  </g>

  <style>
    @keyframes v13spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes v13tilt { 0%,100% { transform: rotate(0deg); } 35% { transform: rotate(2deg); } 65% { transform: rotate(-2deg); } }
  </style>
</svg>
