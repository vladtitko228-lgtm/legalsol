<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V34 · Libra zodiac with hanging pans — minimal but with weight visible -->
  <defs>
    <linearGradient id="v34g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </linearGradient>
  </defs>

  <!-- Top: classical Libra symbol -->
  <g fill="none" stroke="url(#v34g)" stroke-width="4" stroke-linecap="round">
    <!-- Top line -->
    <path d="M 14 24 L 66 24"/>
    <!-- Arc -->
    <path d="M 24 44 Q 24 24 40 24 Q 56 24 56 44"/>
  </g>

  <!-- Pivot dot at apex -->
  <circle cx="40" cy="24" r="3.2" fill="#fde047"/>

  <!-- Tiny pan-dots hanging from arc ends -->
  <g style="transform-origin:40px 28px;animation:v34sway 4s ease-in-out infinite;">
    <line x1="24" y1="44" x2="24" y2="52" stroke="url(#v34g)" stroke-width="2"/>
    <line x1="56" y1="44" x2="56" y2="52" stroke="url(#v34g)" stroke-width="2"/>
    <circle cx="24" cy="56" r="6" fill="url(#v34g)"/>
    <circle cx="56" cy="56" r="6" fill="url(#v34g)"/>
  </g>

  <!-- Base line — second Libra horizontal -->
  <path d="M 14 70 L 66 70" fill="none" stroke="url(#v34g)" stroke-width="4" stroke-linecap="round"/>

  <style>
    @keyframes v34sway { 0%,100%{transform:rotate(0)} 30%{transform:rotate(3deg)} 70%{transform:rotate(-3deg)} }
  </style>
</svg>
