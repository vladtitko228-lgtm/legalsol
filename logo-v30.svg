<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V30 · Libra zodiac in squircle — modern minimal app-icon -->
  <defs>
    <linearGradient id="v30bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D3585"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="72" height="72" rx="22" fill="url(#v30bg)"/>

  <!-- Libra symbol inside, white -->
  <g fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top line -->
    <path d="M 20 32 L 60 32"/>
    <!-- Arc -->
    <path d="M 26 50 Q 26 32 40 32 Q 54 32 54 50"/>
    <!-- Bottom line -->
    <path d="M 20 56 L 60 56"/>
  </g>

  <!-- Gold dot at apex -->
  <circle cx="40" cy="32" r="2.8" fill="#fde047"/>

  <!-- Animated apex dot pulse -->
  <circle cx="40" cy="32" r="2.8" fill="#fde047" style="transform-origin:40px 32px;animation:v30pulse 2.4s ease-in-out infinite;"/>

  <style>
    @keyframes v30pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:.5} }
  </style>
</svg>
