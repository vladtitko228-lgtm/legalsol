<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V15 · 3 mini scales stacked (key/lock/check) — progress motif -->
  <defs>
    <linearGradient id="v15g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- 3 levels — base, middle, top — connected vertically -->
  <!-- Top scale: tiny, with checkmark (final = approved) -->
  <g style="transform-origin:40px 14px;animation:v15a 3.5s ease-in-out infinite;">
    <rect x="30" y="14" width="20" height="1.5" rx="0.7" fill="url(#v15g)"/>
    <circle cx="40" cy="12" r="1.6" fill="#10b981"/>
    <path d="M 38.5 12 L 39.5 13 L 41.5 11" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="33" y1="15.4" x2="33" y2="18" stroke="#facc15" stroke-width="0.5"/>
    <line x1="47" y1="15.4" x2="47" y2="18" stroke="#facc15" stroke-width="0.5"/>
    <circle cx="33" cy="19" r="2" fill="url(#v15g)"/>
    <circle cx="47" cy="19" r="2" fill="url(#v15g)"/>
  </g>

  <!-- Middle scale: medium (mid stage = lock/key) -->
  <g style="transform-origin:40px 38px;animation:v15b 4s ease-in-out 0.4s infinite;">
    <rect x="22" y="38" width="36" height="2.2" rx="1.1" fill="url(#v15g)"/>
    <circle cx="40" cy="35.5" r="2.4" fill="#22d3ee"/>
    <!-- Lock body -->
    <rect x="38.6" y="35.5" width="2.8" height="2.5" rx="0.4" fill="#1E1B4B"/>
    <line x1="33" y1="40.2" x2="33" y2="44" stroke="#facc15" stroke-width="0.7"/>
    <line x1="47" y1="40.2" x2="47" y2="44" stroke="#facc15" stroke-width="0.7"/>
    <path d="M 28 46 Q 33 51 38 46" fill="url(#v15g)" stroke="#facc15" stroke-width="0.6"/>
    <path d="M 42 46 Q 47 51 52 46" fill="url(#v15g)" stroke="#facc15" stroke-width="0.6"/>
  </g>

  <!-- Bottom scale: largest, with rolled scroll = paperwork start -->
  <g style="transform-origin:40px 62px;animation:v15c 4.5s ease-in-out 0.8s infinite;">
    <rect x="12" y="62" width="56" height="3" rx="1.5" fill="url(#v15g)"/>
    <circle cx="40" cy="59" r="3" fill="#8B82E8"/>
    <line x1="20" y1="65" x2="20" y2="70" stroke="#facc15" stroke-width="1"/>
    <line x1="60" y1="65" x2="60" y2="70" stroke="#facc15" stroke-width="1"/>
    <!-- Big pan -->
    <ellipse cx="20" cy="71.5" rx="7" ry="1.6" fill="url(#v15g)"/>
    <ellipse cx="60" cy="71.5" rx="7" ry="1.6" fill="url(#v15g)"/>
  </g>

  <!-- Central stem connecting all 3 -->
  <line x1="40" y1="20" x2="40" y2="35" stroke="#B8B2F5" stroke-width="1.6" stroke-dasharray="2,1.5" opacity="0.6"/>
  <line x1="40" y1="45" x2="40" y2="59" stroke="#B8B2F5" stroke-width="1.6" stroke-dasharray="2,1.5" opacity="0.6"/>

  <style>
    @keyframes v15a { 0%,100% { transform: rotate(0); } 50% { transform: rotate(3deg); } }
    @keyframes v15b { 0%,100% { transform: rotate(0); } 50% { transform: rotate(-2.5deg); } }
    @keyframes v15c { 0%,100% { transform: rotate(0); } 50% { transform: rotate(2deg); } }
  </style>
</svg>
