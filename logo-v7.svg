<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V7 · Arched gateway with scales inside — Roman arch -->
  <defs>
    <linearGradient id="v7arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B82E8"/>
      <stop offset="1" stop-color="#3D3585"/>
    </linearGradient>
    <linearGradient id="v7col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8B2F5"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </linearGradient>
  </defs>

  <!-- LEFT column -->
  <g style="transform-origin:18px 70px; animation:v7col .55s cubic-bezier(.34,1.56,.64,1) .15s both;">
    <rect x="13" y="30" width="10" height="36" fill="url(#v7col)"/>
    <rect x="10" y="66" width="16" height="3" rx="0.6" fill="#5B52CC"/>
  </g>

  <!-- RIGHT column -->
  <g style="transform-origin:62px 70px; animation:v7col .55s cubic-bezier(.34,1.56,.64,1) .25s both;">
    <rect x="57" y="30" width="10" height="36" fill="url(#v7col)"/>
    <rect x="54" y="66" width="16" height="3" rx="0.6" fill="#5B52CC"/>
  </g>

  <!-- ARCH (top arc) -->
  <path d="M 13 32 Q 13 14 40 14 Q 67 14 67 32" fill="none" stroke="url(#v7arch)" stroke-width="6"
        stroke-dasharray="100" stroke-dashoffset="100"
        style="animation:v7arch .8s ease .4s forwards;"/>

  <!-- Base plinth full-width -->
  <rect x="6" y="69" width="68" height="4" rx="0.6" fill="#3D3585"
        style="transform-origin:40px 71px; animation:v7bar .4s ease .05s both;"/>

  <!-- Scales hanging inside the arch -->
  <g style="transform-origin:40px 28px; animation:v7scaleIn .55s cubic-bezier(.34,1.56,.64,1) 1.1s both, v7sway 4.5s ease-in-out 1.7s infinite;">
    <!-- Pivot mount from arch -->
    <line x1="40" y1="18" x2="40" y2="26" stroke="#fde047" stroke-width="1.4"/>
    <circle cx="40" cy="17" r="2" fill="#fde047"/>
    <!-- Beam -->
    <rect x="22" y="26" width="36" height="2.5" rx="1.25" fill="#fde047"/>
    <!-- Chains -->
    <line x1="26" y1="28.5" x2="26" y2="36" stroke="#facc15" stroke-width="0.9"/>
    <line x1="54" y1="28.5" x2="54" y2="36" stroke="#facc15" stroke-width="0.9"/>
    <!-- Pans -->
    <ellipse cx="26" cy="38" rx="6" ry="1.4" fill="#fde047"/>
    <path d="M 20 38 Q 26 42 32 38" fill="none" stroke="#facc15" stroke-width="0.9"/>
    <ellipse cx="54" cy="38" rx="6" ry="1.4" fill="#fde047"/>
    <path d="M 48 38 Q 54 42 60 38" fill="none" stroke="#facc15" stroke-width="0.9"/>
  </g>

  <style>
    @keyframes v7col { from { transform: translateY(-40px) scaleY(.4); opacity:0; } to { transform: translateY(0) scaleY(1); opacity:1; } }
    @keyframes v7arch { to { stroke-dashoffset: 0; } }
    @keyframes v7bar { from { transform: scaleX(0); opacity:0; } to { transform: scaleX(1); opacity:1; } }
    @keyframes v7scaleIn { from { transform: scale(0) rotate(45deg); opacity:0; } to { transform: scale(1) rotate(0deg); opacity:1; } }
    @keyframes v7sway { 0%,100% { transform: rotate(0deg);} 30% {transform: rotate(2deg);} 70% {transform: rotate(-2deg);} }
  </style>
</svg>
