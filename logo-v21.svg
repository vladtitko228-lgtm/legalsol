<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V21 · Soft gradient bubble with smile-scale — playful & rounded -->
  <defs>
    <radialGradient id="v21bg" cx="0.35" cy="0.3">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </radialGradient>
    <radialGradient id="v21high" cx="0.3" cy="0.25" r="0.4">
      <stop offset="0" stop-color="#fff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Big soft circle/bubble -->
  <circle cx="40" cy="40" r="34" fill="url(#v21bg)"/>
  <!-- Highlight (glassy) -->
  <ellipse cx="32" cy="28" rx="20" ry="14" fill="url(#v21high)"/>

  <!-- Smile-shaped scale beam (curved) -->
  <g style="transform-origin:40px 38px;animation:v21sway 4s ease-in-out infinite;">
    <path d="M 18 38 Q 40 50 62 38" fill="none" stroke="#fde047" stroke-width="5" stroke-linecap="round"/>

    <!-- Two big rounded eyes/pans -->
    <circle cx="20" cy="36" r="5" fill="#fde047"/>
    <circle cx="60" cy="36" r="5" fill="#fde047"/>

    <!-- Pivot dot above -->
    <circle cx="40" cy="28" r="3.5" fill="#fde047"/>
  </g>

  <!-- Floor base curve -->
  <ellipse cx="40" cy="62" rx="22" ry="3" fill="#1E1B4B" opacity="0.4"/>

  <style>
    @keyframes v21sway { 0%,100%{transform:rotate(0)} 30%{transform:rotate(3deg)} 70%{transform:rotate(-3deg)} }
  </style>
</svg>
