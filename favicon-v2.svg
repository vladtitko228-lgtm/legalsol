<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 36">
  <!-- Variant A: 2 fluted columns (temple façade) + scale beam with hanging pans -->
  <!-- LEFT column shaft -->
  <rect x="9" y="16" width="6" height="16" rx="0.6" fill="#B8B2F5"/>
  <!-- RIGHT column shaft -->
  <rect x="25" y="16" width="6" height="16" rx="0.6" fill="#B8B2F5"/>
  <!-- Architrave / capital -->
  <rect x="6" y="13" width="28" height="3" rx="0.6" fill="#8B82E8"/>
  <!-- Stepped base -->
  <rect x="5" y="32" width="30" height="3" rx="0.6" fill="#8B82E8"/>
  <!-- Scale beam (top horizontal) -->
  <rect x="1" y="8.5" width="38" height="1.6" rx="0.8" fill="#FBBF24"/>
  <!-- Vertical pivot beam→architrave -->
  <rect x="19" y="10" width="2" height="3" rx="0.4" fill="#FBBF24"/>

  <!-- Finial on top -->
  <circle cx="20" cy="6" r="1.7" fill="#FCD34D"/>

  <!-- Hanging cords -->
  <line x1="4" y1="10.1" x2="4" y2="12.2" stroke="#FBBF24" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="36" y1="10.1" x2="36" y2="12.2" stroke="#FBBF24" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Left pan -->
  <path d="M 1 12 Q 4 15.2 7 12" fill="none" stroke="#FBBF24" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M 33 12 Q 36 15.2 39 12" fill="none" stroke="#FBBF24" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Subtle flutes (column grooves) -->
  <line x1="11"  y1="17" x2="11"  y2="31" stroke="#8B82E8" stroke-width="0.45" opacity="0.7"/>
  <line x1="13"  y1="17" x2="13"  y2="31" stroke="#8B82E8" stroke-width="0.45" opacity="0.7"/>
  <line x1="27"  y1="17" x2="27"  y2="31" stroke="#8B82E8" stroke-width="0.45" opacity="0.7"/>
  <line x1="29"  y1="17" x2="29"  y2="31" stroke="#8B82E8" stroke-width="0.45" opacity="0.7"/>
</svg>
