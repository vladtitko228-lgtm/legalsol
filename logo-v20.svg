<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V20 · Squircle frame with abstract balance dots — ultra-modern -->
  <defs>
    <linearGradient id="v20bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D3585"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="6" y="6" width="68" height="68" rx="22" fill="url(#v20bg)"/>

  <!-- Soft inner glow ring -->
  <rect x="10" y="10" width="60" height="60" rx="19" fill="none" stroke="rgba(139,130,232,.25)" stroke-width="1"/>

  <!-- Beam — fat rounded pill -->
  <g style="transform-origin:40px 40px;animation:v20sway 4s ease-in-out infinite;">
    <rect x="16" y="37" width="48" height="6" rx="3" fill="#fde047"/>

    <!-- Three balance dots: small-medium-large on each side -->
    <!-- Left: 3 dots descending -->
    <circle cx="22" cy="50" r="4" fill="#a78bfa"/>
    <circle cx="22" cy="58" r="3" fill="#a78bfa" opacity="0.65"/>

    <!-- Right: 3 dots descending -->
    <circle cx="58" cy="50" r="4" fill="#22d3ee"/>
    <circle cx="58" cy="58" r="3" fill="#22d3ee" opacity="0.65"/>

    <!-- Pivot center -->
    <circle cx="40" cy="40" r="6" fill="#fde047" stroke="#1E1B4B" stroke-width="1.5"/>
    <circle cx="40" cy="40" r="2.5" fill="#1E1B4B"/>
  </g>

  <style>
    @keyframes v20sway { 0%,100%{transform:rotate(0)} 40%{transform:rotate(4deg)} 80%{transform:rotate(-4deg)} }
  </style>
</svg>
