<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V22 · Stripe-style soft squircle with rounded "scale + L" -->
  <defs>
    <linearGradient id="v22bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#5B52CC"/>
      <stop offset="1" stop-color="#3D3585"/>
    </linearGradient>
  </defs>

  <!-- Soft squircle background with gradient -->
  <rect x="4" y="4" width="72" height="72" rx="26" fill="url(#v22bg)"/>

  <!-- Stem (rounded thick) -->
  <rect x="36" y="26" width="8" height="36" rx="4" fill="#fff"/>

  <!-- Base — rounded rectangle -->
  <rect x="24" y="58" width="32" height="8" rx="4" fill="#fff"/>

  <!-- Top circle (pivot) -->
  <circle cx="40" cy="24" r="5" fill="#fde047"/>

  <!-- Scale beam (thick rounded pill) -->
  <g style="transform-origin:40px 24px;animation:v22sway 4s ease-in-out infinite;">
    <rect x="14" y="21" width="52" height="6" rx="3" fill="#fde047"/>

    <!-- Left & right pans — soft squircle shapes -->
    <rect x="8" y="32" width="20" height="11" rx="5.5" fill="#fde047" opacity="0.95"/>
    <rect x="52" y="32" width="20" height="11" rx="5.5" fill="#fde047" opacity="0.95"/>
  </g>

  <style>
    @keyframes v22sway { 0%,100%{transform:rotate(0)} 30%{transform:rotate(2.5deg)} 70%{transform:rotate(-2.5deg)} }
  </style>
</svg>
