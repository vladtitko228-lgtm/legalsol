<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V1 · Pure classical scales of justice -->
  <defs>
    <linearGradient id="v1beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8B2F5"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </linearGradient>
    <linearGradient id="v1pan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8B2F5"/>
      <stop offset="1" stop-color="#8B82E8"/>
    </linearGradient>
  </defs>

  <!-- Stand/base (no column, just classical scale stem) -->
  <rect x="36" y="58" width="8" height="14" rx="1" fill="url(#v1beam)"/>
  <rect x="28" y="70" width="24" height="5" rx="1.5" fill="#5B52CC"/>

  <!-- Vertical post -->
  <g style="transform-origin:40px 60px;animation:v1tilt 4s ease-in-out infinite;">
    <rect x="38" y="20" width="4" height="40" fill="url(#v1beam)"/>

    <!-- Beam (horizontal) -->
    <rect x="10" y="22" width="60" height="3" rx="1.5" fill="url(#v1beam)"/>

    <!-- Fulcrum/cap -->
    <circle cx="40" cy="20" r="3.5" fill="#fde047" stroke="#facc15" stroke-width="0.6"/>

    <!-- Hanging chains -->
    <line x1="16" y1="25" x2="16" y2="34" stroke="#8B82E8" stroke-width="1.2"/>
    <line x1="64" y1="25" x2="64" y2="34" stroke="#8B82E8" stroke-width="1.2"/>

    <!-- Left pan -->
    <path d="M 6 35 L 26 35 Q 16 47 6 35 Z" fill="url(#v1pan)" stroke="#5B52CC" stroke-width="0.6"/>
    <ellipse cx="16" cy="35" rx="10" ry="2" fill="#B8B2F5"/>

    <!-- Right pan -->
    <path d="M 54 35 L 74 35 Q 64 47 54 35 Z" fill="url(#v1pan)" stroke="#5B52CC" stroke-width="0.6"/>
    <ellipse cx="64" cy="35" rx="10" ry="2" fill="#B8B2F5"/>
  </g>

  <style>
    @keyframes v1tilt {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(2.5deg); }
      75% { transform: rotate(-2.5deg); }
    }
  </style>
</svg>
