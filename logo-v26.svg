<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V26 · Two soft circles balanced on horizontal axis — yin-yang feel -->
  <defs>
    <linearGradient id="v26bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#3D3585"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="72" height="72" rx="22" fill="url(#v26bg)"/>

  <!-- Soft balance line (very gentle horizontal arc) -->
  <path d="M 16 40 Q 40 42 64 40" fill="none" stroke="#fde047" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left big circle (fiolet) -->
  <circle cx="22" cy="40" r="12" fill="#a78bfa"/>
  <!-- Right big circle (cyan) — slightly smaller suggesting balance -->
  <circle cx="58" cy="40" r="10" fill="#22d3ee"/>

  <!-- Center pivot dot -->
  <circle cx="40" cy="40" r="3.5" fill="#fde047" stroke="#1E1B4B" stroke-width="1"/>

  <!-- Animated subtle swap of sizes -->
  <g style="transform-origin:40px 40px;animation:v26breathe 5s ease-in-out infinite;">
    <circle cx="22" cy="40" r="12" fill="#a78bfa" opacity="0"/>
  </g>

  <style>
    @keyframes v26breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  </style>
</svg>
