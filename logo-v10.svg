<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V10 · Document stack vs Passport — weighing paperwork vs identity -->
  <defs>
    <linearGradient id="v10doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8B2F5"/>
      <stop offset="1" stop-color="#8B82E8"/>
    </linearGradient>
    <linearGradient id="v10pass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="28" y="68" width="24" height="4" rx="1" fill="#3D3585"/>
  <rect x="32" y="64" width="16" height="4" rx="1" fill="#5B52CC"/>
  <rect x="38" y="22" width="4" height="42" fill="#B8B2F5"/>
  <circle cx="40" cy="22" r="3.5" fill="#fde047"/>

  <!-- Beam group -->
  <g style="transform-origin:40px 24px;animation:v10tilt 4.5s ease-in-out infinite;">
    <rect x="8" y="22" width="64" height="3" rx="1.5" fill="#fde047"/>

    <!-- Left: document stack -->
    <line x1="16" y1="25" x2="16" y2="33" stroke="#facc15" stroke-width="1.1"/>
    <g style="transform-origin:16px 42px;">
      <!-- 3 stacked papers, offset -->
      <rect x="6" y="40" width="20" height="11" rx="0.8" fill="#7C6FE8" opacity="0.6"/>
      <rect x="7" y="37" width="18" height="11" rx="0.8" fill="#8B82E8" opacity="0.8"/>
      <rect x="8" y="34" width="16" height="11" rx="0.8" fill="url(#v10doc)" stroke="#5B52CC" stroke-width="0.4"/>
      <!-- text lines on top doc -->
      <line x1="10" y1="37" x2="22" y2="37" stroke="#1E1B4B" stroke-width="0.5" opacity="0.6"/>
      <line x1="10" y1="39" x2="22" y2="39" stroke="#1E1B4B" stroke-width="0.5" opacity="0.6"/>
      <line x1="10" y1="41" x2="18" y2="41" stroke="#1E1B4B" stroke-width="0.5" opacity="0.6"/>
    </g>

    <!-- Right: passport book -->
    <line x1="64" y1="25" x2="64" y2="33" stroke="#facc15" stroke-width="1.1"/>
    <g style="transform-origin:64px 42px;">
      <rect x="56" y="34" width="16" height="14" rx="1.2" fill="url(#v10pass)" stroke="#047857" stroke-width="0.5"/>
      <!-- Coat-of-arms star (centered) -->
      <circle cx="64" cy="40" r="3.2" fill="none" stroke="#fde047" stroke-width="0.8"/>
      <path d="M 64 37.5 L 64.7 39.8 L 67 39.8 L 65.2 41.1 L 65.8 43.3 L 64 42 L 62.2 43.3 L 62.8 41.1 L 61 39.8 L 63.3 39.8 Z" fill="#fde047"/>
      <!-- Bottom text -->
      <rect x="58" y="44" width="12" height="1.2" rx="0.3" fill="#fde047" opacity="0.7"/>
    </g>
  </g>

  <style>
    @keyframes v10tilt { 0%,100% { transform: rotate(0deg); } 30% { transform: rotate(-2.5deg); } 70% { transform: rotate(2.5deg); } }
  </style>
</svg>
