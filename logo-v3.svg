<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V3 · Two columns / temple façade with scales BETWEEN them -->
  <defs>
    <linearGradient id="v3col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8B2F5"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </linearGradient>
  </defs>

  <!-- Pediment (triangle roof) -->
  <path d="M 8 18 L 40 6 L 72 18 L 70 22 L 40 11 L 10 22 Z" fill="#8B82E8"
        style="transform-origin:40px 14px;animation:v3pediment .55s cubic-bezier(.34,1.56,.64,1) .8s both;"/>

  <!-- Architrave -->
  <rect x="8" y="22" width="64" height="3" rx="0.6" fill="#5B52CC"
        style="transform-origin:40px 23px;animation:v3bar .45s ease .7s both;"/>

  <!-- LEFT column (drops from top) -->
  <g style="transform-origin:18px 70px;animation:v3colIn .6s cubic-bezier(.34,1.56,.64,1) .15s both;">
    <rect x="12" y="25" width="12" height="40" fill="url(#v3col)"/>
    <line x1="15" y1="27" x2="15" y2="63" stroke="#3D3585" stroke-width="0.5" opacity=".6"/>
    <line x1="18" y1="27" x2="18" y2="63" stroke="#3D3585" stroke-width="0.5" opacity=".6"/>
    <line x1="21" y1="27" x2="21" y2="63" stroke="#3D3585" stroke-width="0.5" opacity=".6"/>
  </g>

  <!-- RIGHT column -->
  <g style="transform-origin:62px 70px;animation:v3colIn .6s cubic-bezier(.34,1.56,.64,1) .3s both;">
    <rect x="56" y="25" width="12" height="40" fill="url(#v3col)"/>
    <line x1="59" y1="27" x2="59" y2="63" stroke="#3D3585" stroke-width="0.5" opacity=".6"/>
    <line x1="62" y1="27" x2="62" y2="63" stroke="#3D3585" stroke-width="0.5" opacity=".6"/>
    <line x1="65" y1="27" x2="65" y2="63" stroke="#3D3585" stroke-width="0.5" opacity=".6"/>
  </g>

  <!-- Base steps -->
  <rect x="6" y="65" width="68" height="3" rx="0.5" fill="#5B52CC"
        style="transform-origin:40px 66.5px;animation:v3bar .45s ease .5s both;"/>
  <rect x="3" y="68" width="74" height="4" rx="0.5" fill="#3D3585"
        style="transform-origin:40px 70px;animation:v3bar .45s ease .6s both;"/>

  <!-- Scales hanging between columns -->
  <g style="transform-origin:40px 32px;animation:v3scaleIn .55s cubic-bezier(.34,1.56,.64,1) 1s both, v3sway 4s ease-in-out 1.6s infinite;">
    <!-- Pivot mount -->
    <rect x="39" y="25" width="2" height="6" fill="#fde047"/>
    <circle cx="40" cy="24" r="2" fill="#fde047"/>
    <!-- Beam -->
    <rect x="26" y="30" width="28" height="2" rx="1" fill="#fde047"/>
    <!-- Chains -->
    <line x1="30" y1="32" x2="30" y2="38" stroke="#facc15" stroke-width="0.8"/>
    <line x1="50" y1="32" x2="50" y2="38" stroke="#facc15" stroke-width="0.8"/>
    <!-- Pans -->
    <path d="M 26 38 Q 30 42 34 38" fill="#fde047" stroke="#facc15" stroke-width="0.5"/>
    <path d="M 46 38 Q 50 42 54 38" fill="#fde047" stroke="#facc15" stroke-width="0.5"/>
  </g>

  <style>
    @keyframes v3colIn { from { transform: translateY(-40px) scaleY(.5); opacity:0; } to { transform: translateY(0) scaleY(1); opacity:1; } }
    @keyframes v3pediment { from { transform: translateY(-15px) scale(.8); opacity:0; } to { transform: translateY(0) scale(1); opacity:1; } }
    @keyframes v3bar { from { transform: scaleX(0); opacity:0; } to { transform: scaleX(1); opacity:1; } }
    @keyframes v3scaleIn { from { transform: scale(0) rotate(-90deg); opacity:0; } to { transform: scale(1) rotate(0deg); opacity:1; } }
    @keyframes v3sway {
      0%,100% { transform: rotate(0deg); }
      30% { transform: rotate(1.5deg); }
      70% { transform: rotate(-1.5deg); }
    }
  </style>
</svg>
