<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 36">
  <!-- Variant B: Single bold column as scale post, beam on top with discs (minimal) -->
  <!-- Base plinth (two tiers) -->
  <rect x="6" y="32" width="28" height="3" rx="0.8" fill="#8B82E8"/>
  <rect x="9" y="29" width="22" height="3" rx="0.6" fill="#B8B2F5"/>

  <!-- Column shaft — wide center with 4 thin flutes -->
  <rect x="11" y="14" width="18" height="15" rx="0.8" fill="#B8B2F5"/>
  <line x1="15"  y1="15" x2="15"  y2="28" stroke="#7C6FE8" stroke-width="0.6" opacity="0.7"/>
  <line x1="18"  y1="15" x2="18"  y2="28" stroke="#7C6FE8" stroke-width="0.6" opacity="0.7"/>
  <line x1="22"  y1="15" x2="22"  y2="28" stroke="#7C6FE8" stroke-width="0.6" opacity="0.7"/>
  <line x1="25"  y1="15" x2="25"  y2="28" stroke="#7C6FE8" stroke-width="0.6" opacity="0.7"/>

  <!-- Capital -->
  <rect x="8" y="11" width="24" height="3" rx="0.6" fill="#8B82E8"/>

  <!-- Scale beam -->
  <rect x="2" y="7" width="36" height="1.8" rx="0.9" fill="#FBBF24"/>
  <!-- Pivot bolt -->
  <circle cx="20" cy="7.9" r="1.6" fill="#FCD34D" stroke="#F59E0B" stroke-width="0.4"/>

  <!-- Left disc (pan) -->
  <circle cx="5" cy="11.5" r="2.6" fill="#FCD34D" stroke="#F59E0B" stroke-width="0.5"/>
  <line x1="5" y1="9" x2="5" y2="9" stroke="#F59E0B" stroke-width="0.5"/>
  <!-- Right disc -->
  <circle cx="35" cy="11.5" r="2.6" fill="#FCD34D" stroke="#F59E0B" stroke-width="0.5"/>

  <!-- Hanging lines -->
  <line x1="5"  y1="8.6" x2="5"  y2="10" stroke="#F59E0B" stroke-width="0.6"/>
  <line x1="35" y1="8.6" x2="35" y2="10" stroke="#F59E0B" stroke-width="0.6"/>
</svg>
