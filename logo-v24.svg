<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V24 · Three soft horizontal bars — level/weight meter -->
  <defs>
    <linearGradient id="v24bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#5B52CC"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="72" height="72" rx="22" fill="url(#v24bg)"/>

  <!-- 3 horizontal "weight" bars, ascending — like equalizer or progress -->
  <rect x="20" y="22" width="40" height="6" rx="3" fill="#fff" opacity="0.35"/>
  <rect x="20" y="36" width="40" height="6" rx="3" fill="#fff" opacity="0.65"/>
  <rect x="20" y="50" width="40" height="6" rx="3" fill="#fde047"/>

  <!-- Tiny pivot circle on top of last bar -->
  <circle cx="40" cy="50" r="1.8" fill="#1E1B4B"/>

  <!-- Slight tilt animation on the gold bar -->
  <g style="transform-origin:40px 53px;animation:v24sway 4s ease-in-out infinite;">
    <rect x="20" y="50" width="40" height="6" rx="3" fill="#fde047" style="opacity:0;"/>
  </g>

  <!-- Animated growing fill -->
  <style>
    @keyframes v24sway { 0%,100%{transform:rotate(0)} 30%{transform:rotate(2deg)} 70%{transform:rotate(-2deg)} }
  </style>
</svg>
