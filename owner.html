<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Legal Solutions — Кабинет владельца</title>
<link rel="icon" href="/favicon.svg">
<style>
  :root{
    --bg:#0f0c24; --bg2:#181440; --card:rgba(40,34,92,.5); --card2:#2a2560;
    --line:rgba(124,113,214,.22); --p:#6b61e0; --p-l:#8B82E8; --p-p:#B8B2F5;
    --gold:#fde047; --em:#34d399; --red:#fb7185; --amber:#fbbf24; --cyan:#38bdf8;
    --tx:#F2F1FB; --tx-d:#B8B2F5; --tx-dd:#8f89c4;
    --r:18px; --sh:0 10px 34px rgba(0,0,0,.4);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 520px at 10% -8%, rgba(107,97,224,.28), transparent 60%),
      radial-gradient(760px 480px at 100% 2%, rgba(56,189,248,.10), transparent 55%),
      var(--bg);
    background-attachment:fixed}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  @keyframes cardIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
  a{color:var(--p-l)}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 60px}
  .muted{color:var(--tx-dd)}
  .pos{color:var(--em)} .neg{color:var(--red)}

  /* ---- login ---- */
  #login{max-width:400px;margin:9vh auto;background:var(--card);border:1px solid var(--line);
    border-radius:var(--r);padding:32px 28px;box-shadow:var(--sh)}
  #login h1{font-size:20px;margin:0 0 4px}
  #login p{margin:0 0 22px;color:var(--tx-d);font-size:14px}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:12px;color:var(--tx-d);margin-bottom:6px}
  .fld input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--line);
    background:var(--bg2);color:var(--tx);font-size:15px;outline:none}
  .fld input:focus{border-color:var(--p-l)}
  .btn{width:100%;padding:12px;border:0;border-radius:11px;background:var(--p);color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{background:#6a61e0} .btn:disabled{opacity:.6;cursor:default}
  #err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}

  /* ---- header ---- */
  header{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--p-l));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  header h1{font-size:17px;margin:0;line-height:1.2}
  header .sub{font-size:12px;color:var(--tx-dd)}
  .spacer{flex:1}
  .ghost{background:var(--card2);border:1px solid var(--line);color:var(--tx-d);padding:8px 14px;
    border-radius:10px;font-size:13px;cursor:pointer}
  .ghost:hover{color:var(--tx);border-color:var(--p-l)}

  /* ---- layout ---- */
  .sec-title{display:flex;align-items:center;gap:9px;margin:32px 2px 14px;font-size:12px;
    letter-spacing:.09em;text-transform:uppercase;color:var(--tx-dd);font-weight:700}
  .sec-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .sec-title .ic{font-size:15px}
  /* сворачиваемые секции — явные карточки-кнопки */
  details.acc{margin:16px 0 0;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    backdrop-filter:blur(14px);overflow:hidden;transition:border-color .18s}
  details.acc:hover{border-color:rgba(139,130,232,.5)}
  details.acc summary{display:flex;align-items:center;gap:10px;padding:16px 18px;font-size:13.5px;
    color:var(--tx-d);font-weight:700;cursor:pointer;list-style:none;user-select:none}
  details.acc summary::-webkit-details-marker{display:none}
  details.acc summary::after{content:"развернуть ▾";margin-left:auto;font-size:11.5px;font-weight:600;
    color:var(--p-l);background:rgba(139,130,232,.12);padding:5px 12px;border-radius:16px;white-space:nowrap}
  details.acc[open] summary::after{content:"свернуть ▴";background:rgba(139,130,232,.22)}
  details.acc summary:hover{color:var(--tx)}
  details.acc .accb{padding:2px 16px 16px}
  details.acc .accb .card{background:rgba(24,20,64,.45)}
  /* вкладки разделов */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 6px;position:sticky;top:0;z-index:60;
    padding:10px 4px;background:linear-gradient(180deg,rgba(15,12,36,.94),rgba(15,12,36,.82));
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:0 0 14px 14px}
  .tab{background:var(--card2);border:1px solid var(--line);color:var(--tx-d);padding:8px 16px;
    border-radius:11px;font-size:13px;font-weight:650;cursor:pointer;transition:.15s}
  .tab:hover{color:var(--tx);border-color:var(--p-l)}
  .tab.on{background:var(--p);color:#fff;border-color:var(--p)}
  .tabwrap{display:none}.tabwrap.on{display:block}
  /* лента важного */
  .alerts{display:flex;flex-direction:column;gap:8px;margin:4px 0 18px}
  .alert{display:flex;gap:12px;align-items:flex-start;padding:12px 15px;border-radius:13px;
    background:var(--card);border:1px solid var(--line);border-left-width:4px;backdrop-filter:blur(10px);
    animation:cardIn .4s ease both}
  .alert.red{border-left-color:var(--red);background:linear-gradient(90deg,rgba(251,113,133,.10),var(--card) 45%)}
  .alert.yellow{border-left-color:var(--amber);background:linear-gradient(90deg,rgba(251,191,36,.09),var(--card) 45%)}
  .alert.green{border-left-color:var(--em);background:linear-gradient(90deg,rgba(52,211,153,.09),var(--card) 45%)}
  .alert .aico{font-size:17px;line-height:1.3;flex-shrink:0}
  .alert .at{font-size:13.5px;font-weight:650;line-height:1.45}
  .alert .ad{font-size:12px;color:var(--tx-dd);margin-top:2px;line-height:1.5}
  /* строка здоровья бизнеса */
  .health{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px}
  @media(max-width:760px){.health{grid-template-columns:repeat(2,1fr)}}
  .sig{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 15px;backdrop-filter:blur(12px);overflow:hidden;animation:cardIn .4s ease both}
  .sig .sdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;box-shadow:0 0 10px currentColor}
  .sig .st{font-size:12px;color:var(--tx-dd)}
  .sig .sv{font-size:19px;font-weight:750;margin-top:3px;font-variant-numeric:tabular-nums}
  .sig .sglow{position:absolute;inset:0;opacity:.10;pointer-events:none}
  .grid{display:grid;gap:14px}
  .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:860px){.g3,.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
  @media(max-width:520px){.g3,.g4{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;
    box-shadow:var(--sh);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    animation:cardIn .42s ease both;transition:border-color .18s ease}
  .card:hover{border-color:rgba(139,130,232,.42)}
  .card.k{padding:16px 18px}
  .k .lbl{font-size:12px;color:var(--tx-dd);margin-bottom:7px;display:flex;justify-content:space-between}
  .k .val{font-size:27px;font-weight:770;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .k .sub{font-size:12px;color:var(--tx-d);margin-top:5px}
  .chip{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--card2);color:var(--p-p)}
  .chip.up{background:rgba(52,211,153,.14);color:var(--em)}
  .chip.dn{background:rgba(248,113,113,.14);color:var(--red)}

  /* hero */
  .hero{background:linear-gradient(150deg,rgba(64,56,140,.55),rgba(34,29,82,.5));
    border:1px solid rgba(139,130,232,.3);box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.05)}
  .hero.glow-gold{box-shadow:var(--sh),0 0 46px rgba(253,224,71,.10),inset 0 0 0 1px rgba(253,224,71,.22)}
  .hero.glow-red{box-shadow:var(--sh),0 0 46px rgba(251,113,133,.12),inset 0 0 0 1px rgba(251,113,133,.24)}
  .hero.glow-em{box-shadow:var(--sh),0 0 46px rgba(52,211,153,.12),inset 0 0 0 1px rgba(52,211,153,.22)}
  .hero .val{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums}
  .gauge-wrap{display:flex;align-items:center;gap:18px}
  .bar-track{height:9px;border-radius:9px;background:var(--bg2);overflow:hidden;margin-top:10px}
  .bar-fill{height:100%;border-radius:9px;background:linear-gradient(90deg,var(--p),var(--gold))}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  td,th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--tx-dd);font-weight:600;font-size:12px}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:0}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:rgba(139,130,232,.07)}
  .rowbar{height:6px;border-radius:6px;background:var(--p);display:inline-block;vertical-align:middle;margin-left:8px}
  .flex{display:flex;align-items:center;gap:10px}
  .lgd{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--tx-d);margin-top:10px}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}
  .hint{font-size:12px;color:var(--tx-dd);margin-top:8px;line-height:1.5}
  .clickable{cursor:pointer} .clickable:hover{border-color:rgba(139,130,232,.5)}
  /* ---- анимации ---- */
  .card{transition:border-color .18s ease, transform .22s ease}
  .card:hover{transform:translateY(-2px)}
  .grid>.card:nth-child(2){animation-delay:.07s}
  .grid>.card:nth-child(3){animation-delay:.14s}
  .grid>.card:nth-child(4){animation-delay:.21s}
  .alerts>.alert:nth-child(2){animation-delay:.08s}
  .alerts>.alert:nth-child(3){animation-delay:.16s}
  .alerts>.alert:nth-child(4){animation-delay:.24s}
  .alerts>.alert:nth-child(n+5){animation-delay:.32s}
  .tabwrap.on{animation:cardIn .35s ease both}
  .bar-track>div{animation:barIn .9s cubic-bezier(.22,1,.36,1) both;transform-origin:left}
  @keyframes barIn{from{transform:scaleX(0)}}
  svg path.draw{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 1.5s ease-out forwards .15s}
  @keyframes draw{to{stroke-dashoffset:0}}
  .alert.red .aico{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
  circle.garc{animation:gaugeIn 1.15s cubic-bezier(.22,1,.36,1) both}
  @keyframes gaugeIn{from{stroke-dashoffset:var(--full)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  /* ---- телефон ---- */
  @media(max-width:640px){
    .wrap{padding:12px 10px 44px}
    header{gap:10px;margin-bottom:12px}
    header h1{font-size:15px}
    header .sub{font-size:10.5px}
    .ghost{padding:7px 10px;font-size:12px}
    .tab{padding:7px 11px;font-size:12px}
    .hero .val{font-size:23px}
    .k .val{font-size:19px}
    .k .lbl{font-size:10.5px}
    .k .sub{font-size:10.5px}
    .card{padding:13px;border-radius:14px}
    .grid{gap:10px}
    .sec-title{margin:20px 2px 10px;font-size:11px}
    details.acc summary{padding:12px 13px;font-size:12px}
    details.acc summary::after{font-size:10px;padding:4px 9px}
    .alert{padding:10px 12px}
    .alert .at{font-size:12.5px} .alert .ad{font-size:11px}
    table{font-size:11.5px} td,th{padding:6px 5px}
    .gauge-wrap{gap:10px}
    .gauge-wrap svg{width:88px;height:88px}
    .card>table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
  }
  .exp-donut{display:none;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);animation:cardIn .3s ease both}
  .exp-card.open .exp-donut{display:block}
  .exp-card .tap{transition:opacity .2s} .exp-card.open .tap{opacity:.4}
  .hidden{display:none!important}
  .center{text-align:center;color:var(--tx-dd);padding:40px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="hidden">
  <h1>Кабинет владельца</h1>
  <p>Legal Solutions · вход по номеру телефона</p>
  <form id="loginForm">
    <div class="fld"><label>Номер телефона</label>
      <input id="phone" type="tel" inputmode="tel" placeholder="+48 …" autocomplete="username" required></div>
    <div class="fld"><label>Пароль</label>
      <input id="password" type="password" autocomplete="current-password" required></div>
    <button class="btn" id="loginBtn" type="submit">Войти</button>
    <div id="err"></div>
  </form>
</div>

<!-- DASHBOARD -->
<div id="app" class="wrap hidden">
  <header>
    <div class="logo">LS</div>
    <div>
      <h1>Кабинет владельца</h1>
      <div class="sub" id="genLabel">—</div>
    </div>
    <div class="spacer"></div>
    <button class="ghost" id="refreshBtn">Обновить</button>
    <button class="ghost" id="logoutBtn">Выход</button>
  </header>
  <div id="content"></div>
</div>

<div id="boot" class="center wrap">Загрузка…</div>

<script>
const $ = s => document.querySelector(s);
// Единый endpoint: /api/owner?action=login|me|logout|data (одна serverless-функция).
const api = (action,o={}) => fetch('/api/owner?action='+action+'&_='+Date.now(),
  {credentials:'same-origin',cache:'no-store',...o});

// ---- formatting ----
const nf = n => (n==null||isNaN(n))?'—':Math.round(n).toLocaleString('ru-RU').replace(/,/g,' ');
const zl = n => (n==null||isNaN(n))?'—':nf(n)+' zł';
const pct = n => (n==null||isNaN(n))?'—':(Math.round(n*10)/10)+'%';
const RUM = ['','янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const dLabel = iso => { const p=String(iso).split('-'); return p[2]+'.'+p[1]; };  // 2026-07-15 → 15.07
const mLabel = ym => { const [y,m]=ym.split('-'); return RUM[+m]+' '+y.slice(2); };

// ---- auth flow ----
async function boot(){
  try{
    const r = await api('me');
    if(r.status===200){ showApp(); } else { showLogin(); }
  }catch(_){ showLogin(); }
}
function showLogin(){ $('#boot').classList.add('hidden'); $('#app').classList.add('hidden'); $('#login').classList.remove('hidden'); $('#phone').focus(); }
function showApp(){ $('#boot').classList.add('hidden'); $('#login').classList.add('hidden'); $('#app').classList.remove('hidden'); loadData(); }

$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'); btn.disabled=true; $('#err').textContent='';
  try{
    const r = await api('login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:$('#phone').value,password:$('#password').value})});
    const j = await r.json().catch(()=>({}));
    if(r.status===200){ showApp(); }
    else if(r.status===429){ $('#err').textContent = j.message||'Слишком много попыток. Подождите.'; }
    else if(j.error==='owner_not_configured'){ $('#err').textContent = 'Кабинет ещё не настроен на сервере (нет OWNER_* на Vercel) — это не про пароль.'; }
    else { $('#err').textContent = 'Неверный номер или пароль'; }
  }catch(_){ $('#err').textContent='Ошибка сети'; }
  btn.disabled=false;
});
$('#logoutBtn').addEventListener('click', async ()=>{ await api('logout',{method:'POST'}); showLogin(); });
$('#refreshBtn').addEventListener('click', ()=>loadData(true));

// ---- data ----
async function loadData(force){
  $('#content').innerHTML = '<div class="center">Обновляю данные…</div>';
  try{
    const r = await api('data');
    if(r.status===401){ showLogin(); return; }
    const d = await r.json();
    if(d.empty){ $('#content').innerHTML='<div class="center">Данные ещё не загружены.<br>Запусти сборщик: <code>python3 owner-dashboard/build_dashboard.py --push</code></div>'; return; }
    render(d);
  }catch(e){ $('#content').innerHTML='<div class="center neg">Ошибка загрузки данных</div>'; }
}

// ---- small chart helpers (inline SVG) ----
let __sg=0;
function sparkColor(c){ return c==='var(--gold)'?'#fde047':c==='var(--p-l)'?'#8B82E8':c==='var(--em)'?'#34d399':c==='var(--cyan)'?'#38bdf8':(c||'#8B82E8'); }
function sparkline(pts, {w=560,h=92,color='var(--p-l)'}={}){
  const col=sparkColor(color), id='sg'+(++__sg);
  const vals = pts.map(p=>p||0); const max=Math.max(1,...vals);
  const dx = w/(Math.max(1,vals.length-1));
  const xy = vals.map((v,i)=>[i*dx, h-6-(v/max)*(h-18)]);
  const line = xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const peakI = vals.indexOf(Math.max(...vals));
  const grid = [.25,.5,.75].map(g=>`<line x1="0" x2="${w}" y1="${(h*g).toFixed(1)}" y2="${(h*g).toFixed(1)}" stroke="rgba(255,255,255,.05)"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".33"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    ${grid}
    <path d="${line} L ${w} ${h} L 0 ${h} Z" fill="url(#${id})"/>
    <path class="draw" d="${line}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round"/>
    <circle cx="${xy[peakI][0].toFixed(1)}" cy="${xy[peakI][1].toFixed(1)}" r="3.5" fill="${col}" stroke="#0f0c24" stroke-width="2"/></svg>`;
}
// комбо-график: бары = расход/день, линия = лиды/день (зависимость)
function comboChart(days,{w=560,h=130}={}){
  if(!days||!days.length) return '<div class="muted">нет данных</div>';
  const sp=days.map(d=>d.spendUsd||0), ld=days.map(d=>d.leads||0);
  const ms=Math.max(1,...sp), ml=Math.max(1,...ld), bw=w/days.length;
  const bars=sp.map((v,i)=>`<rect x="${(i*bw+1).toFixed(1)}" y="${(h-16-(v/ms)*(h-40)).toFixed(1)}" width="${Math.max(1,bw-2).toFixed(1)}" height="${((v/ms)*(h-40)).toFixed(1)}" rx="2" fill="#6b61e0" opacity=".5"/>`).join('');
  const xy=ld.map((v,i)=>[(i*bw+bw/2), h-16-(v/ml)*(h-40)]);
  const line=xy.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join(' ');
  const peak=ld.indexOf(Math.max(...ld));
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    ${[.33,.66].map(g=>`<line x1="0" x2="${w}" y1="${(h*g).toFixed(1)}" y2="${(h*g).toFixed(1)}" stroke="rgba(255,255,255,.05)"/>`).join('')}
    ${bars}
    <path class="draw" d="${line}" fill="none" stroke="#fde047" stroke-width="2.4" stroke-linejoin="round"/>
    <circle cx="${xy[peak][0].toFixed(1)}" cy="${xy[peak][1].toFixed(1)}" r="3.5" fill="#fde047" stroke="#0f0c24" stroke-width="2"/></svg>
  <div class="lgd"><span><span class="dot" style="background:#6b61e0"></span>Расход, $/день (трекинг)</span><span><span class="dot" style="background:#fde047"></span>Лиды/день</span><span class="muted">пик: ${Math.max(...ld)} лидов</span></div>`;
}
// закрытия по дням месяца: бары/день + накопительная линия + пунктир плана
function dailyChart(deals, key, goal, curKey, genAt){
  const y=+key.slice(0,4), m=+key.slice(5,7);
  const dim=new Date(y, m, 0).getDate();
  const perDay=Array(dim).fill(0);
  (deals||[]).forEach(x=>{ if((x.date||'').slice(0,7)===key){ const dd=+x.date.slice(8,10); if(dd>=1&&dd<=dim) perDay[dd-1]++; }});
  let s=0; const cum=perDay.map(v=>(s+=v));
  const total=s, w=560, h=150, bw=w/dim;
  const maxBar=Math.max(1,...perDay), maxCum=Math.max(goal||1, total, 1);
  const bars=perDay.map((v,i)=>v?`<rect x="${(i*bw+1).toFixed(1)}" y="${(h-20-(v/maxBar)*(h*0.42)).toFixed(1)}" width="${Math.max(1,bw-2).toFixed(1)}" height="${((v/maxBar)*(h*0.42)).toFixed(1)}" rx="2" fill="#6b61e0" opacity=".65"/>`:'').join('');
  const cxy=cum.map((v,i)=>[(i*bw+bw/2), h-20-(v/maxCum)*(h-40)]);
  const cline=cxy.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join(' ');
  const plan=goal?`<line x1="${(bw/2).toFixed(1)}" y1="${(h-20).toFixed(1)}" x2="${(dim*bw-bw/2).toFixed(1)}" y2="${(h-20-(goal/maxCum)*(h-40)).toFixed(1)}" stroke="#fde047" stroke-width="1.6" stroke-dasharray="5 4" opacity=".85"/>`:'';
  let todayMark='';
  if(key===curKey && genAt){ const td=+String(genAt).slice(8,10);
    if(td>=1&&td<=dim) todayMark=`<line x1="${(td*bw-bw/2).toFixed(1)}" y1="8" x2="${(td*bw-bw/2).toFixed(1)}" y2="${h-20}" stroke="rgba(255,255,255,.25)" stroke-width="1" stroke-dasharray="2 3"/>`; }
  const ticks=[];
  for(let dd=5; dd<=dim; dd+=5) ticks.push(`<text x="${(dd*bw-bw/2).toFixed(1)}" y="${h-6}" text-anchor="middle" fill="#8f89c4" font-size="9">${dd}</text>`);
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    ${[.3,.6].map(g=>`<line x1="0" x2="${w}" y1="${(h*g).toFixed(1)}" y2="${(h*g).toFixed(1)}" stroke="rgba(255,255,255,.05)"/>`).join('')}
    ${plan}${bars}${todayMark}
    <path class="draw" d="${cline}" fill="none" stroke="#34d399" stroke-width="2.4" stroke-linejoin="round"/>
    ${cxy.length?`<circle cx="${cxy[cxy.length-1][0].toFixed(1)}" cy="${cxy[cxy.length-1][1].toFixed(1)}" r="3.5" fill="#34d399" stroke="#0f0c24" stroke-width="2"/>`:''}
    ${ticks.join('')}</svg>
  <div class="lgd"><span><span class="dot" style="background:#6b61e0"></span>Закрытий в день</span><span><span class="dot" style="background:#34d399"></span>Накопительно: ${total}</span>${goal?`<span><span class="dot" style="background:#fde047"></span>Темп плана (${goal})</span>`:''}</div>`;
}
// воронка трафика месяца
function trafficFunnel(pm){

  return `

    <div style="font-size:11px;color:var(--tx-dd);padding:3px 0 3px 12px">↓ конверсия <b style="color:var(--tx-d)">${convP}%</b></div>
    <div class="bar-track" style="height:30px;border-radius:9px;margin-top:0"><div style="height:100%;width:${Math.max(14,convP*4)}%;background:linear-gradient(90deg,#fbbf24,#fde047);border-radius:9px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:12.5px;font-weight:700;color:#0d0a1f;white-space:nowrap">Закрытия<span class="num">${pm.trafficClosings}</span></div></div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);margin-top:14px;gap:10px">
      <div><div style="font-size:11px;color:var(--tx-dd)">Принесли 1-ми оплатами</div><div class="num" style="font-weight:750;font-size:16px;color:var(--em)">${zl(pm.trafficFirstPay)} <span class="muted" style="font-size:11px">×${pm.roasTrafficP1||'—'}</span></div></div>
      <div><div style="font-size:11px;color:var(--tx-dd)">Контракты (потенциал)</div><div class="num" style="font-weight:750;font-size:16px;color:var(--gold)">${zl(pm.trafficContracted)} <span class="muted" style="font-size:11px">×${pm.roasTrafficContract||'—'}</span></div></div>
    </div>`;
}
// конверсии продавцов: взял в работу → закрыл
function sellersFunnel(sellers){
  const list=(sellers||[]).filter(s=>s.leadsTaken);
  if(!list.length) return '';
  return `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:12px">Конверсии продавцов · взял в работу → закрыл</div>
    <div class="grid g2">`+list.map(s=>{
      const conv=s.closings&&s.leadsTaken?Math.round(s.closings/s.leadsTaken*100):0;
      const col=conv>=40?'#34d399':conv>=20?'#fbbf24':'#fb7185';
      return `<div>
        <div class="flex" style="justify-content:space-between;margin-bottom:8px"><b style="font-size:14px">${s.name}</b><span class="num" style="color:${col};font-weight:770;font-size:17px">${conv}%</span></div>
        <div class="bar-track" style="height:26px;border-radius:8px;margin-top:0"><div style="height:100%;width:100%;background:rgba(139,130,232,.30);border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:12px">взял в работу<span class="num">${nf(s.leadsTaken)}</span></div></div>
        <div class="bar-track" style="height:26px;border-radius:8px;margin-top:4px"><div style="height:100%;width:${Math.max(9,conv)}%;background:${col};border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:12px;color:#0d0a1f;font-weight:700;white-space:nowrap">закрыл<span class="num">${s.closings}</span></div></div>
      </div>`}).join('')+`</div>
    <div class="hint">Ширина нижней полосы = личная конверсия. Зелёный ≥40% · жёлтый ≥20% · красный ниже.</div></div>`;
}
function gauge(p){ // 0..100+
  const v=Math.max(0,Math.min(100,p)); const r=42,c=2*Math.PI*r, off=c*(1-v/100);
  const col = p>=100?'var(--em)':p>=66?'var(--gold)':p>=33?'var(--amber)':'var(--red)';
  return `<svg width="104" height="104" viewBox="0 0 104 104">
    <circle cx="52" cy="52" r="${r}" fill="none" stroke="var(--bg2)" stroke-width="9"/>
    <circle class="garc" style="--full:${c}" cx="52" cy="52" r="${r}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 52 52)"/>
    <text x="52" y="49" text-anchor="middle" fill="var(--tx)" font-size="21" font-weight="750">${p}%</text>
    <text x="52" y="66" text-anchor="middle" fill="var(--tx-dd)" font-size="10">цели</text></svg>`;
}
function barsMonthly(trend,goal,curKey){
  const max=Math.max(goal,...trend.map(t=>t.closings));
  return `<div class="flex" style="align-items:flex-end;gap:16px;height:130px;padding-top:8px">`+
    trend.map(t=>{const hh=(t.closings/max)*110; const cur=t.month===curKey;
      const bg=cur?'repeating-linear-gradient(180deg,var(--p-l),var(--p-l) 4px,var(--p) 4px,var(--p) 8px)':'linear-gradient(180deg,var(--p-l),var(--p))';
      return `<div style="flex:1;text-align:center;opacity:${cur?'.5':'1'}">
        <div class="muted" style="font-size:12px;margin-bottom:5px">${t.closings}${cur?' ◷':''}</div>
        <div style="height:${Math.max(2,hh)}px;background:${bg};border-radius:7px 7px 3px 3px"></div>
        <div class="muted" style="font-size:11px;margin-top:6px">${mLabel(t.month)}${cur?' · идёт':''}</div></div>`}).join('')
    +`</div>`;
}
function hbars(items, valOf, labOf, colorOf){
  const max=Math.max(1,...items.map(valOf));
  return items.map(it=>`<div style="margin:9px 0">
    <div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px">
      <span>${labOf(it)}</span><span class="muted" style="font-variant-numeric:tabular-nums">${valOf(it)}</span></div>
    <div class="bar-track" style="margin-top:0"><div class="bar-fill" style="width:${valOf(it)/max*100}%;background:${colorOf?colorOf(it):'var(--p)'}"></div></div>
  </div>`).join('');
}

// ---- KPI card ----
function kcard(lbl,val,sub,chip){
  return `<div class="card k"><div class="lbl"><span>${lbl}</span>${chip||''}</div>
    <div class="val">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}
function delta(cur,prev){
  if(!prev||prev===0) return '';
  const g=Math.round((cur-prev)/prev*100);
  return `<span class="chip ${g>=0?'up':'dn'}">${g>=0?'▲':'▼'} ${Math.abs(g)}%</span>`;
}

      <div style="font-size:13.5px;line-height:1.6">Здесь будет разбивка: ${['лид','тикток','входящий','суприм','сарафан','груп'].map(s=>`<span class="chip" style="margin-right:6px">${srcLabelRu(s)}</span>`).join('')}</div>
      <div class="hint">Бот читает чат «Oплаты LegalSol» и тегирует каждую оплату автоматически — <b>с июля</b> разбивка наполняется сама (первая уже поймана).
      За <b>июнь</b> историю чата бот достать не может (лимит Telegram ~24ч) — нужен разовый экспорт: Telegram Desktop → чат оплат → ⋮ → Export chat history → JSON → скинуть Владу/мне.</div>
    </div>`;
  }

  // ===== СПИСОК ЗАКРЫТИЙ =====
  if(pm.deals && pm.deals.length){
    html += accO('📋','Закрытия · '+monthName(pm,d)+' · '+pm.deals.length+' сделок', true);
    html += `<div class="card">${dealsTable(pm.deals)}
      <div class="hint">Цена — полная стоимость сделки; «оплачено» — 1-я + 2-я оплаты по таблице клиентов.</div></div>`;
    html += accC();
  }
  if(pm.byService && pm.byService.length){
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:8px">Услуги — что закрывают</div>
      ${hbars(pm.byService,x=>x.count,x=>x.service,()=>'var(--p)')}</div>`;
  }

  html += twC() + twO('ads');
  // ===== РЕКЛАМА (источник: «Бюджет LegalSol», zł) =====
  html += secTitle('📣','Анализ рекламы · '+monthName(pm,d),'что дал каждый вложенный в рекламу злотый');
  html += `<div class="grid g4">
    ${pm.budget?kcard('Расход (списания банка)', zl(pm.budget), 'FB '+zl(pm.fbActual)+' + TikTok '+zl(pm.ttActual)+' · трекинг $'+nf(pm.spendUsdTracked)):kcard('Расход · трекинг', '$'+nf(pm.spendUsdTracked), 'точные zł-метрики — после списаний банка')}
    ${kcard('Заявок с рекламы (лидов)', nf(pm.leads),'1 лид обошёлся в '+zl(pm.cpl))}
    ${kcard('Цена закрытия (трафик)', zl(pm.cacTraffic||pm.cac), pm.roasTrafficP1?('окупается ×'+pm.roasTrafficP1+' первой оплатой · ×'+pm.roasTrafficContract+' контрактом'):'расход ÷ трафиковые закрытия')}
    ${kcard('Из 100 лидов покупают', (pm.convTraffic!=null?Math.round(pm.convTraffic):'—')+' чел.', pm.trafficClosings!=null?(pm.trafficClosings+' закрытий с трафика из '+nf(pm.leads)+' лидов'):'появится с тегами из чата')}
  </div>`;
  const adLeads = (d.adDaily||[]).map(x=>x.leads||0);
  html += `<div class="grid g2" style="margin-top:14px">
    <div class="card"><div class="lbl" style="margin-bottom:6px">Зависимость: расход → лиды (по дням)</div>
      ${comboChart(d.adDaily||[])}
      <div class="hint">Органика вне трафика: 📇 суприм ${pm.suprimPct!=null?pm.suprimPct+'%':'—'} · 🤝 сарафан ${pm.sarafanPct!=null?pm.sarafanPct+'%':'—'} всех закрытий.</div></div>
    <div class="card"><div class="lbl" style="margin-bottom:10px">Каналы трафика · заявки и расход ($)</div>
      ${pm.channels?Object.entries(pm.channels).map(([n,c])=>`<div style="margin:9px 0">
        <div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${n}</span><span class="muted num">${c.leads} заявок · $${nf(c.usd)}${c.leads?' · CPL $'+(Math.round(c.usd/c.leads*10)/10):''}</span></div>
        <div class="bar-track" style="margin-top:0"><div class="bar-fill" style="width:${Math.max(6,c.leads/Math.max(1,...Object.values(pm.channels).map(x=>x.leads))*100)}%;background:${n.includes('Whats')?'#38bdf8':'#fde047'}"></div></div></div>`).join(''):'<div class="muted">нет данных</div>'}
      ${(pm.bySeller||[]).some(s=>s.wa)?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line)">
        <div style="font-size:11px;color:var(--tx-dd);margin-bottom:6px">💬 Входящие — WhatsApp-кабинеты ($, вручную)</div>
        ${(pm.bySeller||[]).filter(s=>s.wa).map(s=>`<div class="flex" style="justify-content:space-between;font-size:12.5px;margin:4px 0"><span>${s.name}</span><span class="muted num">$${nf(s.wa.spendUsd)} → ${s.wa.leads} заявок${s.wa.cpl!=null?' · CPL $'+s.wa.cpl:''}</span></div>`).join('')}</div>`:''}</div>
  </div>
  <div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:10px">Воронка трафика · ${monthName(pm,d)}</div>
    ${trafficFunnel(pm)}
  </div>`;

  html += twC() + twO('fin');
  // ===== ФИНАНСЫ (PnL) =====
  if(pnl){
    html += accO('🧾','Финансы · PnL '+(pnl.month||'')+' · подробно', false);
    html += `<div class="grid g4">
      ${kcard('Доход', zl(pnl.income), pnl.firmIncome!=null?('🏦 фирма '+zl(pnl.firmIncome)+' · 💵 нал '+zl(pnl.cashIncome||0)):'поступления за месяц')}
      ${kcard('Расход', zl(pnl.expenses))}
      ${kcard('Прибыль', `<span class="${(pnl.profit||0)<0?'neg':'pos'}">${zl(pnl.profit)}</span>`,'маржа '+pct(pnl.margin))}
      ${kcard('ROI', `<span class="${(pnl.roi||0)<0?'neg':'pos'}">${pct(pnl.roi)}</span>`, pnl.newCases!=null?('новые сделки '+zl(pnl.newCases)):'')}
    </div>`;
    if((pnl.profit||0)<0){
      html += `<div class="hint neg">⚠ Прибыль отрицательная: расходы выше поступлений. Основная выручка ещё в дебиторке — контракты ${zl(pm.contracted)}, собрано ${zl(pm.collected)} (не собрано ~${zl(pm.contracted-pm.collected)}).</div>`;
    }
    // разбивка расходов по статьям + связка с выручкой
    if(pnl.expenseCats && Object.keys(pnl.expenseCats).length){
      const cats=Object.entries(pnl.expenseCats).map(([k,v])=>({name:k,amount:v})).sort((a,b)=>b.amount-a.amount);
      const totExp=cats.reduce((s,c)=>s+c.amount,0), income=pnl.income||0;
      html += `<div class="grid g2" style="margin-top:14px">
        <div class="card exp-card clickable" onclick="this.classList.toggle('open')">
          <div class="lbl" style="margin-bottom:10px">Расходы по статьям <span class="tap muted" style="font-size:11px">· нажми — график 📊</span></div>
          ${cats.map(c=>`<div style="margin:9px 0">
            <div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span>${c.name}</span><span class="muted">${zl(c.amount)} · ${Math.round(c.amount/totExp*100)}%</span></div>
            <div class="bar-track" style="margin-top:0"><div class="bar-fill" style="width:${c.amount/totExp*100}%;background:${expColor(c.name)}"></div></div></div>`).join('')}
          <div class="hint">Каждая статья — % от расходов. Реклама ${Math.round((pnl.expenseCats['Реклама']||0)/income*100)}% от выручки.</div>
          <div class="exp-donut">${donutChart(cats, totExp)}</div>
        </div>
        <div class="card"><div class="lbl" style="margin-bottom:10px">Выручка → расходы</div>
          ${incomeVsExpense(income, totExp, cats)}
        </div>
      </div>`;
    }
    // распределение прибыли (10 реинвест + 10 резерв + 80 дивиденды → Влад 64% / Аким 16%)
    if(d.founders && d.founders.profitSplit && pnl.profit!=null){
      const ps=d.founders.profitSplit, dv=d.founders.dividends||{Влад:80,Аким:20}, P=pnl.profit;
      const parts=[
        {n:'Фонд реинвестиции', pct:ps['Реинвестиция']||10, col:'#38bdf8'},
        {n:'Резервный фонд', pct:ps['Резерв']||10, col:'#8B82E8'},
        {n:'Влад', pct:Math.round((ps['Дивиденды']||80)*(dv['Влад']||80)/100), col:'#34d399'},
        {n:'Аким', pct:Math.round((ps['Дивиденды']||80)*(dv['Аким']||20)/100), col:'#fde047'},
      ];
      html += secTitle('💸','Распределение прибыли','как делим прибыль, когда она есть: фонды → доли');
      if(P>0){
        html += `<div class="grid g4">${parts.map(p=>kcard(p.n, zl(P*p.pct/100), p.pct+'% прибыли')).join('')}</div>
          <div class="hint">Прибыль ${zl(P)} делится: 10% реинвестиции + 10% резерв + 80% дивиденды (Влад/Аким 80/20).</div>`;
      } else {
        html += `<div class="card"><div class="hint neg" style="margin-top:0">Прибыль в минусе (${zl(P)}) — распределять пока нечего. Правило заработает, как выйдешь в плюс:</div>
          <div style="margin-top:12px">${parts.map(p=>`<div style="margin:8px 0"><div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${p.n}</span><span class="muted">${p.pct}%</span></div><div class="bar-track" style="margin-top:0"><div class="bar-fill" style="width:${p.pct}%;background:${p.col}"></div></div></div>`).join('')}</div>
          <div class="hint">Кредит Акима (44 800 zł) гасится отдельно — не из этого распределения.</div></div>`;
      }
    }
  }

  if(pnl) html += accC();

  // ===== УЧРЕДИТЕЛИ (глобально) =====
  if(d.founders){
    const f=d.founders;
    html += accO('🤝','Учредители · кредит Акима и доли', false);
    const repPct = f.akimTotal? Math.round((f.akimRepaid||0)/f.akimTotal*100):0;
    html += `<div class="grid g3">
      ${kcard('Долг Акиму (осталось)', zl(f.akimRemaining), f.akimRepaid?('погашено '+zl(f.akimRepaid)+' из '+zl(f.akimTotal)):('всего '+zl(f.akimTotal)+' · нал'))}
      ${kcard('Доля Влада', (f.dividends['Влад']||0)+'%', 'дивиденды')}
      ${kcard('Доля Акима', (f.dividends['Аким']||0)+'%', 'дивиденды')}
    </div>`;
    html += `<div class="card" style="margin-top:14px">
      <div class="lbl" style="margin-bottom:8px">Погашение долга Акиму</div>
      <div class="bar-track" style="height:12px"><div class="bar-fill" style="width:${repPct}%;background:linear-gradient(90deg,var(--em),var(--gold))"></div></div>
      <div class="hint">Погашено ${zl(f.akimRepaid)} из ${zl(f.akimTotal)} · осталось ${zl(f.akimRemaining)} (${repPct}%). ${f.akimRepaid?'':'Начинаем гасить с августа.'}</div>
      ${(f.akim.repayments&&f.akim.repayments.length)?`<table style="margin-top:10px"><thead><tr><th>Дата</th><th class="n">Погашено</th></tr></thead><tbody>${f.akim.repayments.map(r=>`<tr><td>${r.date?dLabel(r.date):'—'}</td><td class="n pos">${zl(r.amount)}</td></tr>`).join('')}</tbody></table>`:''}
    </div>`;
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:8px">Кредит Акима (заёмные, всё нал) — из чего состоит</div>
      <table><tbody>${f.akim.items.map(i=>`<tr><td>${i.label}${i.cash?' <span class="chip">нал</span>':''}</td><td class="n">${zl(i.amount)}</td></tr>`).join('')}
      <tr><td style="font-weight:700">Итого</td><td class="n" style="font-weight:750;color:var(--gold)">${zl(f.akimTotal)}</td></tr></tbody></table></div>`;
    html += accC();
  }

  html += twC() + twO('main');
  // ===== ЖДЁМ ОПЛАТ (дебиторка, глобально — не зависит от выбранного месяца) =====
  if(d.receivables && d.receivables.count){
    const rc=d.receivables, todayKey=d.curMonthKey, todayIso=(d.generatedAt||'').slice(0,10);
    const monthCards = rc.byMonth.filter(m=>m.month!=='—').map(m=>{
      const overdue = m.month < todayKey;
      return kcard((overdue?'⚠ ':'')+mLabel(m.month), zl(m.sum), m.count+' сделок'+(overdue?' · просрочено':''));
    });
    const noDate = rc.byMonth.find(m=>m.month==='—');
    html += secTitle('⏳','Ждём оплат','кто и когда должен доплатить — это твои будущие деньги');
    html += `<div class="grid g4">
      ${kcard('Всего ждём', zl(rc.total), rc.count+' открытых сделок')}
      ${monthCards.slice(0,2).join('')}
      ${noDate?kcard('Без дедлайна', zl(noDate.sum), noDate.count+' — проставить дату'):''}
    </div>`;
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:8px">Ближайшие оплаты</div>
      <table><thead><tr><th>Клиент</th><th>Продавец</th><th class="n">Ждём</th><th class="n">Дедлайн</th><th>Статус</th></tr></thead>
      <tbody>${rc.items.slice(0,15).map(i=>{const od=i.deadline&&i.deadline<todayIso;
        return `<tr><td>${i.name}</td><td class="muted">${i.closer}</td><td class="n">${zl(i.remain)}</td><td class="n ${od?'neg':''}">${i.deadline?dLabel(i.deadline):'—'}</td><td class="muted" style="font-size:12px">${i.status}</td></tr>`}).join('')}</tbody></table>
      <div class="hint">Ближайшие 15 из ${rc.count}. Красный дедлайн = просрочен. Собрать это → уйдёт в плюс.</div></div>`;
  }

  html += twC() + twO('clients');
  // ===== 👩‍💼 КЛИЕНТЫ В ПРОИЗВОДСТВЕ (Kommo, Даша) =====
  if(d.ops){
    const o=d.ops;
    html += secTitle('👩‍💼','Клиенты в производстве','что происходит с клиентами после оплаты — зона Даши');
    html += `<div class="grid g4">
      ${kcard('Дел в работе', o.total, 'воронка «Легализация»')}
      ${kcard('Застряло >7 дней', `<span class="${o.staleCount>5?'neg':''}">${o.staleCount}</span>`, o.stale.length?('топ: '+o.stale[0].days+' дн. без движения'):'')}
      ${kcard('Активность · 30 дн', (o.notes30.capped?'250+':o.notes30.total), 'заметок по делам')}
      ${kcard('Писем клиентам', o.notes30.emails, 'за 30 дней')}
    </div>`;
    html += `<div class="grid g2" style="margin-top:14px">
      <div class="card"><div class="lbl" style="margin-bottom:10px">По стадиям</div>
        ${hbars(o.byStage, x=>x.count, x=>x.stage, ()=>'var(--cyan)')}</div>
      <div class="card"><div class="lbl" style="margin-bottom:8px">Застоявшиеся дела · без движения</div>
        <table><thead><tr><th>Клиент</th><th>Стадия</th><th class="n">Дней</th></tr></thead>
        <tbody>${o.stale.map(x=>`<tr><td>${x.name}</td><td class="muted" style="font-size:12px">${x.stage}</td><td class="n ${x.days>14?'neg':''}">${x.days}</td></tr>`).join('')||'<tr><td colspan=3 class="muted">все дела в движении 👍</td></tr>'}</tbody></table>
        <div class="hint">Дней с последнего изменения сделки в Kommo. Красное >14 дней — глянуть с Дашей.</div></div>
    </div>`;
  }

  // ===== САЙТ =====
  if(site){
    const per = site.period? (`${site.period.days} дней · до ${dLabel(site.period.end)}`):'';
    const staleDays = site.period? Math.round((new Date(d.generatedAt)-new Date(site.period.end))/864e5) : 0;
    html += accO('🌐','Сайт · '+per+(staleDays>3?' ⚠':''), false);
    if(staleDays>3) html += `<div class="hint" style="margin:-6px 2px 10px">⚠ Данные сайта устарели на ${staleDays} дн. — нужно прогнать analytics-agent.</div>`;
    html += `<div class="grid g4">
      ${kcard('Пользователи', nf(site.users), 'сессий '+nf(site.sessions))}
      ${kcard('Просмотры', nf(site.views))}
      ${kcard('Клики WhatsApp', nf(site.wa),'звонки '+nf(site.phone))}
      ${kcard('Конверсия', pct(site.conv),'отказы '+pct(site.bounce))}
    </div>`;
    const traf=(site.daily||[]).map(x=>x.users||0);
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:6px">Трафик по дням</div>
      ${traf.length?sparkline(traf,{color:'var(--p-l)'}):''}</div>`;
    html += `<div class="grid g2" style="margin-top:14px">
      <div class="card"><div class="lbl" style="margin-bottom:10px">Источники трафика</div>
        ${hbars((site.sources||[]).slice(0,7),x=>x.sessions,x=>srcLabel(x),x=>x.paid?'var(--gold)':'var(--p-l)')}</div>
      <div class="card"><div class="lbl" style="margin-bottom:10px">Страны</div>
        <table><tbody>${(site.countries||[]).map(c=>`<tr><td>${countryLabel(c.country)}${c.bot?' <span class="chip">бот</span>':''}</td><td class="n">${nf(c.users)}</td></tr>`).join('')}</tbody></table></div>
    </div>`;
  }

  html += `<div class="hint" style="margin-top:26px;text-align:center">Источники: таблицы закрытий · реклама · PnL · GA4. Всего сделок в базе: ${d.closingsTotal||'—'}.</div>`;

  html += twC();
  $('#content').innerHTML = html;
  const ms=$('#monthSel'); if(ms) ms.onchange=e=>{ CUR_KEY=e.target.value; render(DATA); };
  animateNumbers();
}

// ---- экран продавца: только свои метрики + счёт команды + свои должники ----
function renderSeller(d){
  if(!CUR_KEY || !(d.months && d.months[CUR_KEY])) CUR_KEY = d.defaultMonth || d.curMonthKey;
  const m = (d.months||{})[CUR_KEY] || {};
  const me = m.me;
  const h1=$('#app h1'); if(h1) h1.textContent='Кабинет продаж';
  $('#genLabel').textContent = (d.name||'')+' · мои продажи · обновлено '+(d.generatedLabel||'')+' в '+String(d.generatedAt||'').slice(11,16);
  const monSel = (d.monthOrder&&d.monthOrder.length)
    ? `<div style="display:flex;align-items:center;gap:10px;margin:2px 2px 4px">
         <span class="muted" style="font-size:12px">Месяц:</span>
         <select id="monthSel" style="background:var(--card2);color:var(--tx);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer">
           ${d.monthOrder.map(k=>`<option value="${k}" ${k===CUR_KEY?'selected':''}>${mLabel(k)}${k===d.curMonthKey?' · идёт':''}</option>`).join('')}
         </select></div>` : '';
  let html = monSel;
  html += secTitle('🎯','Мои продажи · '+mLabel(CUR_KEY));
  if(me){
    const teamPct = m.goal? Math.round(m.closings/m.goal*100) : null;
    html += `<div class="grid g4">
      ${kcard('Мои закрытия', me.closings??'—', 'сделок за месяц')}
      ${kcard('Собрано 1-е', zl(me.fact), me.plan?('план '+zl(me.plan)):'')}
      ${kcard('% моего плана', me.planPct!=null?pct(me.planPct):'—','по деньгам')}
      ${kcard('Средний чек', zl(me.avgCheck))}
    </div>`;
    html += `<div class="grid g2" style="margin-top:14px">
      ${sellerCard(me)}
      <div class="card"><div class="lbl" style="margin-bottom:8px">Команда к плану месяца</div>
        <div class="bar-track" style="height:12px"><div class="bar-fill" style="width:${Math.min(100,teamPct||0)}%"></div></div>
        <div class="hint">Команда: ${m.closings??'—'} из ${m.goal??'—'} закрытий${teamPct!=null?(' · '+teamPct+'%'):''}. Твой вклад: ${me.closings??0}.</div>
      </div>
    </div>`;
  } else {
    html += `<div class="card"><div class="muted">Нет данных за этот месяц.</div></div>`;
  }
  if(m.deals && m.deals.length){
    html += accO('📋','Мои закрытия · '+mLabel(CUR_KEY)+' · '+m.deals.length, true);
    html += `<div class="card">${dealsTable(m.deals)}</div>`;
    html += accC();
  }
  const rc = d.receivables||{};
  if(rc.count){
    const todayIso=(d.generatedAt||'').slice(0,10);
    html += secTitle('⏳','Мои клиенты — ждём оплат');
    html += `<div class="card"><div class="lbl" style="margin-bottom:8px">Всего ждём ${zl(rc.total)} · ${rc.count} клиентов</div>
      <table><thead><tr><th>Клиент</th><th class="n">Ждём</th><th class="n">Дедлайн</th><th>Статус</th></tr></thead>
      <tbody>${rc.items.map(i=>{const od=i.deadline&&i.deadline<todayIso;
        return `<tr><td>${i.name}</td><td class="n">${zl(i.remain)}</td><td class="n ${od?'neg':''}">${i.deadline?dLabel(i.deadline):'—'}</td><td class="muted" style="font-size:12px">${i.status}</td></tr>`}).join('')}</tbody></table>
      <div class="hint">Красный дедлайн = просрочен — дожми оплату.</div></div>`;
  }
  $('#content').innerHTML = html;
  const ms=$('#monthSel'); if(ms) ms.onchange=e=>{ CUR_KEY=e.target.value; renderSeller(DATA); };
  animateNumbers();
}

// плавный «набег» цифр (count-up) для KPI; в конце ставит точный исходный текст
function animateNumbers(){
  document.querySelectorAll('.k .val, .hero .val, .sig .sv').forEach(el=>{
    if(el.dataset.anim) return; el.dataset.anim='1';
    let t=el; while(t.children.length===1 && t.children[0].tagName==='SPAN') t=t.children[0];
    const txt=t.textContent;
    if(txt.includes('—')) return;
    const m=txt.match(/-?\d[\d\s\u00a0]*(?:[.,]\d+)?/);
    if(!m) return;
    const numStr=m[0].replace(/[\s\u00a0]+$/,'');
    const target=parseFloat(numStr.replace(/[\s\u00a0]/g,'').replace(',','.'));
    if(isNaN(target)) return;
    const prefix=txt.slice(0,m.index), suffix=txt.slice(m.index+numStr.length);
    const dec=/[.,]\d/.test(numStr)?1:0;
    const start=performance.now(), dur=700;
    const fmt=v=>dec? v.toFixed(1).replace('.',',') : Math.round(v).toLocaleString('ru-RU');
    (function tick(){
      let p=Math.min(1,(performance.now()-start)/dur); p=1-Math.pow(1-p,3);
      t.textContent = p<1 ? prefix+fmt(target*p)+suffix : txt;
      if(p<1) requestAnimationFrame(tick);
    })();
    setTimeout(function(){ t.textContent=txt; }, dur+120);  // страховка: финал всегда точный
  });
}

function secTitle(ic,t,desc){ return `<div class="sec-title"><span class="ic">${ic}</span>${t}</div>`+(desc?`<div class="hint" style="margin:-8px 2px 12px">${desc}</div>`:''); }
// сворачиваемая секция: accO(...)+контент+accC() — второстепенное по умолчанию свёрнуто
function accO(ic,t,open){ return `<details class="acc"${open?' open':''}><summary><span class="ic">${ic}</span>${t}</summary><div class="accb">`; }
function accC(){ return `</div></details>`; }
function buildAlerts(d, pm, pnl){
  const a=[], rc=d.receivables||{}, today=(d.generatedAt||'').slice(0,10);
  const overdue=(rc.items||[]).filter(i=>i.deadline&&i.deadline<today);
  const oSum=overdue.reduce((s,i)=>s+(i.remain||0),0);
  if(overdue.length) a.push({sev:'red',ico:'⏰',t:`Просрочено ${zl(oSum)} — ${overdue.length} клиент(ов) не доплатили в срок. Дожать.`,
    d:overdue.slice(0,4).map(i=>i.name+' · '+zl(i.remain)+' · был срок '+dLabel(i.deadline)).join('  ·  ')+(overdue.length>4?' …':'')});
  if(pnl&&pnl.profit<0) a.push({sev:'red',ico:'📉',t:`Прибыль ${zl(pnl.profit)} — расходы выше собранного.`,
    d:`В дебиторке ${zl(rc.total)} — собрать её = выйти в плюс.`});
  const noDl=(rc.byMonth||[]).find(m=>m.month==='—');
  if(noDl&&noDl.sum>5000) a.push({sev:'yellow',ico:'📅',t:`${zl(noDl.sum)} дебиторки без дедлайна (${noDl.count} сделок).`,
    d:'Проставь даты 2-х оплат в «клиентах» — прогноз денег станет точным.'});
  if(pm.roasTrafficP1!=null&&pm.roasTrafficP1<1.2) a.push({sev:'yellow',ico:'📣',t:`Трафик окупается ×${pm.roasTrafficP1} первой оплатой — впритык.`,
    d:`Закрытие с трафика стоит ${zl(pm.cacTraffic)}; прибыль трафика приходит со 2-х оплат (потенциал ×${pm.roasTrafficContract}).`});
  (pm.bySeller||[]).forEach(s=>{
    if(s.wa&&s.wa.spendUsd>50&&s.wa.leads<5) a.push({sev:'yellow',ico:'⚠️',t:`${s.name}: WA-кабинет потратил $${nf(s.wa.spendUsd)}, а заявок внесено ${s.wa.leads}.`,
      d:'Либо не вносит заявки в таблицу, либо кабинет сливает — спросить.'});
    if(s.plan&&s.planPct!=null&&s.planPct<60) a.push({sev:'yellow',ico:'🎯',t:`${s.name}: ${pct(s.planPct)} личного плана (${zl(s.fact)} из ${zl(s.plan)}).`,d:null});
    if(s.leadsTaken&&s.closings&&s.closings/s.leadsTaken>=0.4) a.push({sev:'green',ico:'🔥',t:`${s.name}: конверсия ${Math.round(s.closings/s.leadsTaken*100)}% из взятых лидов — очень сильно.`,d:null});
  });
  const gi=d.trend.findIndex(x=>x.month===CUR_KEY);
  if(gi>0&&d.trend[gi-1].closings){const g=Math.round((d.trend[gi].closings-d.trend[gi-1].closings)/d.trend[gi-1].closings*100);
    if(g>=30) a.push({sev:'green',ico:'🚀',t:`Закрытия выросли на ${g}% к прошлому месяцу (${d.trend[gi-1].closings} → ${d.trend[gi].closings}).`,d:null});}
  if(d.ops&&d.ops.staleCount>5) a.push({sev:'yellow',ico:'🐌',t:`${d.ops.staleCount} дел в производстве без движения >7 дней (топ ${d.ops.stale[0]?d.ops.stale[0].days:''} дн.).`,d:'Вкладка «Клиенты» → список. Глянуть с Дашей.'});
  const order={red:0,yellow:1,green:2};
  return a.sort((x,y)=>order[x.sev]-order[y.sev]).slice(0,7);
}
function renderAlerts(list){
  if(!list.length) return '';
  return `<div class="sec-title"><span class="ic">⚡</span>Важное сейчас</div><div class="alerts">`+
    list.map(x=>`<div class="alert ${x.sev}"><div class="aico">${x.ico}</div><div><div class="at">${x.t}</div>${x.d?`<div class="ad">${x.d}</div>`:''}</div></div>`).join('')+`</div>`;
}
function renderHealth(d, pm, fc, pnl){
  const C={g:'#34d399',y:'#fbbf24',r:'#fb7185'};

    {t:'Цена лида', v:zl(pm.cpl), st:pm.cpl==null?'y':(pm.cpl<40?'g':(pm.cpl<70?'y':'r')), note:nf(pm.leads)+' лидов'},

    <div class="sig clickable" ${go[i]?`onclick="setTab('${go[i]}')"`:''}><div class="sglow" style="background:radial-gradient(120px 60px at 92% 0%,${C[s.st]},transparent)"></div>
      <div class="st"><span class="sdot" style="color:${C[s.st]}"></span>${s.t}</div>
      <div class="sv" style="color:${C[s.st]}">${s.v}</div>
      <div class="st" style="margin-top:2px">${s.note}</div></div>`).join('')+`</div>`;
}
function sellerCard(s){
  const pp=s.planPct;

  return `<div class="card">
    <div class="flex" style="justify-content:space-between;align-items:center">
      <div style="font-size:17px;font-weight:750">${s.name}</div>
      <span class="chip">${s.closings} закрытий</span>
    </div>
    ${s.plan?`<div style="margin-top:12px">
      <div class="flex" style="justify-content:space-between;font-size:12px;color:var(--tx-d)"><span>План / факт</span><span style="color:${col};font-weight:700">${pct(s.planPct)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,s.planPct||0)}%;background:${col}"></div></div>

    <div style="display:grid;grid-template-columns:repeat(2,1fr);margin-top:14px;gap:12px">
      ${cell('Лидов в работе', s.leadsTaken!=null? (nf(s.leadsTaken)+(s.closings&&s.leadsTaken?(' <span class="muted" style="font-size:12px">→ '+Math.round(s.closings/s.leadsTaken*100)+'%</span>'):'')) : '<span class="muted" style="font-size:12px">вкладку не ведёт ⚠</span>')}
      ${cell('Выручка (1+2)', zl(s.revenue))}
      ${cell('Средний чек', zl(s.avgCheck))}
      ${cell('Собрано 1-я', zl(s.fact))}
      ${cell('Ждём 2-я', zl(s.pay2))}
      ${s.wa?cell('WA-кабинет · входящие', '$'+nf(s.wa.spendUsd)+' <span class="muted" style="font-size:12px">· '+s.wa.leads+' лидов</span>'):''}
      ${s.wa&&s.wa.cpl!=null?cell('CPL входящих (WA)', '$'+s.wa.cpl):''}
      ${s.wa&&s.wa.leads&&s.sources&&s.sources['входящий']?cell('Конверсия WA-входящих', Math.round(s.sources['входящий']/s.wa.leads*100)+'% <span class="muted" style="font-size:11px">('+s.sources['входящий']+' из '+s.wa.leads+' заявок)</span>'):''}
    </div>
    ${s.services&&s.services.length?`<div style="margin-top:14px">
      <div style="font-size:11px;color:var(--tx-dd);margin-bottom:6px">Что закрывает</div>
      ${s.services.map(sv=>`<div class="flex" style="justify-content:space-between;font-size:12.5px;margin:3px 0"><span>${sv.service}</span><span class="chip">${sv.count}</span></div>`).join('')}</div>`:''}
    ${s.sources?`<div style="margin-top:12px"><div style="font-size:11px;color:var(--tx-dd);margin-bottom:6px">Источники (из чата)</div>
      ${Object.entries(s.sources).map(([k,v])=>`<span class="chip" style="margin-right:6px">${srcLabelRu(k)} ${v}</span>`).join('')}</div>`:''}

function monthName(block,d,which){
  // подпись выбранного в переключателе месяца
  return mLabel(CUR_KEY || d.prevMonthKey || d.curMonthKey);
}
function srcLabel(x){ return (x.source||x.channel||'—') + (x.paid?' · платный':''); }
function expColor(n){ return n==='Реклама'?'#fde047':n==='Зарплаты'?'#38bdf8':n==='Операционные'?'#8B82E8':n==='Налоги'?'#fb7185':'#6b61e0'; }
function srcLabelRu(s){ return {'лид':'🎯 С рекламы (FB)','тикток':'🎵 TikTok','входящий':'💬 Входящие','суприм':'📇 Supremes (база)','сарафан':'🤝 Сарафан','груп':'👥 Групповое'}[s]||s; }
function dealsTable(deals){
  return `<div style="overflow-x:auto"><table><thead><tr>
    <th>Дата</th><th>Клиент</th><th>Услуга</th><th>Продавец</th><th class="n">Цена</th><th class="n">Оплачено</th><th>Статус</th></tr></thead>
    <tbody>${deals.map(x=>{const open=(x.full||0)-(x.paid||0)>0;
      return `<tr><td class="muted num">${dLabel(x.date)}</td><td>${x.name}</td><td class="muted" style="font-size:12px">${x.service||'—'}</td><td class="muted">${x.closer}</td>
      <td class="n num">${zl(x.full)}</td><td class="n num ${open?'':'pos'}">${zl(x.paid)}</td>
      <td style="font-size:11.5px" class="${open?'muted':'pos'}">${x.status||'—'}</td></tr>`}).join('')}</tbody></table></div>`;

function srcColor(s){ return {'лид':'#fde047','тикток':'#fb7185','входящий':'#38bdf8','суприм':'#8B82E8','сарафан':'#34d399','груп':'#fbbf24'}[s]||'#6b61e0'; }
function donutChart(cats, total){
  const r=54, cx=70, cy=70, circ=2*Math.PI*r; let off=0;
  const segs=cats.map(c=>{const len=(c.amount/total)*circ;
    const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${expColor(c.name)}" stroke-width="20" stroke-dasharray="${len.toFixed(1)} ${(circ-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len; return seg;}).join('');
  return `<div class="flex" style="gap:22px;flex-wrap:wrap;align-items:center">
    <svg width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0">${segs}
      <text x="${cx}" y="${cy-1}" text-anchor="middle" fill="var(--tx)" font-size="15" font-weight="750" class="num">${nf(total)}</text>
      <text x="${cx}" y="${cy+15}" text-anchor="middle" fill="var(--tx-dd)" font-size="10">zł расход</text></svg>
    <div style="flex:1;min-width:150px">${cats.map(c=>`<div class="flex" style="justify-content:space-between;margin:7px 0;font-size:13px">
      <span><span class="dot" style="background:${expColor(c.name)}"></span>${c.name}</span>
      <span class="muted num">${zl(c.amount)} · ${Math.round(c.amount/total*100)}%</span></div>`).join('')}</div>
  </div>`;
}
function incomeVsExpense(income, totExp, cats){
  const max=Math.max(income,totExp)||1;
  const stack=cats.map(c=>`<div style="height:100%;width:${c.amount/max*100}%;background:${expColor(c.name)}"></div>`).join('');
  const loss=totExp-income;
  return `<div style="font-size:12px;color:var(--tx-d);margin-bottom:5px">Выручка · ${zl(income)}</div>
    <div class="bar-track" style="height:22px;margin-top:0"><div style="height:100%;width:${income/max*100}%;background:var(--em);border-radius:9px"></div></div>
    <div style="font-size:12px;color:var(--tx-d);margin:14px 0 5px">Расходы · ${zl(totExp)}</div>
    <div class="bar-track" style="height:22px;margin-top:0;display:flex;gap:1px;overflow:hidden">${stack}</div>
    <div class="lgd">${cats.map(c=>`<span><span class="dot" style="background:${expColor(c.name)}"></span>${c.name}</span>`).join('')}</div>
    <div class="hint ${loss>0?'neg':'pos'}">${loss>0?('Расходы больше выручки на '+zl(loss)+' ('+Math.round(loss/income*100)+'%) — отсюда минус в прибыли.'):('Прибыль '+zl(income-totExp))}</div>`;
}

// --- Страны: авто-флаг + русское имя по названию из GA4 (англ.) ---
// ISO2 → эмодзи флага (региональные индикаторы). Название нормализуем через карту ниже.
function flagEmoji(iso){
  if(!iso) return '🌐';
  return iso.toUpperCase().replace(/[A-Z]/g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}
// GA4 отдаёт страны по-английски. Карта: англ. имя → [ISO2, рус. имя].
// Покрывает основную аудиторию LS; чего нет — показываем как есть с 🌐.

  'Poland':['PL','Польша'], 'Ukraine':['UA','Украина'], 'Belarus':['BY','Беларусь'],
  'Russia':['RU','Россия'], 'Germany':['DE','Германия'], 'United States':['US','США'],
  'United Kingdom':['GB','Великобритания'], 'France':['FR','Франция'], 'Italy':['IT','Италия'],
  'Spain':['ES','Испания'], 'Netherlands':['NL','Нидерланды'], 'Czechia':['CZ','Чехия'],
  'Lithuania':['LT','Литва'], 'Latvia':['LV','Латвия'], 'Georgia':['GE','Грузия'],
  'Armenia':['AM','Армения'], 'Azerbaijan':['AZ','Азербайджан'], 'Kazakhstan':['KZ','Казахстан'],
  'Uzbekistan':['UZ','Узбекистан'], 'Tajikistan':['TJ','Таджикистан'], 'Kyrgyzstan':['KG','Киргизия'],
  'Turkey':['TR','Турция'], 'India':['IN','Индия'], 'Pakistan':['PK','Пакистан'],
  'Bangladesh':['BD','Бангладеш'], 'Nepal':['NP','Непал'], 'Sri Lanka':['LK','Шри-Ланка'],
  'Philippines':['PH','Филиппины'], 'Indonesia':['ID','Индонезия'], 'Vietnam':['VN','Вьетнам'],
  'China':['CN','Китай'], 'Singapore':['SG','Сингапур'], 'Nigeria':['NG','Нигерия'],
  'Egypt':['EG','Египет'], 'Morocco':['MA','Марокко'], 'Algeria':['DZ','Алжир'],
  'Tunisia':['TN','Тунис'], 'Kenya':['KE','Кения'], 'Ghana':['GH','Гана'],
  'Cameroon':['CM','Камерун'], 'Zimbabwe':['ZW','Зимбабве'], 'South Africa':['ZA','ЮАР'],
  'Brazil':['BR','Бразилия'], 'Colombia':['CO','Колумбия'], 'Mexico':['MX','Мексика'],
  'Iran':['IR','Иран'], 'Iraq':['IQ','Ирак'], 'Syria':['SY','Сирия'],
  'Afghanistan':['AF','Афганистан'], 'United Arab Emirates':['AE','ОАЭ'], 'Saudi Arabia':['SA','Саудовская Аравия'],
  '(not set)':['','Не определено']
};
function countryLabel(name){
  const m = COUNTRY[name];
  const iso = m ? m[0] : '';
  const ru  = m ? m[1] : (name || '—');
  return flagEmoji(iso) + ' ' + ru;
}
function splitBar(lead,inc){
  const tot=(lead||0)+(inc||0);
  if(!tot) return '<div class="muted">нет отмеченных</div>';
  const lp=lead/tot*100;
  return `<div class="bar-track" style="height:22px;border-radius:8px;display:flex">
    <div style="width:${lp}%;background:var(--p)"></div><div style="flex:1;background:var(--gold)"></div></div>
    <div class="lgd"><span><span class="dot" style="background:var(--p)"></span>Лиды: ${lead}</span>
    <span><span class="dot" style="background:var(--gold)"></span>Входящие: ${inc}</span></div>`;
}
