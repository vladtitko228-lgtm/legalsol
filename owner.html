<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0A0918">
<title>LEGALSOL — Кабинет владельца</title>
<link rel="icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=Unbounded:wght@500;600&display=swap">
<style>
/* ============ Executive Dark — чернильный терминал ============ */
:root{
  --bg:#0A0918; --srf:#131126; --srf2:#1A1832; --srf3:#221F3E;
  --hair:rgba(255,255,255,.07); --div:rgba(255,255,255,.12);
  --t1:#F4F2FF; --t2:#A9A5C9; --t3:#8984B2;
  --acc:#7C72F2; --acc-dim:#6B61E0; --acc-soft:rgba(124,114,242,.15);
  --gold:#FDE047; --gold2:#EAB308;
  --good:#3ECF8E; --warn:#FF9E58; --bad:#FF6B6B;
  --good-bg:rgba(62,207,142,.10); --warn-bg:rgba(255,158,88,.10); --bad-bg:rgba(255,107,107,.10);
  --good-glow:rgba(62,207,142,.14); --warn-glow:rgba(255,158,88,.14); --bad-glow:rgba(255,107,107,.14);
  --s1:#7C72F2; --s2:#3987E5; --cum:#C4B5FD; --neut:#8B87A8;
  --grid:rgba(255,255,255,.06); --axis:rgba(255,255,255,.24);
  --r:16px;
}
*{box-sizing:border-box} html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--t1);min-height:100vh;
  font-family:'Golos Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(900px 560px at 8% -6%, rgba(107,97,224,.07), transparent 60%)}
a{color:var(--acc)}
.wrap{position:relative;z-index:1;max-width:1220px;margin:0 auto;padding:0 24px 64px}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.pos{color:var(--good)} .neg{color:var(--bad)}
.mut{color:var(--t3)} .t2{color:var(--t2)}
.hidden{display:none!important}
.center{text-align:center;color:var(--t3);padding:48px 12px}

/* ---------- шапка ---------- */
header{position:sticky;top:0;z-index:70;display:flex;align-items:center;gap:14px;height:56px;
  margin:0 -24px;padding:0 24px;background:rgba(10,9,24,.82);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--hair)}
.brand{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;letter-spacing:.12em;color:var(--t1)}
.brand small{display:block;font-family:'Golos Text';font-size:10.5px;font-weight:500;letter-spacing:.06em;color:var(--t3);text-transform:uppercase}
.spacer{flex:1}
#genLabel{font-size:12px;color:var(--t3)}
.ghost{background:none;border:1px solid var(--hair);color:var(--t2);width:40px;height:40px;border-radius:12px;
  font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.ghost:hover{color:var(--t1);border-color:var(--acc)}
.ghost.spin svg{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ---------- лента топ-метрик ---------- */
.tstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--hair);
  border:1px solid var(--hair);border-radius:14px;overflow:hidden;margin-top:16px}
.titem{background:var(--srf);border:0;padding:12px 16px;text-align:left;cursor:pointer;
  font-family:inherit;color:var(--t1);transition:background .12s;min-width:0}
.titem:hover{background:var(--srf2)}
.titem .tl{display:block;font-size:11px;font-weight:500;color:var(--t3);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.titem b{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
@media(max-width:900px){.tstrip{grid-template-columns:repeat(3,1fr)}.titem:nth-child(4),.titem:nth-child(5){border-top:1px solid var(--hair)}}
@media(max-width:640px){.tstrip{display:flex;overflow-x:auto;scrollbar-width:none;border-radius:12px}
  .tstrip::-webkit-scrollbar{display:none}
  .titem{flex:0 0 auto;padding:10px 14px;border-top:0!important}}

/* ---------- месяцы ---------- */
.months{display:flex;gap:8px;align-items:stretch;margin:16px 0 4px;overflow-x:auto;scrollbar-width:none;padding:2px}
.months::-webkit-scrollbar{display:none}
.mpill{flex-shrink:0;border:1px solid transparent;background:none;border-radius:12px;padding:7px 14px 6px;cursor:pointer;
  text-align:center;transition:.15s;color:var(--t3)}
.mpill b{display:block;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:inherit}
.mpill span{display:block;font-size:11px;font-weight:600;margin-top:3px}
.mpill.on{background:var(--srf2);border-color:var(--hair);color:var(--t1)}
.mpill:hover{color:var(--t1)}

/* ---------- вкладки ---------- */
.tabs{position:sticky;top:56px;z-index:60;display:flex;gap:2px;margin:14px 0 4px;padding:4px;
  background:var(--srf);border:1px solid var(--hair);border-radius:14px}
.tab{flex:1;background:none;border:0;border-radius:10px;padding:9px 8px;font-family:inherit;font-size:13px;
  font-weight:600;color:var(--t3);cursor:pointer;transition:.18s;white-space:nowrap}
.tab.on{background:var(--srf3);color:var(--t1)}
.tab:hover{color:var(--t1)}
.tabwrap{display:none} .tabwrap.on{display:block;animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* мобильный нижний таб-бар */
#tabbar{display:none}

/* ---------- карточки ---------- */
.card{position:relative;background:var(--srf);border:1px solid var(--hair);border-radius:var(--r);
  padding:20px;transition:border-color .15s,transform .15s}
.card:hover{border-color:rgba(124,114,242,.35)}
.grid{display:grid;gap:16px;margin-top:16px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}}
.sec{display:flex;align-items:baseline;gap:10px;margin:30px 2px 0;font-size:13px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.sec::after{content:"";flex:1;height:1px;background:var(--hair);align-self:center}
.sec-note{font-size:12.5px;color:var(--t3);margin:6px 2px 0;line-height:1.5}

/* ---------- hero + тайлы ---------- */
.heroCard{position:relative;overflow:visible;padding:24px}
.heroCard[onclick]{cursor:pointer}
.heroCard[onclick]:active{transform:scale(.995)}
.aura{position:absolute;left:-12%;top:-42%;width:124%;height:190%;border-radius:50%;
  filter:blur(60px);pointer-events:none;z-index:-1;animation:breathe 12s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.62}50%{transform:scale(1.06);opacity:1}}
.hlbl{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.hnum{font-size:56px;font-weight:700;letter-spacing:-.02em;line-height:1.05;margin-top:8px}
.hnum .zl{font-size:.5em;font-weight:500;color:var(--t2);margin-left:4px}
.hphrase{font-size:14px;color:var(--t2);margin-top:10px;line-height:1.55;max-width:640px}
.hside{position:absolute;right:24px;top:22px;text-align:right}
.tile{min-height:108px;display:flex;flex-direction:column;gap:7px}
.tile[onclick]{cursor:pointer}
.tile[onclick]:active{transform:scale(.99)}
.tile .lbl{font-size:12px;font-weight:500;color:var(--t3);display:flex;justify-content:space-between;gap:8px}
.tile .lbl .chev{color:var(--t3);font-size:11px}
.tile .kv{font-size:32px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
.tile .kv .zl{font-size:.55em;font-weight:500;color:var(--t2);margin-left:3px}
.tile .sub{font-size:12px;color:var(--t2);line-height:1.45;margin-top:auto}
.goldnum{background:linear-gradient(135deg,var(--gold),#F0B90B);-webkit-background-clip:text;background-clip:text;color:transparent}
.shimmer{background:linear-gradient(110deg,var(--gold) 20%,#fffbe0 40%,var(--gold2) 60%);background-size:220% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;animation:shim 1.2s ease-out 1}
@keyframes shim{from{background-position:180% 0}to{background-position:-40% 0}}
.chip{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 9px;border-radius:11px;
  font-size:12px;font-weight:600;background:var(--srf3);color:var(--t2);white-space:nowrap}
.chip.up{background:var(--good-bg);color:var(--good)}
.chip.dn{background:var(--bad-bg);color:var(--bad)}
.chip.w{background:var(--warn-bg);color:var(--warn)}
.chip.g{background:var(--good-bg);color:var(--good)}
.chip.b{background:var(--bad-bg);color:var(--bad)}
.chip.gold{background:rgba(253,224,71,.10);color:var(--gold)}

/* ---------- алерты ---------- */
.alerts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.alert{position:relative;display:flex;gap:12px;align-items:flex-start;padding:13px 16px 13px 18px;
  background:var(--srf);border:1px solid var(--hair);border-radius:13px}
.alert::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:2px;background:var(--t3)}
.alert.red::before{background:var(--bad);box-shadow:0 0 12px var(--bad-glow)}
.alert.yellow::before{background:var(--warn);box-shadow:0 0 12px var(--warn-glow)}
.alert.green::before{background:var(--good);box-shadow:0 0 12px var(--good-glow)}
.alert.red::before{animation:alertBreath 2.4s ease-in-out infinite}
@keyframes alertBreath{0%,100%{box-shadow:0 0 8px var(--bad-glow)}50%{box-shadow:0 0 20px rgba(255,107,107,.34)}}
.alert .at{font-size:14px;font-weight:600;line-height:1.45}
.alert .ad{font-size:13px;color:var(--t2);margin-top:3px;line-height:1.5}
.alert .abtn{margin-left:auto;flex-shrink:0;background:none;border:1px solid var(--hair);color:var(--t2);
  padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.alert .abtn:hover{border-color:var(--acc);color:var(--t1)}
.morebtn{background:none;border:1px dashed var(--hair);color:var(--t3);border-radius:12px;padding:9px;
  font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;width:100%}
.morebtn:hover{color:var(--t1)}

/* ---------- прогноз ИИ ---------- */
.aiCard{border-top:1px solid transparent;background:
  linear-gradient(var(--srf),var(--srf)) padding-box,
  linear-gradient(90deg,var(--acc),transparent 60%) border-box}
.aiCard .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* ---------- бары/метры ---------- */
.meter{height:10px;border-radius:5px;background:var(--acc-soft);overflow:hidden}
.meter>div{height:100%;border-radius:5px;background:var(--acc);transform-origin:left;animation:growX .7s cubic-bezier(.22,1,.36,1) both;animation-play-state:paused}
@keyframes growX{from{transform:scaleX(0)}}
.hrow{margin:10px 0}
.hrow .hl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;gap:8px}
.hrow .hl b{font-weight:600}
.hrow .hl .v{color:var(--t2);font-variant-numeric:tabular-nums}
.hrow .meter{height:8px}

/* ---------- воронка конверсии ---------- */
.funnel .fstep{display:grid;grid-template-columns:112px 1fr;gap:10px;align-items:center;margin-top:8px}
.funnel .fstep:first-child{margin-top:0}
.funnel .flbl{font-size:12px;color:var(--t2);text-align:right;line-height:1.3}
.funnel .fbarw{position:relative;height:28px}
.funnel .fbar{height:100%;border-radius:0 4px 4px 0;display:flex;align-items:center;justify-content:flex-end;
  padding:0 8px;min-width:34px;transform-origin:left;animation:growX .7s cubic-bezier(.22,1,.36,1) both;animation-play-state:paused}
.funnel .fbar b{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:#0A0918}
.funnel .ftrans{grid-column:2;font-size:12px;font-weight:600;color:var(--t3);padding:2px 0 2px 8px}
.funnel .ftrans .chip{height:20px}
.funnel .ffinal{margin-top:14px;font-size:14px;font-weight:600}
.funnel .fnote{font-size:12.5px;color:var(--t3);margin-top:6px;line-height:1.5}

/* ---------- карточка продавца ---------- */
.shead{display:flex;align-items:center;gap:12px}
.ava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7C72F2,#3987E5);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
.sname{font-size:16px;font-weight:600}
.smoney{margin-left:auto;font-size:20px;font-weight:700}
.seller .sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.seller .sg .l{font-size:11px;color:var(--t3)}
.seller .sg .v{font-size:15px;font-weight:600;margin-top:2px}
.seller .schips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}

/* ---------- таблицы ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);
  text-align:left;padding:8px 8px;border-bottom:1px solid var(--div)}
td{padding:11px 8px;border-bottom:1px solid var(--hair);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--srf2)}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ---------- аккордеон ---------- */
details.acc{margin-top:16px;background:var(--srf);border:1px solid var(--hair);border-radius:var(--r);overflow:hidden}
details.acc:hover{border-color:rgba(124,114,242,.35)}
details.acc summary{display:flex;align-items:center;gap:10px;padding:15px 18px;font-size:14px;font-weight:600;
  color:var(--t2);cursor:pointer;list-style:none;user-select:none;min-height:48px}
details.acc summary::-webkit-details-marker{display:none}
details.acc summary .arr{transition:transform .25s;color:var(--t3);font-size:12px}
details.acc[open] summary .arr{transform:rotate(90deg)}
details.acc summary .badge{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--acc);
  background:var(--acc-soft);padding:5px 12px;border-radius:16px;white-space:nowrap}
details.acc .accb{padding:2px 18px 18px}
details.acc .accb .card{background:var(--srf2)}

/* ---------- графики ---------- */
.chbox{position:relative;margin-top:12px;max-width:780px}
.chbox svg{display:block;width:100%}
.chx{position:absolute;top:0;bottom:0;width:1px;background:var(--axis);opacity:0;pointer-events:none}
.chtip{position:absolute;z-index:5;opacity:0;pointer-events:none;background:var(--srf3);
  border:1px solid var(--hair);border-radius:10px;padding:8px 11px;font-size:12px;min-width:110px;transition:opacity .1s}
.chtip .tt-x{font-weight:600;color:var(--t1);margin-bottom:4px}
.chtip .tt-row{display:flex;align-items:center;gap:6px;margin-top:3px;color:var(--t2)}
.chtip .tt-row b{color:var(--t1);font-variant-numeric:tabular-nums}
.chtip .tt-key{width:10px;height:3px;border-radius:2px;flex-shrink:0}
.xticks{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-top:5px;max-width:780px}
.lgd{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--t2);margin-top:10px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:-1px}
.dash{width:14px;height:2px;display:inline-block;margin-right:5px;vertical-align:3px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.4) 0 4px,transparent 4px 7px)}
.chbox .gr{transform-box:fill-box;transform-origin:bottom;animation:growY .6s cubic-bezier(.22,1,.36,1) both;animation-play-state:paused}
@keyframes growY{from{transform:scaleY(0)}}
.chbox path.draw{stroke-dasharray:1500;stroke-dashoffset:1500;animation:draw .9s ease-out .15s both;animation-play-state:paused}
@keyframes draw{to{stroke-dashoffset:0}}
circle.garc{animation:gauge 1s cubic-bezier(.34,1.3,.64,1) both;animation-play-state:paused}
@keyframes gauge{from{stroke-dashoffset:var(--full)}}
.panel-t{font-size:12px;color:var(--t3);font-weight:500;margin:10px 0 -6px}

/* ---------- сравнение по месяцам ---------- */
.cmp{display:grid;gap:0 14px;align-items:end}
.cmp-h{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);padding-bottom:8px}
.cmp-l{font-size:12.5px;color:var(--t2);padding:10px 0 11px;white-space:nowrap;border-top:1px solid var(--hair)}
.cmp-c{padding:10px 0 11px;border-top:1px solid var(--hair);min-width:0}
.cmp-c b{font-size:14px;font-weight:650;font-variant-numeric:tabular-nums;white-space:nowrap}
.cmp-d{font-size:10.5px;font-weight:600;margin-left:5px;white-space:nowrap}
.cmp-bar{height:4px;border-radius:2px;background:rgba(139,135,168,.14);margin-top:6px;overflow:hidden}
.cmp-bar>div{height:100%;border-radius:2px}

/* ---------- дашборды месяцев ---------- */
.dcols{display:flex;align-items:stretch;gap:10px;margin-top:14px;height:150px}
.dgrp{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
.dpair{display:flex;gap:4px;align-items:flex-end;justify-content:center;flex:1;width:100%}
.dcolw{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;flex:0 1 34px;min-width:16px;position:relative}
.dcol{width:100%;max-width:24px;border-radius:4px 4px 0 0;animation:growY .6s cubic-bezier(.22,1,.36,1) both;animation-play-state:paused;transform-origin:bottom}
.dval{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px;white-space:nowrap;font-variant-numeric:tabular-nums}
.dlbl{font-size:11px;color:var(--t3);margin-top:7px;white-space:nowrap}
.dgoal{position:absolute;left:-5px;right:-5px;border-top:2px dashed rgba(255,255,255,.38)}
.dzoneU{height:52px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.dzoneD{height:52px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.dzero{width:100%;height:1px;background:var(--axis)}
.dcol.dn{border-radius:0 0 4px 4px;transform-origin:top}
.rv.in .dcol{animation-play-state:running}

/* ---------- reveal ---------- */
.rv{opacity:0;transform:translateY(12px);transition:opacity .45s cubic-bezier(.16,1,.3,1),transform .45s cubic-bezier(.16,1,.3,1)}
.rv.in{opacity:1;transform:none}
.rv.in .meter>div,.rv.in .fbar,.rv.in .gr,.rv.in path.draw,.rv.in circle.garc{animation-play-state:running}

/* ---------- логин ---------- */
#login{position:relative;z-index:1;max-width:360px;margin:14vh auto 0;background:var(--srf);
  border:1px solid var(--hair);border-radius:20px;padding:32px 28px}
#login .lb{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:600;letter-spacing:.1em}
#login .ls{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin:6px 0 24px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:var(--t3);margin-bottom:6px}
.fld input{width:100%;height:48px;padding:0 14px;border-radius:12px;border:1px solid var(--hair);
  background:var(--srf2);color:var(--t1);font-size:15px;font-family:inherit;outline:none;transition:.15s}
.fld input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,114,242,.2)}
.btn{width:100%;height:48px;border:0;border-radius:12px;background:var(--acc);color:#0A0918;
  font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s}
.btn:hover{background:var(--acc-dim);color:#fff} .btn:disabled{opacity:.6;cursor:default}
#err{color:var(--bad);font-size:13px;margin-top:12px;min-height:18px}
#loginAura{position:fixed;inset:-30%;z-index:0;pointer-events:none;
  background:radial-gradient(560px 480px at 30% 30%, rgba(107,97,224,.14), transparent 60%);
  animation:drift 60s linear infinite}
@keyframes drift{0%{transform:translate(0,0)}25%{transform:translate(6%,4%)}50%{transform:translate(2%,8%)}75%{transform:translate(-5%,3%)}100%{transform:translate(0,0)}}

/* ---------- архивная полоса ---------- */
.archbar{position:sticky;top:104px;z-index:50;display:flex;align-items:center;gap:10px;margin-top:10px;
  background:var(--srf2);border:1px solid rgba(255,158,88,.25);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--t2)}
.archbar button{margin-left:auto;background:none;border:0;color:var(--acc);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}

/* ---------- телефон ---------- */
@media(max-width:640px){
  .wrap{padding:0 14px calc(84px + env(safe-area-inset-bottom))}
  header{margin:0 -14px;padding:0 14px;height:48px}
  #genLabel{display:none}
  .hnum{font-size:44px}
  .tile .kv{font-size:28px}
  .card{padding:16px;border-radius:14px}
  .grid{gap:12px}
  .g4{grid-template-columns:repeat(2,1fr)}
  .heroCard{padding:18px}
  .hside{position:static;text-align:left;margin-top:12px}
  .sec{margin-top:24px}
  .tabs{display:none}
  #tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:80;height:calc(60px + env(safe-area-inset-bottom));
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));background:rgba(10,9,24,.85);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--hair)}
  #tabbar button{flex:1;background:none;border:0;font-family:inherit;color:var(--t3);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500;padding:2px 0}
  #tabbar button .ico{font-size:19px;line-height:1.35;padding:1px 14px;border-radius:14px}
  #tabbar button.on{color:var(--acc)}
  #tabbar button.on .ico{background:var(--acc-soft)}
  .archbar{top:54px}
  .ghost{width:44px;height:44px}
  .alert .abtn{padding:12px 14px}
  .morebtn{padding:13px 9px}
  .archbar button{padding:12px 10px;margin:-12px -10px -12px auto}
  .funnel .fstep{grid-template-columns:96px 1fr}
  .funnel .flbl{font-size:11px}
  th,td{padding:9px 6px}
  table{font-size:12px}
  .fcar{display:grid;grid-auto-flow:column;grid-auto-columns:88%;gap:12px;overflow-x:auto;
    scroll-snap-type:x mandatory;padding-bottom:6px;margin-top:16px}
  .fcar>.card{scroll-snap-align:center}
  /* таблицы-стеки */
  table.stack thead{display:none}
  table.stack, table.stack tbody{display:block}
  table.stack tr{display:block;background:var(--srf2);border:1px solid var(--hair);border-radius:12px;
    padding:10px 12px;margin-top:8px}
  table.stack td{display:flex;justify-content:space-between;gap:10px;border:0;padding:3px 0;text-align:left}
  table.stack td.n{text-align:right}
  table.stack td::before{content:attr(data-l);color:var(--t3);font-size:11.5px;flex-shrink:0}
  table.stack td:first-child{font-weight:600}
}
@media(min-width:641px){
  .fcar{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .rv{opacity:1;transform:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap" class="hidden">
  <div id="loginAura"></div>
  <div id="login">
    <div class="lb">LEGALSOL</div>
    <div class="ls">Кабинет владельца</div>
    <form id="loginForm">
      <div class="fld"><label>Номер телефона</label>
        <input id="phone" type="tel" inputmode="tel" placeholder="+48 ___ ___ ___" autocomplete="username" required></div>
      <div class="fld"><label>Пароль</label>
        <input id="password" type="password" autocomplete="current-password" required></div>
      <button class="btn" id="loginBtn" type="submit">Войти</button>
      <div id="err"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="wrap hidden">
  <header>
    <div class="brand">LEGALSOL<small id="roleLabel">кабинет владельца</small></div>
    <div class="spacer"></div>
    <div id="genLabel">—</div>
    <button class="ghost" id="refreshBtn" title="Обновить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></button>
    <button class="ghost" id="logoutBtn" title="Выход"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>
  </header>
  <div id="content"></div>
</div>
<nav id="tabbar" class="hidden"></nav>

<div id="boot" class="center wrap">Загрузка…</div>

<script>
const $ = s => document.querySelector(s);
// Единый endpoint: /api/owner?action=login|me|logout|data (одна serverless-функция).
const api = (action,o={}) => fetch('/api/owner?action='+action+'&_='+Date.now(),
  {credentials:'same-origin',cache:'no-store',...o});

// ---- безопасность: всё из таблиц/Kommo — только через esc() ----
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---- форматирование ----
const nf = n => (n==null||isNaN(n))?'—':Math.round(n).toLocaleString('ru-RU');
const zl = n => (n==null||isNaN(n))?'—':nf(n)+' zł';
const zlh = n => (n==null||isNaN(n))?'—':nf(n)+'<span class="zl">zł</span>';   // для hero/KPI
const pct = n => (n==null||isNaN(n))?'—':(Math.round(n*10)/10).toLocaleString('ru-RU')+'%';
const RUM = ['','янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const RUMF = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const dLabel = iso => { const p=String(iso).split('-'); return p[2]+'.'+p[1]; };
const mLabel = ym => { const [y,m]=String(ym).split('-'); return RUM[+m]+' '+String(y).slice(2); };
const mFull  = ym => RUMF[+String(ym).split('-')[1]];
function agoLabel(iso){
  if(!iso) return '';
  const mins = Math.max(0, Math.round((Date.now()-new Date(iso))/60000));
  if(mins<60) return 'обновлено '+mins+' мин назад';
  const h = Math.round(mins/60);
  return 'обновлено '+(h<24? h+' ч назад' : 'в '+String(iso).slice(11,16));
}

// ---- источники: фиксированные цвета (палитра проверена валидатором) ----
const SRC = {
  'лид':      {l:'🎯 С рекламы (FB)', c:'#3987E5'},
  'тикток':   {l:'🎵 TikTok',         c:'#DB6590'},
  'входящий': {l:'💬 Входящие',       c:'#199E70'},
  'суприм':   {l:'📇 Supremes (база)',c:'#9085E9'},
  'сарафан':  {l:'🤝 Сарафан',        c:'#C98500'},
  'груп':     {l:'👥 Групповое',      c:'#DE6435'},
};
const srcL = s => (SRC[s]||{}).l || esc(s);
const srcC = s => (SRC[s]||{}).c || '#8B87A8';
const EXPC = {'Реклама':'#3987E5','Зарплаты':'#9085E9','Операционные':'#199E70','Налоги':'#D55181'};
const expC = n => EXPC[n]||'#8B87A8';

// ---- auth ----
async function boot(){
  try{ const r = await api('me'); r.status===200 ? showApp() : showLogin(); }
  catch(_){ showLogin(); }
}
function showLogin(){ $('#boot').classList.add('hidden'); $('#app').classList.add('hidden'); $('#tabbar').classList.add('hidden'); $('#loginWrap').classList.remove('hidden'); $('#phone').focus(); }
function showApp(){ $('#boot').classList.add('hidden'); $('#loginWrap').classList.add('hidden'); $('#app').classList.remove('hidden'); loadData(); }
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'); btn.disabled=true; $('#err').textContent='';
  try{
    const r = await api('login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:$('#phone').value,password:$('#password').value})});
    const j = await r.json().catch(()=>({}));
    if(r.status===200){ showApp(); }
    else if(r.status===429){ $('#err').textContent = j.message||'Слишком много попыток. Подождите.'; }
    else if(j.error==='owner_not_configured'){ $('#err').textContent = 'Кабинет ещё не настроен на сервере (нет OWNER_* на Vercel) — это не про пароль.'; }
    else { $('#err').textContent = 'Неверный номер или пароль'; }
  }catch(_){ $('#err').textContent='Ошибка сети'; }
  btn.disabled=false;
});
$('#logoutBtn').addEventListener('click', async ()=>{ await api('logout',{method:'POST'}); showLogin(); });
$('#refreshBtn').addEventListener('click', async ()=>{ $('#refreshBtn').classList.add('spin'); await loadData(); $('#refreshBtn').classList.remove('spin'); });

async function loadData(){
  $('#content').innerHTML = '<div class="center">Обновляю данные…</div>';
  try{
    const r = await api('data');
    if(r.status===401){ showLogin(); return; }
    const d = await r.json();
    if(d.empty){ $('#content').innerHTML='<div class="center">Данные ещё не загружены.<br>Запусти сборщик: <code>python3 owner-dashboard/build_dashboard.py --push</code></div>'; return; }
    render(d);
  }catch(e){ $('#content').innerHTML='<div class="center neg">Ошибка загрузки данных</div>'; }
}

// ============ ГРАФИКИ ============
const CHARTS = {};
let __chid = 0;
function chartBox(inner, meta, ticksHtml){
  const id='ch'+(++__chid); CHARTS[id]=meta;
  return `<div class="chbox" id="${id}">${inner}<div class="chx"></div><div class="chtip"></div></div>`+(ticksHtml||'');
}
function bindCharts(){
  for(const [id,meta] of Object.entries(CHARTS)){
    const box=document.getElementById(id);
    if(!box||box.dataset.bound) continue;
    box.dataset.bound='1';
    const hair=box.querySelector('.chx'), tip=box.querySelector('.chtip');
    const move=ev=>{
      const r=box.getBoundingClientRect();
      const cxp=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;
      const n=meta.xs.length; if(!n) return;
      const i=Math.max(0,Math.min(n-1,Math.round(cxp/r.width*(n-1))));
      const cx=(n===1)?r.width/2:(i/(n-1))*r.width;
      hair.style.left=cx+'px'; hair.style.opacity=.7;
      tip.replaceChildren();
      const t0=document.createElement('div'); t0.className='tt-x'; t0.textContent=meta.xs[i]; tip.appendChild(t0);
      for(const row of meta.rows(i)){
        const line=document.createElement('div'); line.className='tt-row';
        const key=document.createElement('span'); key.className='tt-key'; key.style.background=row.sw;
        const val=document.createElement('b'); val.textContent=row.v;
        const lab=document.createElement('span'); lab.textContent=row.k;
        line.append(key,val,lab); tip.appendChild(line);
      }
      tip.style.opacity=1;
      const tw=tip.offsetWidth;
      tip.style.left=Math.max(4,Math.min(box.clientWidth-tw-4,cx+14))+'px';
      tip.style.top='4px';
    };
    box.addEventListener('pointermove',move);
    box.addEventListener('pointerdown',move);
    box.addEventListener('pointerleave',()=>{hair.style.opacity=0;tip.style.opacity=0;});
  }
}
const gridLines=(w,h,fr)=>fr.map(g=>`<line x1="0" x2="${w}" y1="${(h*g).toFixed(1)}" y2="${(h*g).toFixed(1)}" stroke="var(--grid)" stroke-width="1"/>`).join('');
function barTop(x,y,w,h,r=3){ if(h<=0)return''; r=Math.min(r,w/2,h);
  return `M${x.toFixed(1)} ${(y+h).toFixed(1)} v${(-(h-r)).toFixed(1)} q0 ${-r} ${r} ${-r} h${(w-2*r).toFixed(1)} q${r} 0 ${r} ${r} v${(h-r).toFixed(1)} z`; }

// закрытия по дням: бары + накопительная линия + план-референс + метка «сегодня»
function dailyChart(deals,key,goal,curKey,genAt){
  const y=+key.slice(0,4), m=+key.slice(5,7);
  const dim=new Date(y,m,0).getDate();
  const perDay=Array(dim).fill(0);
  (deals||[]).forEach(x=>{ if((x.date||'').slice(0,7)===key){ const dd=+x.date.slice(8,10); if(dd>=1&&dd<=dim) perDay[dd-1]++; }});
  let s=0; const cum=perDay.map(v=>s+=v);
  const total=s, w=620, h=150, bw=w/dim;
  const lastD=(key===curKey&&genAt)?Math.min(dim,Math.max(1,+String(genAt).slice(8,10))):dim;
  const maxBar=Math.max(1,...perDay), maxCum=Math.max(goal||1,total,1);
  const bars=perDay.map((v,i)=>v?`<path class="gr" style="animation-delay:${(i*22)}ms" d="${barTop(i*bw+2,(h-18-(v/maxBar)*(h*0.4)),Math.max(2,bw-4),(v/maxBar)*(h*0.4),3)}" fill="var(--s1)"/>`:'').join('');
  const cxy=cum.slice(0,lastD).map((v,i)=>[(i*bw+bw/2),h-18-(v/maxCum)*(h-38)]);
  const cline=cxy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const plan=goal?`<line x1="${(bw/2).toFixed(1)}" y1="${h-18}" x2="${(dim*bw-bw/2).toFixed(1)}" y2="${(h-18-(goal/maxCum)*(h-38)).toFixed(1)}" stroke="rgba(255,255,255,.38)" stroke-width="1.6" stroke-dasharray="5 4" vector-effect="non-scaling-stroke"/>`:'';
  let today='';
  if(key===curKey&&genAt){ const td=+String(genAt).slice(8,10);
    if(td>=1&&td<=dim) today=`<line x1="${(td*bw-bw/2).toFixed(1)}" y1="6" x2="${(td*bw-bw/2).toFixed(1)}" y2="${h-18}" stroke="var(--axis)" stroke-width="1"/>`; }
  const svg=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:150px">
    ${gridLines(w,h,[.3,.6])}${plan}${bars}${today}
    <path class="draw" d="${cline}" fill="none" stroke="var(--cum)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${cxy.length?`<path d="M${cxy[cxy.length-1][0].toFixed(1)} ${cxy[cxy.length-1][1].toFixed(1)} h0" stroke="var(--srf)" stroke-width="12" stroke-linecap="round" vector-effect="non-scaling-stroke"/><path d="M${cxy[cxy.length-1][0].toFixed(1)} ${cxy[cxy.length-1][1].toFixed(1)} h0" stroke="var(--cum)" stroke-width="8" stroke-linecap="round" vector-effect="non-scaling-stroke"/>`:''}</svg>`;
  const ticks=[1];
  for(let dd=5;dd<=dim;dd+=5) ticks.push(dd);
  const ticksHtml=`<div class="xticks" style="position:relative;height:14px;display:block">${ticks.map(tk=>`<span style="position:absolute;left:${(((tk-0.5)/dim)*100).toFixed(2)}%;transform:translateX(-50%)">${tk}</span>`).join('')}</div>
  <div class="lgd"><span><span class="dot" style="background:var(--s1)"></span>Закрытий в день</span>
    <span><span class="dot" style="background:var(--cum)"></span>Всего с начала: <b class="num" style="color:var(--t1)">${total}</b></span>
    ${goal?`<span><span class="dash"></span>Темп к цели ${goal}</span>`:''}</div>`;
  const xs=Array.from({length:dim},(_,i)=>(i+1)+' '+mLabel(key).split(' ')[0]);
  return chartBox(svg,{xs,rows:i=>i<lastD?[{k:'закрытий',v:String(perDay[i]),sw:'var(--s1)'},{k:'всего',v:String(cum[i]),sw:'var(--cum)'}]:[{k:'день ещё не наступил',v:'—',sw:'var(--neut)'}]},ticksHtml);
}

// расход→лиды: ДВЕ панели с общим X (никакого dual-axis)
function adPair(days){
  if(!days||!days.length) return '<div class="mut" style="margin-top:10px">нет данных</div>';
  const sp=days.map(d=>d.spendUsd||0), ld=days.map(d=>d.leads||0);
  const w=620,h1=86,h2=70,gap=14,H=h1+h2+gap,bw=w/days.length;
  const ms=Math.max(1,...sp),ml=Math.max(1,...ld);
  const bars=sp.map((v,i)=>v?`<path class="gr" style="animation-delay:${i*18}ms" d="${barTop(i*bw+1.5,(h1-4-(v/ms)*(h1-16)),Math.max(2,bw-3),(v/ms)*(h1-16),3)}" fill="var(--s1)"/>`:'').join('');
  const xy=ld.map((v,i)=>[(i*bw+bw/2),(h1+gap)+(h2-6-(v/ml)*(h2-16))]);
  const line=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${xy[xy.length-1][0].toFixed(1)} ${H} L ${xy[0][0].toFixed(1)} ${H} Z`;
  const svg=`<svg viewBox="0 0 ${w} ${H}" preserveAspectRatio="none" style="height:${H+12}px">
    ${gridLines(w,h1,[.45])}${bars}
    <line x1="0" x2="${w}" y1="${h1+gap/2}" y2="${h1+gap/2}" stroke="var(--grid)"/>
    <path d="${area}" fill="rgba(57,135,229,.09)"/>
    <path class="draw" d="${line}" fill="none" stroke="var(--s2)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M${xy[xy.length-1][0].toFixed(1)} ${xy[xy.length-1][1].toFixed(1)} h0" stroke="var(--srf)" stroke-width="12" stroke-linecap="round" vector-effect="non-scaling-stroke"/><path d="M${xy[xy.length-1][0].toFixed(1)} ${xy[xy.length-1][1].toFixed(1)} h0" stroke="var(--s2)" stroke-width="8" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>`;
  const xs=days.map(d=>dLabel(d.date));
  const tickIdx=[0,Math.floor(xs.length/2),xs.length-1];
  const ticksHtml=`<div class="xticks" style="position:relative;height:14px;display:block">${tickIdx.map(ii=>`<span style="position:absolute;left:${(((ii+0.5)/xs.length)*100).toFixed(2)}%;transform:translateX(-50%)">${xs[ii]}</span>`).join('')}</div>
    <div class="lgd"><span><span class="dot" style="background:var(--s1)"></span>Потратили, $/день</span>
    <span><span class="dot" style="background:var(--s2)"></span>Пришло лидов</span></div>`;
  return `<div class="panel-t">Потратили, $ в день · трекинг</div>`+
    chartBox(svg,{xs,rows:i=>[{k:'расход',v:'$'+nf(sp[i]),sw:'var(--s1)'},{k:'лидов',v:String(ld[i]),sw:'var(--s2)'}]},ticksHtml);
}

// история по месяцам — горизонтальные бары (emphasis: выбранный = акцент)
function historyBars(trend,curKey,selKey){
  const max=Math.max(1,...trend.map(t=>t.closings));
  return trend.map(t=>{
    const cur=t.month===curKey, sel=t.month===selKey;
    const col=sel?'var(--acc)':'var(--neut)';
    return `<div class="hrow">
      <div class="hl"><b>${mLabel(t.month)}${cur?' <span class="mut" style="font-weight:500">· идёт</span>':''}</b>
        <span class="v">${t.closings} закрытий · ${zl(t.contracted)}</span></div>
      <div class="meter" style="background:rgba(139,135,168,.14)"><div style="width:${Math.max(2,t.closings/max*100)}%;background:${col};${cur?'opacity:.65':''}"></div></div>
    </div>`;}).join('');
}
// список-бары (услуги, стадии, источники)
function hbarList(items,valOf,labOf,colOf){
  const max=Math.max(1,...items.map(valOf));
  return items.map(it=>`<div class="hrow">
    <div class="hl"><span>${labOf(it)}</span><span class="v">${valOf(it)}</span></div>
    <div class="meter" style="height:7px;background:rgba(139,135,168,.13)"><div style="width:${valOf(it)/max*100}%;background:${colOf?colOf(it):'var(--s1)'}"></div></div></div>`).join('');
}
// спарклайн
function spark(vals,{w=140,h=44,color='var(--s1)'}={}){
  const max=Math.max(1,...vals), dx=w/Math.max(1,vals.length-1);
  const xy=vals.map((v,i)=>[i*dx,h-4-(v/max)*(h-10)]);
  const line=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:${w}px;height:${h}px" preserveAspectRatio="none">
    <path d="${line} L ${w} ${h} L 0 ${h} Z" fill="rgba(124,114,242,.08)"/>
    <path class="draw" d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xy[xy.length-1][0].toFixed(1)}" cy="${xy[xy.length-1][1].toFixed(1)}" r="3.5" fill="var(--acc)" stroke="var(--srf)" stroke-width="2"/></svg>`;
}
// большой спарклайн (сайт)
function sparkBig(vals){
  const w=620,h=110,max=Math.max(1,...vals),dx=w/Math.max(1,vals.length-1);
  const xy=vals.map((v,i)=>[i*dx,h-8-(v/max)*(h-20)]);
  const line=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const svg=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:110px">${gridLines(w,h,[.35,.7])}
    <path d="${line} L ${w} ${h} L 0 ${h} Z" fill="rgba(124,114,242,.08)"/>
    <path class="draw" d="${line}" fill="none" stroke="var(--s1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M${xy[xy.length-1][0].toFixed(1)} ${xy[xy.length-1][1].toFixed(1)} h0" stroke="var(--srf)" stroke-width="12" stroke-linecap="round" vector-effect="non-scaling-stroke"/><path d="M${xy[xy.length-1][0].toFixed(1)} ${xy[xy.length-1][1].toFixed(1)} h0" stroke="var(--acc)" stroke-width="8" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>`;
  return {svg,xy};
}
// полукруглый гейдж прогноза + ромб «куда идём по темпу»
function gaugeSemi(now,goal,proj){
  const R=58,cx=76,cy=72,arc=Math.PI*R;
  const donePct=goal?Math.min(1,now/goal):0;
  const projPct=goal?Math.min(1,(proj||0)/goal):0;
  const ang=Math.PI*(1-projPct);
  const dx=cx+R*Math.cos(ang), dy=cy-R*Math.sin(ang);
  return `<svg width="152" height="84" viewBox="0 0 152 84">
    <path d="M ${cx-R} ${cy} A ${R} ${R} 0 0 1 ${cx+R} ${cy}" fill="none" stroke="rgba(124,114,242,.16)" stroke-width="12" stroke-linecap="round"/>
    <circle class="garc" style="--full:${arc.toFixed(1)}" cx="0" cy="0" r="${R}" fill="none" stroke="var(--acc)" stroke-width="12" stroke-linecap="round"
      stroke-dasharray="${(arc*donePct).toFixed(1)} ${(arc*2).toFixed(1)}" stroke-dashoffset="0"
      transform="translate(${cx},${cy}) rotate(180)" pathLength="${(arc*2).toFixed(1)}"/>
    ${proj?`<rect x="-4.5" y="-4.5" width="9" height="9" transform="translate(${dx.toFixed(1)},${dy.toFixed(1)}) rotate(45)" fill="var(--t1)" stroke="var(--srf)" stroke-width="1.5"/>`:''}
    <text x="${cx}" y="${cy-14}" text-anchor="middle" fill="var(--t1)" font-size="26" font-weight="700" font-family="Golos Text">${now}</text>
    <text x="${cx}" y="${cy+2}" text-anchor="middle" fill="var(--t3)" font-size="11" font-family="Golos Text">из ${goal||'—'}</text>
  </svg>`;
}
// донат расходов (зазоры 2px поверхностью, sequential-оттенки по фикс-карте)
function donut(cats,total){
  const R=68,cx=90,cy=90,circ=2*Math.PI*R,gapPx=2.5;
  let off=0;
  const segs=cats.map(c=>{
    const len=Math.max(0,(c.amount/total)*circ-gapPx);
    const seg=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${expC(c.name)}" stroke-width="22"
      stroke-dasharray="${len.toFixed(1)} ${(circ-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len+gapPx; return seg;}).join('');
  return `<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;margin-top:8px">
    <svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0">${segs}
      <text x="${cx}" y="${cy-2}" text-anchor="middle" fill="var(--t1)" font-size="21" font-weight="700" font-family="Golos Text">${nf(total)}</text>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" fill="var(--t3)" font-size="10.5" font-family="Golos Text">zł расходов</text></svg>
    <div style="flex:1;min-width:170px">${cats.map(c=>`<div style="display:flex;justify-content:space-between;gap:10px;margin:8px 0;font-size:13px">
      <span><span class="dot" style="background:${expC(c.name)}"></span>${esc(c.name)}</span>
      <span class="t2 num">${zl(c.amount)} · ${Math.round(c.amount/total*100)}%</span></div>`).join('')}</div>
  </div>`;
}
// воронка конверсии (ординальная шкала, общий maxRef у всех продавцов месяца)
const FUN_COLS=['#B7B0F9','#8F85F0','#7A71E3'];
function stepFunnel(steps,maxRef,finalLine,noteLine){
  const max=Math.max(1,maxRef||0,...steps.map(s=>s.v||0));
  let html='<div class="funnel">';
  steps.forEach((s,i)=>{
    if(i>0){
      const prev=steps[i-1].v||0, tr=prev?Math.round((s.v||0)/prev*100):null;
      html+=`<div class="fstep" style="margin-top:2px"><div></div><div class="ftrans">${tr!=null?`<span class="chip ${s.weak?'w':''}">↓ ${tr}%</span>`:''}</div></div>`;
    }
    const wPct=Math.max(6,(s.v||0)/max*100);
    html+=`<div class="fstep"><div class="flbl">${s.l}</div>
      <div class="fbarw"><div class="fbar" style="width:${wPct}%;background:${FUN_COLS[Math.min(i,FUN_COLS.length-1)]};animation-delay:${i*120}ms"><b>${nf(s.v)}</b></div></div></div>`;
  });
  if(finalLine) html+=`<div class="ffinal">${finalLine}</div>`;
  if(noteLine) html+=`<div class="fnote">${noteLine}</div>`;
  return html+'</div>';
}

// активность производства по дням: стек Даша (акцент) + боты/система (светлый)
function activityChart(days){
  if(!days||!days.length) return '';
  const w=620,h=112,bw=w/days.length,max=Math.max(1,...days.map(d=>d.notes));
  const bars=days.map((d,i)=>{
    const hAll=(d.notes/max)*(h-26), hD=(d.dasha/max)*(h-26);
    const x=i*bw+2, wd=Math.max(2,bw-4), rest=d.notes-d.dasha;
    let s='';
    if(d.dasha>0&&rest>0){
      const capH=Math.max(1.5,hAll-hD-2);
      s+=`<g class="gr" style="animation-delay:${i*25}ms"><rect x="${x.toFixed(1)}" y="${(h-12-hD).toFixed(1)}" width="${wd.toFixed(1)}" height="${hD.toFixed(1)}" fill="var(--acc)"/><path d="${barTop(x,h-12-hD-2-capH,wd,capH,3)}" fill="var(--cum)"/></g>`;
    } else if(d.dasha>0){
      s+=`<path class="gr" style="animation-delay:${i*25}ms" d="${barTop(x,h-12-hD,wd,hD,3)}" fill="var(--acc)"/>`;
    } else if(rest>0){
      s+=`<path class="gr" style="animation-delay:${i*25}ms" d="${barTop(x,h-12-hAll,wd,hAll,3)}" fill="var(--cum)"/>`;
    }
    return s;
  }).join('');
  const svg=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:112px">${gridLines(w,h,[.4])}${bars}</svg>`;
  const xs=days.map(d=>dLabel(d.date));
  const ti=[0,Math.floor(xs.length/2),xs.length-1];
  const ticksHtml=`<div class="xticks" style="position:relative;height:14px;display:block">${ti.map(ii=>`<span style="position:absolute;left:${(((ii+0.5)/xs.length)*100).toFixed(2)}%;transform:translateX(-50%)">${xs[ii]}</span>`).join('')}</div>
    <div class="lgd"><span><span class="dot" style="background:var(--acc)"></span>Даша</span><span><span class="dot" style="background:var(--cum)"></span>Боты и система</span></div>`;
  return chartBox(svg,{xs,rows:i=>[{k:'всего действий',v:String(days[i].notes),sw:'var(--cum)'},{k:'из них Даша',v:String(days[i].dasha),sw:'var(--acc)'}]},ticksHtml);
}

function tile(lbl,val,sub,{chip='',go='',cls=''}={}){
  return `<div class="card tile rv ${cls}" ${go?`onclick="setTab('${go}')"`:''}>
    <div class="lbl"><span>${lbl}</span>${go?'<span class="chev">▸</span>':''}</div>
    <div class="kv">${val}</div>
    ${(sub||chip)?`<div class="sub">${chip?chip+' ':''}${sub||''}</div>`:''}</div>`;
}
function kd(cur,prev,goodUp){
  if(cur==null||prev==null||!prev) return '';
  const g=Math.round((cur-prev)/Math.abs(prev)*100);
  if(!isFinite(g)) return '';
  const good=goodUp?g>=0:g<0;
  return `<span class="chip ${good?'up':'dn'}">${g>=0?'▲':'▼'} ${Math.abs(g)}%</span>`;
}

// живая фраза дня — hero прибыли
function profitPhrase(pnl,prevPnl,key,rc){
  if(!pnl||pnl.profit==null) return 'PnL этого месяца ещё пустой — цифры появятся с первыми записями.';
  const P=pnl.profit, prev=prevPnl&&prevPnl.profit;
  if(P>=0&&prev!=null&&prev<0) return `${mFull(key)} вышел в плюс. Месяц назад тут было <b class="neg">${zl(prev)}</b>.`;
  if(P>=0&&prev!=null&&prev>=0) return P>=prev?`Прибыль растёт: ${zl(prev)} → <b class="pos">${zl(P)}</b>.`:`Прибыль просела: было ${zl(prev)}, стало ${zl(P)}.`;
  if(P>=0) return `Пришло ${zl(pnl.income)}, потратили ${zl(pnl.expenses)} — работаем в плюс.`;
  const debt=rc&&rc.total?` В дебиторке ${zl(rc.total)} — собрать её значит выйти в плюс.`:'';
  return `Расходы выше собранного на ${zl(-P)}.${debt}`;
}

// «золотой вход»: что пришло с прошлого визита
function goldEntry(pm,key){
  try{
    const raw=localStorage.getItem('ownerSeen');
    const seen=raw?JSON.parse(raw):null;
    if(DATA&&key===DATA.curMonthKey) localStorage.setItem('ownerSeen',JSON.stringify({key,collected:pm.collected||0,closings:pm.closings||0}));
    if(seen&&seen.key===key){
      const dz=(pm.collected||0)-(seen.collected||0), dc=(pm.closings||0)-(seen.closings||0);
      if(dz>0||dc>0) return `<span class="chip gold" style="margin-top:8px">с прошлого визита: ${dz>0?'+'+nf(dz)+' zł':''}${dz>0&&dc>0?' · ':''}${dc>0?'+'+dc+' закрыт.':''}</span>`;
    }
  }catch(_){}
  return '';
}

// ---- сравнение по месяцам: общая картина «как движемся» ----
function monthsCompare(d){
  const keys=(d.monthOrder||[]).slice().reverse();   // хронологически: май → июнь → июль
  if(keys.length<2) return '';
  const ms=keys.map(k=>(d.months||{})[k]||{});
  const rows=[
    {l:'Закрытий', v:m=>m.closings??null, f:v=>String(Math.round(v))},
    {l:'Договоров на', v:m=>m.contracted??null, f:zl},
    {l:'Собрано', v:m=>m.collected??null, f:zl, gold:1},
    {l:'Прибыль', v:m=>m.pnl?m.pnl.profit:null, f:v=>(v>=0?'+':'−')+nf(Math.abs(v))+' zł', signed:1},
    {l:'Средний чек', v:m=>m.avgDeal??null, f:zl},
    {l:'Заявок с рекламы', v:m=>m.leads??null, f:nf},
    {l:'Клиент с рекламы стоит', v:m=>(m.cacTraffic||m.cac)??null, f:zl, invert:1},
  ];
  let h=`<div class="cmp" style="grid-template-columns:minmax(126px,1.3fr) repeat(${keys.length},minmax(96px,1fr))">`;
  h+=`<div></div>`+keys.map(k=>`<div class="cmp-h">${mLabel(k)}${k===d.curMonthKey?' <span style="font-weight:500;text-transform:none">· идёт</span>':''}</div>`).join('');
  for(const r of rows){
    const vals=ms.map(m=>r.v(m));
    const max=Math.max(1,...vals.map(v=>Math.abs(v||0)));
    h+=`<div class="cmp-l">${r.l}</div>`;
    vals.forEach((v,i)=>{
      let chip='';
      const prev=i>0?vals[i-1]:null;
      if(v!=null&&prev!=null&&prev!==0&&keys[i]!==d.curMonthKey){
        const g=Math.round((v-prev)/Math.abs(prev)*100);
        if(isFinite(g)&&g!==0){ const good=r.invert?g<0:g>0;
          chip=`<span class="cmp-d" style="color:${good?'var(--good)':'var(--bad)'}">${g>0?'▲':'▼'}${Math.abs(g)}%</span>`; }
      }
      const cls='num'+(r.gold&&v!=null?' goldnum':'');
      const st=r.signed&&v!=null?` style="color:${v>=0?'var(--good)':'var(--bad)'}"`:'';
      const barCol=r.signed&&v!=null?(v>=0?'var(--good)':'var(--bad)'):(keys[i]===d.curMonthKey?'var(--acc)':'var(--neut)');
      h+=`<div class="cmp-c"><b class="${cls}"${st}>${v==null?'—':r.f(v)}</b>${chip}
        <div class="cmp-bar"><div style="width:${v==null?0:(Math.abs(v)/max*100).toFixed(1)}%;background:${barCol}"></div></div></div>`;
    });
  }
  h+=`</div>`;
  // --- дашборды: деньги · прибыль · закрытия к плану ---
  const fmtk=v=>Math.abs(v)>=1000?((Math.round(v/100)/10).toLocaleString('ru-RU')+'k'):nf(v);
  const isCur=k=>k===d.curMonthKey;
  const mm=keys.map((k,i)=>({k,m:ms[i]}));
  const maxMoney=Math.max(1,...mm.map(x=>x.m.contracted||0));
  const moneyCh=`<div class="dcols">`+mm.map(x=>`<div class="dgrp"><div class="dpair">
      <div class="dcolw"><span class="dval">${x.m.contracted?fmtk(x.m.contracted):'—'}</span><div class="dcol" style="height:${Math.max(3,(x.m.contracted||0)/maxMoney*100)}%;background:var(--cum)"></div></div>
      <div class="dcolw"><span class="dval">${x.m.collected?fmtk(x.m.collected):'—'}</span><div class="dcol" style="height:${Math.max(3,(x.m.collected||0)/maxMoney*100)}%;background:var(--s1)"></div></div>
    </div><div class="dlbl">${mLabel(x.k)}${isCur(x.k)?' ◷':''}</div></div>`).join('')+`</div>
    <div class="lgd"><span><span class="dot" style="background:var(--cum)"></span>Договоры</span><span><span class="dot" style="background:var(--s1)"></span>Собрано</span></div>`;
  const profs=mm.map(x=>x.m.pnl?x.m.pnl.profit:null);
  const maxP=Math.max(1,...profs.map(v=>Math.abs(v||0)));
  const profCh=`<div class="dcols" style="height:158px">`+mm.map((x,i)=>{const v=profs[i];
    const hh=v==null?0:Math.max(6,Math.abs(v)/maxP*100);
    return `<div class="dgrp">
      <div class="dzoneU">${v!=null&&v>=0?`<span class="dval" style="color:var(--good)">+${fmtk(v)}</span><div class="dcol" style="height:${hh}%;background:var(--good)"></div>`:''}</div>
      <div class="dzero"></div>
      <div class="dzoneD">${v!=null&&v<0?`<div class="dcol dn" style="height:${hh}%;background:var(--bad)"></div><span class="dval" style="color:var(--bad);margin:4px 0 0">−${fmtk(Math.abs(v))}</span>`:(v==null?'<span class="dval mut" style="margin-top:4px">—</span>':'')}</div>
      <div class="dlbl">${mLabel(x.k)}${isCur(x.k)?' ◷':''}</div></div>`;}).join('')+`</div>`;
  const maxC=Math.max(1,...mm.map(x=>Math.max(x.m.closings||0,x.m.goal||0)));
  const closCh=`<div class="dcols">`+mm.map(x=>`<div class="dgrp"><div class="dpair">
      <div class="dcolw">${x.m.goal?`<div class="dgoal" style="bottom:${(x.m.goal/maxC*100).toFixed(1)}%"></div>`:''}
        <span class="dval">${x.m.closings||0}</span><div class="dcol" style="height:${Math.max(3,(x.m.closings||0)/maxC*100)}%;background:${isCur(x.k)?'var(--acc)':'var(--neut)'}"></div></div>
    </div><div class="dlbl">${mLabel(x.k)}${isCur(x.k)?' ◷':''}${x.m.goal?` · план ${x.m.goal}`:''}</div></div>`).join('')+`</div>
    <div class="lgd"><span><span class="dash"></span>План месяца</span></div>`;
  return sec('📊 Как движемся · месяц к месяцу')+
    `<div class="grid g3">
      <div class="card rv"><b style="font-size:15px">Деньги по месяцам</b>${moneyCh}</div>
      <div class="card rv"><b style="font-size:15px">Прибыль по месяцам</b>${profCh}</div>
      <div class="card rv"><b style="font-size:15px">Закрытия к плану</b>${closCh}</div>
    </div>
    <div class="card rv" style="margin-top:16px;overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="min-width:${126+keys.length*110}px">${h}</div>
    <div class="sec-note" style="margin-top:10px">Полоса — доля от лучшего месяца по строке. Стрелки — к прошлому месяцу.${keys.includes(d.curMonthKey)?' '+mFull(d.curMonthKey)+' ещё идёт — его цифры дорастут.':''}</div></div>`;
}

// ---- лента топ-метрик: живой пульс (всегда текущий месяц) ----
function topStrip(d){
  const lm=(d.months||{})[d.curMonthKey]||{}, pnl=lm.pnl||null, fa=d.forecastAI||{}, fc=d.forecast||{};
  const P=pnl?pnl.profit:null;
  const items=[
    {l:'Прибыль · '+mLabel(d.curMonthKey), v:P==null?'—':(P>=0?'+':'−')+nf(Math.abs(P))+' zł', c:P==null?'':(P>=0?'var(--good)':'var(--bad)'), go:'fin'},
    {l:'Собрано', v:zl(lm.collected), gold:1, go:'sales'},
    {l:'Прогноз закрытий', v:fc.projClosings!=null?('~'+fc.projClosings+' из '+(fc.goal||'—')):'—',
      c:fc.goalPct>=100?'var(--good)':fc.goalPct>=60?'var(--warn)':'var(--bad)', go:'sales'},
    {l:'Прогноз выручки', v:fa.revenueProj?('~'+nf(fa.revenueProj)+' zł'):'—', gold:fa.revenueProj?1:0, go:'sales'},
    {l:'Клиент с рекламы', v:zl(lm.cacTraffic||lm.cac), go:'ads'},
  ];
  return `<div class="tstrip">`+items.map(i=>`<button class="titem" onclick="setTab('${i.go}')">
    <span class="tl">${i.l}</span><b class="${i.gold?'goldnum':''}" ${i.c?`style="color:${i.c}"`:''}>${i.v}</b></button>`).join('')+`</div>`;
}

// ---- переключатель месяцев с микро-итогами ----
function monthPills(d){
  if(!d.monthOrder||!d.monthOrder.length) return '';
  return `<div class="months">`+d.monthOrder.map(k=>{
    const m=d.months[k]||{}, p=m.pnl&&m.pnl.profit;
    const micro=(p!=null)?`<span class="${p<0?'neg':'pos'}">${p>=0?'+':''}${nf(p)}</span>`:`<span class="mut">${m.closings||0} закр.</span>`;
    return `<button class="mpill ${k===CUR_KEY?'on':''}" onclick="CUR_KEY='${k}';render(DATA);window.scrollTo(0,0)">
      <b>${mLabel(k)}${k===d.curMonthKey?' · идёт':''}</b>${micro}</button>`;}).join('')+`</div>`;
}

      ${s.wa?cell('WA-кабинет','$'+nf(s.wa.spendUsd)+` <span class="mut" style="font-size:11.5px">· ${s.wa.leads} заявок${s.wa.cpl!=null?' · $'+s.wa.cpl+'/заявка':''}</span>`):''}
      ${s.wa&&s.wa.leads&&s.sources&&s.sources['входящий']?cell('Конверсия WA-входящих',Math.round(s.sources['входящий']/s.wa.leads*100)+'% <span class="mut" style="font-size:11.5px">'+s.sources['входящий']+' из '+s.wa.leads+'</span>'):''}

    ${s.sources?`<div class="schips">${Object.entries(s.sources).map(([k,v])=>`<span class="chip" style="color:${srcC(k)};background:${srcC(k)}1f">${srcL(k)} ${v}</span>`).join('')}</div>`:''}
  </div>`;
}
// воронки конверсии продавцов (общая шкала ширин!)
function sellersConversion(pm){
  const list=(pm.bySeller||[]).filter(s=>s.kommo);
  if(!list.length) return '';
  const maxRef=Math.max(...list.map(s=>s.kommo.got||0));
  const cards=list.map(s=>{
    const k=s.kommo;
    const steps=[
      {l:'Лидов упало',v:k.got},
      {l:'Целевые <span style="opacity:.7">(без мусора)</span>',v:k.target},
      {l:'Закрыл',v:s.closings},
    ];
    const tr1=k.got?Math.round(k.target/k.got*100):null;
    const tr2=k.target?Math.round(s.closings/k.target*100):null;
    if(tr1!=null&&tr2!=null){ if(tr2<=tr1) steps[2].weak=true; else steps[1].weak=true; }
    const fin=`лид → клиент: <span style="color:var(--acc)">${pct(s.convKommo)}</span>`;
    const worst=(tr1!=null&&tr2!=null)?(tr2<=tr1?'Больше всего теряем между целевыми и закрытием.':'Больше всего отсеивается на этапе мусора/нецелевых.'):'';
    return `<div class="card rv"><div class="shead" style="margin-bottom:14px"><div class="ava">${esc((s.name||'?')[0])}</div><div class="sname">${esc(s.name)}</div></div>
      ${stepFunnel(steps,maxRef,fin,worst)}</div>`;
  }).join('');
  return sec('Конверсии продавцов · '+mLabel(pm.key||CUR_KEY),'воронка из Kommo: сколько лидов упало на продавца, сколько из них целевых и сколько он превратил в клиентов. Ширины обоих — в одной шкале, сравнивай глазами.')+
    `<div class="fcar">${cards}</div>`;
}

// ============ ЭКРАН ВЛАДЕЛЬЦА ============
function render(d){
  DATA=d;
  if(d.role==='seller'){ renderSeller(d); return; }
  if(!CUR_KEY||!(d.months&&d.months[CUR_KEY])) CUR_KEY=d.defaultMonth||d.prevMonthKey;
  const pm=(d.months&&d.months[CUR_KEY])||d.prevMonth||{};
  const fc=d.forecast||{}, pnl=pm.pnl||null, site=d.site, rc=d.receivables||{};
  $('#genLabel').textContent = agoLabel(d.generatedAt)+' · авто каждые 2 ч';
  $('#roleLabel').textContent='кабинет владельца';
  tabbarFill();

  const _y=+CUR_KEY.slice(0,4), _m=+CUR_KEY.slice(5,7);
  const prevKey=_m>1?`${_y}-${String(_m-1).padStart(2,'0')}`:`${_y-1}-12`;
  const prevM=(d.months||{})[prevKey]||{};
  const isLive=CUR_KEY===d.curMonthKey;
  // на идущем месяце сравнение с ЦЕЛЫМ прошлым месяцем врёт («▼73%» в середине месяца) — чипы только в архиве
  const kdA=(cur,prev,goodUp)=>isLive?'':kd(cur,prev,goodUp);

  let html=topStrip(d);
  html+=monthPills(d);
  if(!isLive) html+=`<div class="archbar">📁 Ты смотришь архив: <b>${mFull(CUR_KEY)}</b>
    <button onclick="CUR_KEY='${d.curMonthKey}';render(DATA);window.scrollTo(0,0)">Вернуться в ${mLabel(d.curMonthKey)} →</button></div>`;

  // ===== HERO: прибыль месяца с живой аурой =====
  const P=pnl?pnl.profit:null;
  const auraCol=P==null?'transparent':(P>=0?'rgba(62,207,142,.13)':'rgba(255,107,107,.13)');
  const heroCol=P==null?'':(P>=0?'pos':'neg');
  const spDeals=(pm.deals||[]);
  const dim=new Date(_y,_m,0).getDate();
  const perDay=Array(dim).fill(0);
  spDeals.forEach(x=>{const dd=+String(x.date).slice(8,10);if(dd>=1&&dd<=dim)perDay[dd-1]+=(x.paid||0);});
  let acc_=0; const cumPay=perDay.map(v=>acc_+=v);
  html+=`<div class="card heroCard rv" style="margin-top:14px" onclick="setTab('fin')">
    <div class="aura" style="background:radial-gradient(closest-side,${auraCol},transparent)"></div>
    <div class="hlbl">${P!=null&&P<0?'Убыток':'Прибыль'} · ${mFull(CUR_KEY)} ${kdA(P,prevM.pnl&&prevM.pnl.profit,true)}</div>
    <div class="hnum ${heroCol}">${P==null?'—':(P>=0?'+':'−')+nf(Math.abs(P))+'<span class="zl">zł</span>'}</div>
    <div class="hphrase">${profitPhrase(pnl,prevM.pnl,CUR_KEY,rc)}</div>
    <div class="hside">${cumPay.some(v=>v>0)?spark(cumPay)+`<div class="mut" style="font-size:11px;margin-top:2px">оплаты копятся по дням</div>`:''}</div>
  </div>`;

  // ===== король-тайлы =====
  const cac=pm.cacTraffic||pm.cac;
  const roasOk=(pm.roasTrafficP1||0)>=1;
  const projChip=fc.goalPct!=null?`<span class="chip ${fc.goalPct>=100?'g':fc.goalPct>=60?'w':'b'}">${fc.paceNote==='mtd'?'темп':'база'} → ~${fc.projClosings??'—'}${fc.goalPct>=100?' — цель будет':fc.goalPct>=60?' — поднажать':' — мало'}</span>`:'';
  html+=`<div class="grid g3">
    ${tile('Деньги пришли '+kdA(pm.collected,prevM.collected,true),
      `<span class="goldnum shimmer">${zlh(pm.collected)}</span>`,
      `+ договоров на ${zl(pm.contracted)}${goldEntry(pm,CUR_KEY)}`,{go:'sales'})}
    ${tile('1 клиент с рекламы стоит '+kdA(cac,prevM.cacTraffic||prevM.cac,false),
      zlh(cac),
      cac!=null?`платит сразу ~${zl(pm.avgFirstPay)} → реклама ${roasOk?'окупается':'пока не окупается'} (×${pm.roasTrafficP1??'—'})`:'появится после списаний банка и тегов чата',{go:'ads'})}
    ${isLive
      ? `<div class="card tile rv" onclick="setTab('sales')"><div class="lbl"><span>Закрытий к концу месяца</span><span class="chev">▸</span></div>
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">${gaugeSemi(pm.closings||0,pm.goal||d.goal,fc.projClosings)}
          <div>${projChip}<div class="mut" style="font-size:11.5px;margin-top:6px">${fc.paceNote==='mtd'?`◆ — куда придём при текущем темпе<br>(${fc.daysElapsed} из ${fc.daysInMonth} дн., закрыто ${fc.closingsMTD})`:`◆ — месяц только начался,<br>прогноз по итогам ${mLabel(fc.baseMonth)}`}</div></div></div></div>`
      : tile('План месяца',(pm.closings??'—')+' <span class="zl">из '+(pm.goal??'—')+'</span>',pm.goal?Math.round((pm.closings||0)/pm.goal*100)+'% плана выполнено':'план не был задан')}
  </div>`;

  if(CUR_KEY===d.defaultMonth) html+=renderAlerts(buildAlerts(d,pm,pnl));

  html+=tabsNav();

  // ================= ГЛАВНАЯ =================
  html+=twO('main');
  if(CUR_KEY===d.defaultMonth&&d.forecastAI){
    const fa=d.forecastAI;
    html+=`<div class="card aiCard rv" style="margin-top:16px">
      <div class="hlbl" style="font-size:12px">🤖 Прогноз от ИИ · по темпу ребят</div>
      <div style="font-size:14px;line-height:1.6;margin-top:8px" class="t2">${fa.text}</div>
      ${fa.moneyText?`<div style="font-size:14px;line-height:1.6;margin-top:8px" class="t2">${fa.moneyText}</div>`:''}
      <div class="chips">${(fa.bySeller||[]).map(x=>`<span class="chip">${esc(x.name)}: ${x.now} → ~${x.proj} закр.</span>`).join('')}
        <span class="chip" style="color:var(--gold)">команда: ~${fa.teamProj} из ${fa.goal}</span>
        ${(fa.bySellerMoney||[]).map(x=>`<span class="chip">${esc(x.name)}: ${nf(x.now)} → ~${nf(x.proj)} zł</span>`).join('')}
        ${fa.revenueProj?`<span class="chip gold">выручка месяца: ~${nf(fa.revenueProj)} zł</span>`:''}</div></div>`;
  }
  html+=monthsCompare(d);
  // live-разворот текущего месяца, когда смотрим архив
  if(CUR_KEY!==d.curMonthKey){
    const cm=(d.months||{})[d.curMonthKey];
    if(cm){
      html+=`<details class="acc"><summary><span class="arr">▶</span>⏱ Живой счёт · ${mFull(d.curMonthKey)} идёт сейчас<span class="badge">открыть</span></summary><div class="accb">`;
      html+=`<div class="grid g4" style="margin-top:12px">
        ${tile('Закрытий',String(cm.closings||0),cm.goal?('план '+cm.goal+' · выполнено '+Math.round((cm.closings||0)/cm.goal*100)+'%'):'')}

        ${tile('Лидов',nf(cm.leads),cm.cpl!=null?('лид стоит '+zl(cm.cpl)):'')}
        ${tile('Прибыль',cm.pnl?((cm.pnl.profit>=0?'+':'−')+nf(Math.abs(cm.pnl.profit))+'<span class="zl">zł</span>'):'—','')}
      </div>
      ${dailyChart(cm.deals||[],d.curMonthKey,cm.goal,d.curMonthKey,d.generatedAt)}
      ${(cm.quality&&cm.quality.length)?'<div class="schips" style="margin-top:12px">'+cm.quality.map(x=>`<span class="chip" style="color:${srcC(x.source)};background:${srcC(x.source)}1f">${srcL(x.source)} ${x.count}</span>`).join('')+'</div>':''}
      ${(cm.deals&&cm.deals.length)?dealsTable(cm.deals):''}
      <button class="morebtn" onclick="CUR_KEY='${d.curMonthKey}';render(DATA);window.scrollTo(0,0)">Открыть ${mLabel(d.curMonthKey)} полностью →</button>`;
      html+=`</div></details>`;
    }
  }
  // дебиторка
  if(rc.count){
    const todayIso=(d.generatedAt||'').slice(0,10);
    const monthCards=(rc.byMonth||[]).filter(m=>m.month!=='—').slice(0,2);
    const noDate=(rc.byMonth||[]).find(m=>m.month==='—');
    html+=sec('⏳ Ждём оплат','кто и когда должен доплатить — это будущие деньги');
    html+=`<div class="grid g4">
      ${tile('Всего ждём',zlh(rc.total),rc.count+' открытых сделок')}
      ${monthCards.map(m=>{const od=m.month<d.curMonthKey;
        return tile((od?'⚠ ':'')+mLabel(m.month),zlh(m.sum),m.count+' сделок'+(od?' · просрочено':''));}).join('')}
      ${noDate?tile('Без даты',zlh(noDate.sum),noDate.count+' сделок — проставить сроки'):''}

    html+=`<div class="card rv" style="margin-top:16px">${receivablesTable(rc.items,todayIso,15)}

  }
  html+=twC();

  // ================= ПРОДАЖИ =================
  html+=twO('sales');
  const _pi=(d.trend||[]).findIndex(t=>t.month===CUR_KEY);
  const growth=_pi>0?kdA(d.trend[_pi].closings,d.trend[_pi-1].closings,true):'';
  html+=`<div class="grid g4" style="margin-top:16px">
    ${tile('Закрытий '+growth,String(pm.closings??'—'),pm.goal?('план '+pm.goal+' · выполнено '+Math.round((pm.closings||0)/pm.goal*100)+'%'):'сделок за месяц')}

    ${tile('Средний чек',zlh(pm.avgDeal),'')}
  </div>`;
  html+=`<div class="card rv" style="margin-top:16px"><b style="font-size:15px">Закрытия по дням · ${mFull(CUR_KEY)}</b>

function renderSeller(d){

  if(me){

    const checks=me.avgCheck?Math.ceil(left/me.avgCheck):null;
    const phrase=plan? (left>0?`${esc(d.name)}, до плана осталось <b>${zl(left)}</b>${checks?` — это ${checks} средн${checks===1?'ий чек':checks<5?'их чека':'их чеков'}`:''}.`:`План сделан. Красавчик, ${esc(d.name)} 🔥`) : '';

      <div class="hlbl">Собрано мной · ${mFull(CUR_KEY)}</div>
      <div class="hnum goldnum">${zlh(me.fact)}</div>
      <div class="hphrase">${phrase}</div></div>`;
    html+=`<div class="grid g3">
      ${tile('Мои закрытия',String(me.closings??'—'),'сделок за месяц')}
      ${tile('Мой план',me.planPct!=null?pct(me.planPct):'—',plan?('собрано '+zl(fact)+' из '+zl(plan)):'')}

    if(me.plan){

      html+=`<div class="card rv" style="margin-top:16px"><b style="font-size:15px">Мой план</b>

    }
    html+=`<div class="card rv" style="margin-top:16px"><b style="font-size:15px">Мои деньги и каналы</b>
      <div class="grid g3" style="margin-top:12px">

        ${tile('Ждём 2-х оплат',zlh(me.pay2),'')}
        ${tile('Выручка (1+2)',zlh(me.revenue),'')}
      </div>
      ${me.wa?`<div class="sec-note">WA-кабинет: $${nf(me.wa.spendUsd)} · ${nf(me.wa.leads)} заявок${me.wa.cpl!=null?` · $${me.wa.cpl}/заявка`:''}</div>`:''}
      ${me.services&&me.services.length?`<div class="schips">${me.services.map(sv=>`<span class="chip">${esc(sv.service)} · ${sv.count}</span>`).join('')}</div>`:''}
      ${me.sources?`<div class="schips">${Object.entries(me.sources).map(([k,v])=>`<span class="chip" style="color:${srcC(k)};background:${srcC(k)}1f">${srcL(k)} ${v}</span>`).join('')}</div>`:''}
    </div>`;
    if(me.kommo){
      const k=me.kommo;
      html+=sec('Моя конверсия','из лидов Kommo этого месяца');
      html+=`<div class="card rv">${stepFunnel(
        [{l:'Лидов упало',v:k.got},{l:'Целевые',v:k.target},{l:'Закрыл',v:me.closings}],k.got,

    }

  }
  $('#content').innerHTML=html;
  bindCharts();
  animateNumbers();
  armAnimations();
}

// ---- reveal-on-scroll (rect-check: работает и в фоновых вкладках) ----
function armAnimations(){
  const targets=[...document.querySelectorAll('#content .rv:not(.in)')];
  const vh=()=>Math.max(innerHeight||0,document.documentElement.clientHeight||0,600);
  const check=()=>{
    for(let i=targets.length-1;i>=0;i--){
      const el=targets[i],r=el.getBoundingClientRect();
      if(r.bottom>0&&r.top<vh()*0.96&&(r.width||r.height)){ el.classList.add('in'); targets.splice(i,1); }
    }
  };
  if(window.__animScroll){ removeEventListener('scroll',window.__animScroll); removeEventListener('resize',window.__animScroll); }
  let tick=false;
  window.__animScroll=()=>{ if(!tick){ tick=true; requestAnimationFrame(()=>{ check(); tick=false; }); } };
  addEventListener('scroll',window.__animScroll,{passive:true});
  addEventListener('resize',window.__animScroll);
  check();
  // фоновые вкладки/поздний layout: перепроверить после раскладки и шрифтов
  setTimeout(check,250); setTimeout(check,1000);
}

// ---- count-up с финализатором (точный текст в конце всегда) ----
function animateNumbers(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.querySelectorAll('.tile .kv, .hnum').forEach(el=>{
    if(el.dataset.anim) return; el.dataset.anim='1';
    let t=el; while(t.children.length===1&&t.children[0].tagName==='SPAN'&&!t.children[0].classList.contains('zl')) t=t.children[0];
    const nodes=[...t.childNodes].filter(n=>n.nodeType===3&&/\d/.test(n.textContent));
    const node=nodes[0]; if(!node) return;
    const txt=node.textContent;
    const m=txt.match(/-?\d[\d\s ]*(?:[.,]\d+)?/); if(!m) return;
    const numStr=m[0].replace(/[\s ]+$/,'');
    const target=parseFloat(numStr.replace(/[\s ]/g,'').replace(',','.'));
    if(isNaN(target)) return;
    const prefix=txt.slice(0,m.index), suffix=txt.slice(m.index+numStr.length);
    const dec=/[.,]\d/.test(numStr)?1:0;
    const start=performance.now(), dur=el.classList.contains('hnum')?900:700;
    const fmt=v=>dec?v.toFixed(1).replace('.',','):Math.round(v).toLocaleString('ru-RU');
    (function tk(){
      let p=Math.min(1,(performance.now()-start)/dur); p=1-Math.pow(1-p,3);
      node.textContent=p<1?prefix+fmt(target*p)+suffix:txt;
      if(p<1) requestAnimationFrame(tk);
    })();
    setTimeout(()=>{ node.textContent=txt; },dur+120);
  });
}
