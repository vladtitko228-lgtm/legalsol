<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Legal Solutions — Кабинет владельца</title>
<link rel="icon" href="/favicon.svg">
<style>
  :root{
    --bg:#0f0c24; --bg2:#181440; --card:rgba(40,34,92,.5); --card2:#2a2560;
    --line:rgba(124,113,214,.22); --p:#6b61e0; --p-l:#8B82E8; --p-p:#B8B2F5;
    --gold:#fde047; --em:#34d399; --red:#fb7185; --amber:#fbbf24; --cyan:#38bdf8;
    --tx:#F2F1FB; --tx-d:#B8B2F5; --tx-dd:#8f89c4;
    --r:18px; --sh:0 10px 34px rgba(0,0,0,.4);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 520px at 10% -8%, rgba(107,97,224,.28), transparent 60%),
      radial-gradient(760px 480px at 100% 2%, rgba(56,189,248,.10), transparent 55%),
      var(--bg);
    background-attachment:fixed}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  @keyframes cardIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
  a{color:var(--p-l)}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 60px}
  .muted{color:var(--tx-dd)}
  .pos{color:var(--em)} .neg{color:var(--red)}

  /* ---- login ---- */
  #login{max-width:400px;margin:9vh auto;background:var(--card);border:1px solid var(--line);
    border-radius:var(--r);padding:32px 28px;box-shadow:var(--sh)}
  #login h1{font-size:20px;margin:0 0 4px}
  #login p{margin:0 0 22px;color:var(--tx-d);font-size:14px}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:12px;color:var(--tx-d);margin-bottom:6px}
  .fld input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--line);
    background:var(--bg2);color:var(--tx);font-size:15px;outline:none}
  .fld input:focus{border-color:var(--p-l)}
  .btn{width:100%;padding:12px;border:0;border-radius:11px;background:var(--p);color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{background:#6a61e0} .btn:disabled{opacity:.6;cursor:default}
  #err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}

  /* ---- header ---- */
  header{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--p-l));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  header h1{font-size:17px;margin:0;line-height:1.2}
  header .sub{font-size:12px;color:var(--tx-dd)}
  .spacer{flex:1}
  .ghost{background:var(--card2);border:1px solid var(--line);color:var(--tx-d);padding:8px 14px;
    border-radius:10px;font-size:13px;cursor:pointer}
  .ghost:hover{color:var(--tx);border-color:var(--p-l)}

  /* ---- layout ---- */
  .sec-title{display:flex;align-items:center;gap:9px;margin:32px 2px 14px;font-size:12px;
    letter-spacing:.09em;text-transform:uppercase;color:var(--tx-dd);font-weight:700}
  .sec-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .sec-title .ic{font-size:15px}
  /* строка здоровья бизнеса */
  .health{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px}
  @media(max-width:760px){.health{grid-template-columns:repeat(2,1fr)}}
  .sig{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 15px;backdrop-filter:blur(12px);overflow:hidden;animation:cardIn .4s ease both}
  .sig .sdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;box-shadow:0 0 10px currentColor}
  .sig .st{font-size:12px;color:var(--tx-dd)}
  .sig .sv{font-size:19px;font-weight:750;margin-top:3px;font-variant-numeric:tabular-nums}
  .sig .sglow{position:absolute;inset:0;opacity:.10;pointer-events:none}
  .grid{display:grid;gap:14px}
  .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:860px){.g3,.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
  @media(max-width:520px){.g3,.g4{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;
    box-shadow:var(--sh);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    animation:cardIn .42s ease both;transition:border-color .18s ease}
  .card:hover{border-color:rgba(139,130,232,.42)}
  .card.k{padding:16px 18px}
  .k .lbl{font-size:12px;color:var(--tx-dd);margin-bottom:7px;display:flex;justify-content:space-between}
  .k .val{font-size:27px;font-weight:770;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .k .sub{font-size:12px;color:var(--tx-d);margin-top:5px}
  .chip{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--card2);color:var(--p-p)}
  .chip.up{background:rgba(52,211,153,.14);color:var(--em)}
  .chip.dn{background:rgba(248,113,113,.14);color:var(--red)}

  /* hero */
  .hero{background:linear-gradient(150deg,rgba(64,56,140,.55),rgba(34,29,82,.5));
    border:1px solid rgba(139,130,232,.3);box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.05)}
  .hero.glow-gold{box-shadow:var(--sh),0 0 46px rgba(253,224,71,.10),inset 0 0 0 1px rgba(253,224,71,.22)}
  .hero.glow-red{box-shadow:var(--sh),0 0 46px rgba(251,113,133,.12),inset 0 0 0 1px rgba(251,113,133,.24)}
  .hero.glow-em{box-shadow:var(--sh),0 0 46px rgba(52,211,153,.12),inset 0 0 0 1px rgba(52,211,153,.22)}
  .hero .val{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums}
  .gauge-wrap{display:flex;align-items:center;gap:18px}
  .bar-track{height:9px;border-radius:9px;background:var(--bg2);overflow:hidden;margin-top:10px}
  .bar-fill{height:100%;border-radius:9px;background:linear-gradient(90deg,var(--p),var(--gold))}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  td,th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--tx-dd);font-weight:600;font-size:12px}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:0}
  .rowbar{height:6px;border-radius:6px;background:var(--p);display:inline-block;vertical-align:middle;margin-left:8px}
  .flex{display:flex;align-items:center;gap:10px}
  .lgd{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--tx-d);margin-top:10px}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}
  .hint{font-size:12px;color:var(--tx-dd);margin-top:8px;line-height:1.5}
  .clickable{cursor:pointer} .clickable:hover{border-color:rgba(139,130,232,.5)}
  .exp-donut{display:none;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);animation:cardIn .3s ease both}
  .exp-card.open .exp-donut{display:block}
  .exp-card .tap{transition:opacity .2s} .exp-card.open .tap{opacity:.4}
  .hidden{display:none!important}
  .center{text-align:center;color:var(--tx-dd);padding:40px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="hidden">
  <h1>Кабинет владельца</h1>
  <p>Legal Solutions · вход по номеру телефона</p>
  <form id="loginForm">
    <div class="fld"><label>Номер телефона</label>
      <input id="phone" type="tel" inputmode="tel" placeholder="+48 …" autocomplete="username" required></div>
    <div class="fld"><label>Пароль</label>
      <input id="password" type="password" autocomplete="current-password" required></div>
    <button class="btn" id="loginBtn" type="submit">Войти</button>
    <div id="err"></div>
  </form>
</div>

<!-- DASHBOARD -->
<div id="app" class="wrap hidden">
  <header>
    <div class="logo">LS</div>
    <div>
      <h1>Кабинет владельца</h1>
      <div class="sub" id="genLabel">—</div>
    </div>
    <div class="spacer"></div>
    <button class="ghost" id="refreshBtn">Обновить</button>
    <button class="ghost" id="logoutBtn">Выход</button>
  </header>
  <div id="content"></div>
</div>

<div id="boot" class="center wrap">Загрузка…</div>

<script>
const $ = s => document.querySelector(s);
// Единый endpoint: /api/owner?action=login|me|logout|data (одна serverless-функция).
const api = (action,o={}) => fetch('/api/owner?action='+action+'&_='+Date.now(),
  {credentials:'same-origin',cache:'no-store',...o});

// ---- formatting ----
const nf = n => (n==null||isNaN(n))?'—':Math.round(n).toLocaleString('ru-RU').replace(/,/g,' ');
const zl = n => (n==null||isNaN(n))?'—':nf(n)+' zł';
const pct = n => (n==null||isNaN(n))?'—':(Math.round(n*10)/10)+'%';
const RUM = ['','янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const dLabel = iso => { const p=String(iso).split('-'); return p[2]+'.'+p[1]; };  // 2026-07-15 → 15.07
const mLabel = ym => { const [y,m]=ym.split('-'); return RUM[+m]+' '+y.slice(2); };

// ---- auth flow ----
async function boot(){
  try{
    const r = await api('me');
    if(r.status===200){ showApp(); } else { showLogin(); }
  }catch(_){ showLogin(); }
}
function showLogin(){ $('#boot').classList.add('hidden'); $('#app').classList.add('hidden'); $('#login').classList.remove('hidden'); $('#phone').focus(); }
function showApp(){ $('#boot').classList.add('hidden'); $('#login').classList.add('hidden'); $('#app').classList.remove('hidden'); loadData(); }

$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'); btn.disabled=true; $('#err').textContent='';
  try{
    const r = await api('login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:$('#phone').value,password:$('#password').value})});
    const j = await r.json().catch(()=>({}));
    if(r.status===200){ showApp(); }
    else if(r.status===429){ $('#err').textContent = j.message||'Слишком много попыток. Подождите.'; }
    else if(j.error==='owner_not_configured'){ $('#err').textContent = 'Кабинет ещё не настроен на сервере (нет OWNER_* на Vercel) — это не про пароль.'; }
    else { $('#err').textContent = 'Неверный номер или пароль'; }
  }catch(_){ $('#err').textContent='Ошибка сети'; }
  btn.disabled=false;
});
$('#logoutBtn').addEventListener('click', async ()=>{ await api('logout',{method:'POST'}); showLogin(); });
$('#refreshBtn').addEventListener('click', ()=>loadData(true));

// ---- data ----
async function loadData(force){
  $('#content').innerHTML = '<div class="center">Обновляю данные…</div>';
  try{
    const r = await api('data');
    if(r.status===401){ showLogin(); return; }
    const d = await r.json();
    if(d.empty){ $('#content').innerHTML='<div class="center">Данные ещё не загружены.<br>Запусти сборщик: <code>python3 owner-dashboard/build_dashboard.py --push</code></div>'; return; }
    render(d);
  }catch(e){ $('#content').innerHTML='<div class="center neg">Ошибка загрузки данных</div>'; }
}

// ---- small chart helpers (inline SVG) ----
function sparkline(pts, {w=560,h=70,color='var(--p-l)',fill=true}={}){
  const vals = pts.map(p=>p||0); const max=Math.max(1,...vals);
  const dx = w/(Math.max(1,vals.length-1));
  const xy = vals.map((v,i)=>[i*dx, h-4-(v/max)*(h-12)]);
  const line = xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area = fill ? `<path d="${line} L ${w} ${h} L 0 ${h} Z" fill="${color}" opacity=".13"/>` : '';
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    ${area}<path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function gauge(p){ // 0..100+
  const v=Math.max(0,Math.min(100,p)); const r=42,c=2*Math.PI*r, off=c*(1-v/100);
  const col = p>=100?'var(--em)':p>=66?'var(--gold)':p>=33?'var(--amber)':'var(--red)';
  return `<svg width="104" height="104" viewBox="0 0 104 104">
    <circle cx="52" cy="52" r="${r}" fill="none" stroke="var(--bg2)" stroke-width="9"/>
    <circle cx="52" cy="52" r="${r}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 52 52)"/>
    <text x="52" y="49" text-anchor="middle" fill="var(--tx)" font-size="21" font-weight="750">${p}%</text>
    <text x="52" y="66" text-anchor="middle" fill="var(--tx-dd)" font-size="10">цели</text></svg>`;
}
function barsMonthly(trend,goal,curKey){
  const max=Math.max(goal,...trend.map(t=>t.closings));
  return `<div class="flex" style="align-items:flex-end;gap:16px;height:130px;padding-top:8px">`+
    trend.map(t=>{const hh=(t.closings/max)*110; const cur=t.month===curKey;
      const bg=cur?'repeating-linear-gradient(180deg,var(--p-l),var(--p-l) 4px,var(--p) 4px,var(--p) 8px)':'linear-gradient(180deg,var(--p-l),var(--p))';
      return `<div style="flex:1;text-align:center;opacity:${cur?'.5':'1'}">
        <div class="muted" style="font-size:12px;margin-bottom:5px">${t.closings}${cur?' ◷':''}</div>
        <div style="height:${Math.max(2,hh)}px;background:${bg};border-radius:7px 7px 3px 3px"></div>
        <div class="muted" style="font-size:11px;margin-top:6px">${mLabel(t.month)}${cur?' · идёт':''}</div></div>`}).join('')
    +`</div>`;
}
function hbars(items, valOf, labOf, colorOf){
  const max=Math.max(1,...items.map(valOf));
  return items.map(it=>`<div style="margin:9px 0">
    <div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px">
      <span>${labOf(it)}</span><span class="muted" style="font-variant-numeric:tabular-nums">${valOf(it)}</span></div>
    <div class="bar-track" style="margin-top:0"><div class="bar-fill" style="width:${valOf(it)/max*100}%;background:${colorOf?colorOf(it):'var(--p)'}"></div></div>
  </div>`).join('');
}

// ---- KPI card ----
function kcard(lbl,val,sub,chip){
  return `<div class="card k"><div class="lbl"><span>${lbl}</span>${chip||''}</div>
    <div class="val">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}
function delta(cur,prev){
  if(!prev||prev===0) return '';
  const g=Math.round((cur-prev)/prev*100);
  return `<span class="chip ${g>=0?'up':'dn'}">${g>=0?'▲':'▼'} ${Math.abs(g)}%</span>`;
}

// ---- render ----
let CUR_KEY=null, DATA=null;   // выбранный месяц + последние данные (для перерисовки)
function render(d){
  DATA=d;
  // выбранный месяц: сохраняем выбор пользователя, иначе месяц по умолчанию
  if(!CUR_KEY || !(d.months && d.months[CUR_KEY])) CUR_KEY = d.defaultMonth || d.prevMonthKey;
  const pm = (d.months && d.months[CUR_KEY]) || d.prevMonth;   // блок выбранного месяца
  const fc=d.forecast, pnl=(pm && pm.pnl) || null, site=d.site;  // PnL строго выбранного месяца
  $('#genLabel').textContent = 'обновлено '+ (d.generatedLabel||'') + (d.goal?(' · цель '+d.goal+' закрытий/мес'):'');
  const paceTxt = fc.paceNote==='mtd'
    ? `Прогноз по темпу месяца (${fc.daysElapsed} из ${fc.daysInMonth} дней, уже закрыто ${fc.closingsMTD}).`
    : `Текущий месяц только начался — прогноз построен по итогам прошлого месяца (${mLabel(fc.baseMonth)}).`;

  // переключатель месяца (архив)
  const monSel = (d.monthOrder&&d.monthOrder.length)
    ? `<div style="display:flex;align-items:center;gap:10px;margin:2px 2px 4px">
         <span class="muted" style="font-size:12px">Месяц:</span>
         <select id="monthSel" style="background:var(--card2);color:var(--tx);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer">
           ${d.monthOrder.map(k=>`<option value="${k}" ${k===CUR_KEY?'selected':''}>${mLabel(k)}${k===d.curMonthKey?' · идёт':''}</option>`).join('')}
         </select></div>` : '';

  let html=monSel + (CUR_KEY===d.defaultMonth ? renderHealth(d,pm,fc,pnl) : '');

  // ===== ПРОГНОЗ (hero) — только для актуального (дефолтного) месяца =====
  if(CUR_KEY===d.defaultMonth){
  html += secTitle('🔮','Прогноз месяца');
  const glow=fc.goalPct>=66?'glow-em':fc.goalPct>=33?'glow-gold':'glow-red';
  html += `<div class="grid g3">
    <div class="card hero ${glow}">
      <div class="lbl" style="color:var(--tx-d)">Закрытий к концу месяца</div>
      <div class="gauge-wrap" style="margin-top:6px">
        ${gauge(fc.goalPct)}
        <div><div class="val">${fc.projClosings}</div>
        <div class="sub">из цели ${fc.goal} · ${fc.goalPct}%</div></div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,fc.goalPct)}%"></div></div>
    </div>
    ${kcard('Прогноз выручки (контракты)', zl(fc.projContracted),'сумма подписанных сделок за месяц')}
    ${kcard('Прогноз прибыли (PnL)', `<span class="${(fc.projProfit||0)<0?'neg':'pos'}">${zl(fc.projProfit)}</span>`, pnl?('маржа '+pct(pnl.margin)):'')}
  </div>
  <div class="hint">${paceTxt}</div>`;
  }

  // ===== ПРОДАЖИ =====
  const _pi = d.trend.findIndex(t=>t.month===CUR_KEY);
  const growth = _pi>0 ? delta(d.trend[_pi].closings, d.trend[_pi-1].closings) : '';
  html += secTitle('💰','Продажи · '+monthName(pm,d,'prev'));
  html += `<div class="grid g4">
    ${kcard('Закрытий', pm.closings, pm.goal?('план '+pm.goal+' · '+Math.round(pm.closings/pm.goal*100)+'% плана'):'сделок за месяц', growth)}
    ${kcard('Контракты', zl(pm.contracted), 'сумма подписанных сделок')}
    ${kcard('Собрано', zl(pm.collected), 'фактически поступило')}
    ${kcard('Средний чек', zl(pm.avgDeal))}
  </div>`;
  html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:6px">Динамика закрытий по месяцам</div>
    ${barsMonthly(d.trend, d.goal, d.curMonthKey)}</div>`;

  // ===== ПО ПРОДАВЦАМ =====
  if(pm.bySeller && pm.bySeller.length){
    html += secTitle('👥','По продавцам · '+monthName(pm,d));
    html += `<div class="grid g2">${pm.bySeller.map(sellerCard).join('')}</div>`;
  }
  // ===== ИСТОЧНИКИ ЗАКРЫТИЙ (качество, из чата оплат) =====
  if(pm.quality && pm.quality.length){
    const q=pm.quality, tot=pm.qualityTotal||q.reduce((s,x)=>s+x.count,0);
    html += secTitle('🎯','Источники закрытий · '+monthName(pm,d));
    html += `<div class="card">
      ${q.map(x=>`<div style="margin:9px 0">
        <div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>${srcLabelRu(x.source)}</span><span class="muted">${x.count} · ${Math.round(x.count/tot*100)}%${x.amount?' · '+zl(x.amount):''}</span></div>
        <div class="bar-track" style="margin-top:0"><div class="bar-fill" style="width:${x.count/tot*100}%;background:${srcColor(x.source)}"></div></div></div>`).join('')}
      <div class="hint">Из чата оплат (тегируется автоматически). За месяц отмечено ${tot}. Историю до подключения бота не достать — копится вперёд.</div>
    </div>`;
  }
  if(pm.byService && pm.byService.length){
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:8px">Услуги — что закрывают</div>
      ${hbars(pm.byService,x=>x.count,x=>x.service,()=>'var(--p)')}</div>`;
  }

  // ===== РЕКЛАМА (источник: «Бюджет LegalSol», zł) =====
  html += secTitle('📣','Реклама · '+monthName(pm,d,'prev')+' · zł');
  html += `<div class="grid g4">
    ${kcard('Расход', zl(pm.budget), pm.activeDays+' активных дней')}
    ${kcard('Лидов', nf(pm.leads),'CPL '+zl(pm.cpl))}
    ${kcard('Цена закрытия (CAC)', zl(pm.cac),'расход ÷ закрытия')}
    ${kcard('Конверсия', pct(pm.lead2sale),'лид → сделка')}
  </div>`;
  const adLeads = (d.adDaily||[]).map(x=>x.leads||0);
  const cabs = [{n:'Кабинет 1',v:Math.round(pm.k1||0)},{n:'Кабинет 2',v:Math.round(pm.k2||0)},
                {n:'Кабинет 3',v:Math.round(pm.k3||0)},{n:'TikTok',v:Math.round(pm.tt||0)}].filter(x=>x.v);
  html += `<div class="grid g2" style="margin-top:14px">
    <div class="card"><div class="lbl" style="margin-bottom:6px">Лиды по дням (${adLeads.length})</div>
      ${adLeads.length?sparkline(adLeads,{color:'var(--gold)'}):'<div class="muted">нет данных</div>'}
      <div class="hint">ROAS ${pm.roasCollected||'—'}× по собранному · ${pm.roasContracted||'—'}× по контрактам</div></div>
    <div class="card"><div class="lbl" style="margin-bottom:10px">Расход по кабинетам (zł)</div>
      ${cabs.length?hbars(cabs, x=>x.v, x=>x.n, ()=>'var(--gold)'):'<div class="muted">нет данных</div>'}
      <div class="hint">Привязка кабинет→продавец уточняется.</div></div>
  </div>
  <div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:10px">Закрытия с рекламы: лид vs входящий</div>
    ${splitBar(pm.adLead, pm.adIncoming)}
    <div class="hint">Метка из чата оплат (парсер в работе). Пусто = сделка ещё не отмечена.</div></div>`;

  // ===== ФИНАНСЫ (PnL) =====
  if(pnl){
    html += secTitle('🧾','Финансы · PnL '+ (pnl.month||''));
    html += `<div class="grid g4">
      ${kcard('Доход', zl(pnl.income),'поступления за месяц')}
      ${kcard('Расход', zl(pnl.expenses))}
      ${kcard('Прибыль', `<span class="${(pnl.profit||0)<0?'neg':'pos'}">${zl(pnl.profit)}</span>`,'маржа '+pct(pnl.margin))}
      ${kcard('ROI', `<span class="${(pnl.roi||0)<0?'neg':'pos'}">${pct(pnl.roi)}</span>`, pnl.newCases!=null?('новые сделки '+zl(pnl.newCases)):'')}
    </div>`;
    if((pnl.profit||0)<0){
      html += `<div class="hint neg">⚠ Прибыль отрицательная: расходы выше поступлений. Основная выручка ещё в дебиторке — контракты ${zl(pm.contracted)}, собрано ${zl(pm.collected)} (не собрано ~${zl(pm.contracted-pm.collected)}).</div>`;
    }
    // разбивка расходов по статьям + связка с выручкой
    if(pnl.expenseCats && Object.keys(pnl.expenseCats).length){
      const cats=Object.entries(pnl.expenseCats).map(([k,v])=>({name:k,amount:v})).sort((a,b)=>b.amount-a.amount);
      const totExp=cats.reduce((s,c)=>s+c.amount,0), income=pnl.income||0;
      html += `<div class="grid g2" style="margin-top:14px">
        <div class="card exp-card clickable" onclick="this.classList.toggle('open')">
          <div class="lbl" style="margin-bottom:10px">Расходы по статьям <span class="tap muted" style="font-size:11px">· нажми — график 📊</span></div>
          ${cats.map(c=>`<div style="margin:9px 0">
            <div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span>${c.name}</span><span class="muted">${zl(c.amount)} · ${Math.round(c.amount/totExp*100)}%</span></div>
            <div class="bar-track" style="margin-top:0"><div class="bar-fill" style="width:${c.amount/totExp*100}%;background:${expColor(c.name)}"></div></div></div>`).join('')}
          <div class="hint">Каждая статья — % от расходов. Реклама ${Math.round((pnl.expenseCats['Реклама']||0)/income*100)}% от выручки.</div>
          <div class="exp-donut">${donutChart(cats, totExp)}</div>
        </div>
        <div class="card"><div class="lbl" style="margin-bottom:10px">Выручка → расходы</div>
          ${incomeVsExpense(income, totExp, cats)}
        </div>
      </div>`;
    }
  }

  // ===== УЧРЕДИТЕЛИ (глобально) =====
  if(d.founders){
    const f=d.founders;
    html += secTitle('🤝','Учредители');
    const repPct = f.akimTotal? Math.round((f.akimRepaid||0)/f.akimTotal*100):0;
    html += `<div class="grid g3">
      ${kcard('Долг Акиму (осталось)', zl(f.akimRemaining), f.akimRepaid?('погашено '+zl(f.akimRepaid)+' из '+zl(f.akimTotal)):('всего '+zl(f.akimTotal)+' · нал'))}
      ${kcard('Доля Влада', (f.dividends['Влад']||0)+'%', 'дивиденды')}
      ${kcard('Доля Акима', (f.dividends['Аким']||0)+'%', 'дивиденды')}
    </div>`;
    html += `<div class="card" style="margin-top:14px">
      <div class="lbl" style="margin-bottom:8px">Погашение долга Акиму</div>
      <div class="bar-track" style="height:12px"><div class="bar-fill" style="width:${repPct}%;background:linear-gradient(90deg,var(--em),var(--gold))"></div></div>
      <div class="hint">Погашено ${zl(f.akimRepaid)} из ${zl(f.akimTotal)} · осталось ${zl(f.akimRemaining)} (${repPct}%). ${f.akimRepaid?'':'Начинаем гасить с августа.'}</div>
      ${(f.akim.repayments&&f.akim.repayments.length)?`<table style="margin-top:10px"><thead><tr><th>Дата</th><th class="n">Погашено</th></tr></thead><tbody>${f.akim.repayments.map(r=>`<tr><td>${r.date?dLabel(r.date):'—'}</td><td class="n pos">${zl(r.amount)}</td></tr>`).join('')}</tbody></table>`:''}
    </div>`;
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:8px">Кредит Акима (заёмные, всё нал) — из чего состоит</div>
      <table><tbody>${f.akim.items.map(i=>`<tr><td>${i.label}${i.cash?' <span class="chip">нал</span>':''}</td><td class="n">${zl(i.amount)}</td></tr>`).join('')}
      <tr><td style="font-weight:700">Итого</td><td class="n" style="font-weight:750;color:var(--gold)">${zl(f.akimTotal)}</td></tr></tbody></table></div>`;
  }

  // ===== ЖДЁМ ОПЛАТ (дебиторка, глобально — не зависит от выбранного месяца) =====
  if(d.receivables && d.receivables.count){
    const rc=d.receivables, todayKey=d.curMonthKey, todayIso=(d.generatedAt||'').slice(0,10);
    const monthCards = rc.byMonth.filter(m=>m.month!=='—').map(m=>{
      const overdue = m.month < todayKey;
      return kcard((overdue?'⚠ ':'')+mLabel(m.month), zl(m.sum), m.count+' сделок'+(overdue?' · просрочено':''));
    });
    const noDate = rc.byMonth.find(m=>m.month==='—');
    html += secTitle('⏳','Ждём оплат · дебиторка (все открытые сделки)');
    html += `<div class="grid g4">
      ${kcard('Всего ждём', zl(rc.total), rc.count+' открытых сделок')}
      ${monthCards.slice(0,2).join('')}
      ${noDate?kcard('Без дедлайна', zl(noDate.sum), noDate.count+' — проставить дату'):''}
    </div>`;
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:8px">Ближайшие оплаты</div>
      <table><thead><tr><th>Клиент</th><th>Продавец</th><th class="n">Ждём</th><th class="n">Дедлайн</th><th>Статус</th></tr></thead>
      <tbody>${rc.items.slice(0,15).map(i=>{const od=i.deadline&&i.deadline<todayIso;
        return `<tr><td>${i.name}</td><td class="muted">${i.closer}</td><td class="n">${zl(i.remain)}</td><td class="n ${od?'neg':''}">${i.deadline?dLabel(i.deadline):'—'}</td><td class="muted" style="font-size:12px">${i.status}</td></tr>`}).join('')}</tbody></table>
      <div class="hint">Ближайшие 15 из ${rc.count}. Красный дедлайн = просрочен. Собрать это → уйдёт в плюс.</div></div>`;
  }

  // ===== САЙТ =====
  if(site){
    const per = site.period? (`${site.period.days} дней`):'';
    html += secTitle('🌐','Сайт · '+per);
    html += `<div class="grid g4">
      ${kcard('Пользователи', nf(site.users), 'сессий '+nf(site.sessions))}
      ${kcard('Просмотры', nf(site.views))}
      ${kcard('Клики WhatsApp', nf(site.wa),'звонки '+nf(site.phone))}
      ${kcard('Конверсия', pct(site.conv),'отказы '+pct(site.bounce))}
    </div>`;
    const traf=(site.daily||[]).map(x=>x.users||0);
    html += `<div class="card" style="margin-top:14px"><div class="lbl" style="margin-bottom:6px">Трафик по дням</div>
      ${traf.length?sparkline(traf,{color:'var(--p-l)'}):''}</div>`;
    html += `<div class="grid g2" style="margin-top:14px">
      <div class="card"><div class="lbl" style="margin-bottom:10px">Источники трафика</div>
        ${hbars((site.sources||[]).slice(0,7),x=>x.sessions,x=>srcLabel(x),x=>x.paid?'var(--gold)':'var(--p-l)')}</div>
      <div class="card"><div class="lbl" style="margin-bottom:10px">Страны</div>
        <table><tbody>${(site.countries||[]).map(c=>`<tr><td>${countryLabel(c.country)}${c.bot?' <span class="chip">бот</span>':''}</td><td class="n">${nf(c.users)}</td></tr>`).join('')}</tbody></table></div>
    </div>`;
  }

  html += `<div class="hint" style="margin-top:26px;text-align:center">Источники: таблицы закрытий · реклама · PnL · GA4. Всего сделок в базе: ${d.closingsTotal||'—'}.</div>`;

  $('#content').innerHTML = html;
  const ms=$('#monthSel'); if(ms) ms.onchange=e=>{ CUR_KEY=e.target.value; render(DATA); };
}

function secTitle(ic,t){ return `<div class="sec-title"><span class="ic">${ic}</span>${t}</div>`; }
function renderHealth(d, pm, fc, pnl){
  const C={g:'#34d399',y:'#fbbf24',r:'#fb7185'};
  const rc=d.receivables||{};
  const sigs=[
    {t:'Темп к плану', v:(fc.goalPct||0)+'%', st:fc.goalPct>=80?'g':fc.goalPct>=50?'y':'r', note:fc.projClosings+' из '+fc.goal},
    {t:'Прибыль (PnL)', v:zl(pnl&&pnl.profit), st:!pnl?'y':(pnl.profit>0?'g':(pnl.margin>-10?'y':'r')), note:pnl?'маржа '+pct(pnl.margin):'нет данных'},
    {t:'Цена лида', v:zl(pm.cpl), st:pm.cpl==null?'y':(pm.cpl<40?'g':(pm.cpl<70?'y':'r')), note:nf(pm.leads)+' лидов'},
    {t:'Ждём оплат', v:zl(rc.total), st:'y', note:(rc.count||0)+' сделок'},
  ];
  return `<div class="health">`+sigs.map(s=>`
    <div class="sig"><div class="sglow" style="background:radial-gradient(120px 60px at 92% 0%,${C[s.st]},transparent)"></div>
      <div class="st"><span class="sdot" style="color:${C[s.st]}"></span>${s.t}</div>
      <div class="sv" style="color:${C[s.st]}">${s.v}</div>
      <div class="st" style="margin-top:2px">${s.note}</div></div>`).join('')+`</div>`;
}
function sellerCard(s){
  const pp=s.planPct;
  const col=pp==null?'var(--p-l)':(pp>=80?'var(--em)':pp>=50?'var(--gold)':'var(--red)');
  const cell=(l,v)=>`<div><div style="font-size:11px;color:var(--tx-dd)">${l}</div><div style="font-weight:700;font-size:15px">${v}</div></div>`;
  return `<div class="card">
    <div class="flex" style="justify-content:space-between;align-items:center">
      <div style="font-size:17px;font-weight:750">${s.name}</div>
      <span class="chip">${s.closings} закрытий</span>
    </div>
    ${s.plan?`<div style="margin-top:12px">
      <div class="flex" style="justify-content:space-between;font-size:12px;color:var(--tx-d)"><span>План / факт</span><span style="color:${col};font-weight:700">${pct(s.planPct)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,s.planPct||0)}%;background:${col}"></div></div>
      <div style="font-size:11px;color:var(--tx-dd);margin-top:4px">${zl(s.fact)} из ${zl(s.plan)}</div></div>`:''}
    <div class="grid g2" style="margin-top:14px;gap:12px">
      ${cell('Выручка (1+2)', zl(s.revenue))}
      ${cell('Средний чек', zl(s.avgCheck))}
      ${cell('Собрано 1-я', zl(s.fact))}
      ${cell('Ждём 2-я', zl(s.pay2))}
      ${s.adSpend!=null?cell('Реклама (кабинет)', zl(s.adSpend)):''}
      ${s.costPerClose!=null?cell('Стоимость закрытия', zl(s.costPerClose)):''}
    </div>
    ${s.services&&s.services.length?`<div style="margin-top:14px">
      <div style="font-size:11px;color:var(--tx-dd);margin-bottom:6px">Что закрывает</div>
      ${s.services.map(sv=>`<div class="flex" style="justify-content:space-between;font-size:12.5px;margin:3px 0"><span>${sv.service}</span><span class="chip">${sv.count}</span></div>`).join('')}</div>`:''}
    ${s.sources?`<div style="margin-top:12px"><div style="font-size:11px;color:var(--tx-dd);margin-bottom:6px">Источники (из чата)</div>
      ${Object.entries(s.sources).map(([k,v])=>`<span class="chip" style="margin-right:6px">${srcLabelRu(k)} ${v}</span>`).join('')}</div>`:''}
  </div>`;
}
function monthName(block,d,which){
  // подпись выбранного в переключателе месяца
  return mLabel(CUR_KEY || d.prevMonthKey || d.curMonthKey);
}
function srcLabel(x){ return (x.source||x.channel||'—') + (x.paid?' · платный':''); }
function expColor(n){ return n==='Реклама'?'#fde047':n==='Зарплаты'?'#38bdf8':n==='Операционные'?'#8B82E8':n==='Налоги'?'#fb7185':'#6b61e0'; }
function srcLabelRu(s){ return {'лид':'🎯 С рекламы (лид)','входящий':'💬 Входящие','суприм':'📇 Supremes (база)','сарафан':'🤝 Сарафан','груп':'👥 Групповое'}[s]||s; }
function srcColor(s){ return {'лид':'#fde047','входящий':'#38bdf8','суприм':'#8B82E8','сарафан':'#34d399','груп':'#fbbf24'}[s]||'#6b61e0'; }
function donutChart(cats, total){
  const r=54, cx=70, cy=70, circ=2*Math.PI*r; let off=0;
  const segs=cats.map(c=>{const len=(c.amount/total)*circ;
    const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${expColor(c.name)}" stroke-width="20" stroke-dasharray="${len.toFixed(1)} ${(circ-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len; return seg;}).join('');
  return `<div class="flex" style="gap:22px;flex-wrap:wrap;align-items:center">
    <svg width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0">${segs}
      <text x="${cx}" y="${cy-1}" text-anchor="middle" fill="var(--tx)" font-size="15" font-weight="750" class="num">${nf(total)}</text>
      <text x="${cx}" y="${cy+15}" text-anchor="middle" fill="var(--tx-dd)" font-size="10">zł расход</text></svg>
    <div style="flex:1;min-width:150px">${cats.map(c=>`<div class="flex" style="justify-content:space-between;margin:7px 0;font-size:13px">
      <span><span class="dot" style="background:${expColor(c.name)}"></span>${c.name}</span>
      <span class="muted num">${zl(c.amount)} · ${Math.round(c.amount/total*100)}%</span></div>`).join('')}</div>
  </div>`;
}
function incomeVsExpense(income, totExp, cats){
  const max=Math.max(income,totExp)||1;
  const stack=cats.map(c=>`<div style="height:100%;width:${c.amount/max*100}%;background:${expColor(c.name)}"></div>`).join('');
  const loss=totExp-income;
  return `<div style="font-size:12px;color:var(--tx-d);margin-bottom:5px">Выручка · ${zl(income)}</div>
    <div class="bar-track" style="height:22px;margin-top:0"><div style="height:100%;width:${income/max*100}%;background:var(--em);border-radius:9px"></div></div>
    <div style="font-size:12px;color:var(--tx-d);margin:14px 0 5px">Расходы · ${zl(totExp)}</div>
    <div class="bar-track" style="height:22px;margin-top:0;display:flex;gap:1px;overflow:hidden">${stack}</div>
    <div class="lgd">${cats.map(c=>`<span><span class="dot" style="background:${expColor(c.name)}"></span>${c.name}</span>`).join('')}</div>
    <div class="hint ${loss>0?'neg':'pos'}">${loss>0?('Расходы больше выручки на '+zl(loss)+' ('+Math.round(loss/income*100)+'%) — отсюда минус в прибыли.'):('Прибыль '+zl(income-totExp))}</div>`;
}

// --- Страны: авто-флаг + русское имя по названию из GA4 (англ.) ---
// ISO2 → эмодзи флага (региональные индикаторы). Название нормализуем через карту ниже.
function flagEmoji(iso){
  if(!iso) return '🌐';
  return iso.toUpperCase().replace(/[A-Z]/g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}
// GA4 отдаёт страны по-английски. Карта: англ. имя → [ISO2, рус. имя].
// Покрывает основную аудиторию LS; чего нет — показываем как есть с 🌐.
const COUNTRY = {
  'Poland':['PL','Польша'], 'Ukraine':['UA','Украина'], 'Belarus':['BY','Беларусь'],
  'Russia':['RU','Россия'], 'Germany':['DE','Германия'], 'United States':['US','США'],
  'United Kingdom':['GB','Великобритания'], 'France':['FR','Франция'], 'Italy':['IT','Италия'],
  'Spain':['ES','Испания'], 'Netherlands':['NL','Нидерланды'], 'Czechia':['CZ','Чехия'],
  'Lithuania':['LT','Литва'], 'Latvia':['LV','Латвия'], 'Georgia':['GE','Грузия'],
  'Armenia':['AM','Армения'], 'Azerbaijan':['AZ','Азербайджан'], 'Kazakhstan':['KZ','Казахстан'],
  'Uzbekistan':['UZ','Узбекистан'], 'Tajikistan':['TJ','Таджикистан'], 'Kyrgyzstan':['KG','Киргизия'],
  'Turkey':['TR','Турция'], 'India':['IN','Индия'], 'Pakistan':['PK','Пакистан'],
  'Bangladesh':['BD','Бангладеш'], 'Nepal':['NP','Непал'], 'Sri Lanka':['LK','Шри-Ланка'],
  'Philippines':['PH','Филиппины'], 'Indonesia':['ID','Индонезия'], 'Vietnam':['VN','Вьетнам'],
  'China':['CN','Китай'], 'Singapore':['SG','Сингапур'], 'Nigeria':['NG','Нигерия'],
  'Egypt':['EG','Египет'], 'Morocco':['MA','Марокко'], 'Algeria':['DZ','Алжир'],
  'Tunisia':['TN','Тунис'], 'Kenya':['KE','Кения'], 'Ghana':['GH','Гана'],
  'Cameroon':['CM','Камерун'], 'Zimbabwe':['ZW','Зимбабве'], 'South Africa':['ZA','ЮАР'],
  'Brazil':['BR','Бразилия'], 'Colombia':['CO','Колумбия'], 'Mexico':['MX','Мексика'],
  'Iran':['IR','Иран'], 'Iraq':['IQ','Ирак'], 'Syria':['SY','Сирия'],
  'Afghanistan':['AF','Афганистан'], 'United Arab Emirates':['AE','ОАЭ'], 'Saudi Arabia':['SA','Саудовская Аравия'],
  '(not set)':['','Не определено']
};
function countryLabel(name){
  const m = COUNTRY[name];
  const iso = m ? m[0] : '';
  const ru  = m ? m[1] : (name || '—');
  return flagEmoji(iso) + ' ' + ru;
}
function splitBar(lead,inc){
  const tot=(lead||0)+(inc||0);
  if(!tot) return '<div class="muted">нет отмеченных</div>';
  const lp=lead/tot*100;
  return `<div class="bar-track" style="height:22px;border-radius:8px;display:flex">
    <div style="width:${lp}%;background:var(--p)"></div><div style="flex:1;background:var(--gold)"></div></div>
    <div class="lgd"><span><span class="dot" style="background:var(--p)"></span>Лиды: ${lead}</span>
    <span><span class="dot" style="background:var(--gold)"></span>Входящие: ${inc}</span></div>`;
}

boot();
</script>
